// PAINEL DO DONO
// ══════════════════
function Painel({entradas,contas,dividas,retiradas,config,setConfig,selectedYear,setSelectedYear,selectedMonth,setSelectedMonth}){
  const now=new Date();
  // Alias locais para manter o código existente legível — sem useState próprio.
  const selYear=selectedYear;
  const selMonth=selectedMonth;
  const setSelYear=setSelectedYear;
  const setSelMonth=setSelectedMonth;
  // Calendário Financeiro acompanha o mês global (sem estado independente).
  const calYear=selectedYear;
  const calMonth=selectedMonth;
  const[expF,setExpF]=useState(false);
  const[expV,setExpV]=useState(false);
  const[expForn,setExpForn]=useState(false);
  const[expFin,setExpFin]=useState(false);
  const[showMeta,setShowMeta]=useState(false);
  // Seleção por clique-arrasto do mouse no calendário
  const[diasSelecionados,setDiasSelecionados]=useState(()=>new Set());
  const[isArrastando,setIsArrastando]=useState(false);
  const[metaInput,setMetaInput]=useState('');
  // Popover de meta manual (financeira) por mês — fica no card "Meta Diária de Pagamento"
  const[showMetaManual,setShowMetaManual]=useState(false);
  const[metaManualInput,setMetaManualInput]=useState('');
  const todayStr=today();
  const mStart=monthStart(selYear,selMonth);
  const mEnd=monthEnd(selYear,selMonth);
  const entMes=entradas.filter(e=>e.data>=mStart&&e.data<=mEnd);
  const totalEnt=entMes.reduce((s,e)=>s+e.total,0);
  const diasEnt=new Set(entMes.map(e=>e.data)).size;
  // Média diária = total / dias CORRIDOS do período (o mercado vende 7 dias/semana)
  // - mês atual: dias corridos do mês até hoje
  // - mês anterior fechado: total de dias do mês
  // - mês futuro/sem dados: total de dias do mês (fallback seguro)
  const totalDiasMes=daysInMonth(selYear,selMonth);
  const isMesAtual=now.getFullYear()===selYear&&now.getMonth()===selMonth;
  const isMesFuturo=(selYear>now.getFullYear())||(selYear===now.getFullYear()&&selMonth>now.getMonth());
  let diasCorridosBase;
  if(isMesAtual){diasCorridosBase=now.getDate();}
  else if(isMesFuturo){diasCorridosBase=totalDiasMes;}
  else{diasCorridosBase=totalDiasMes;}
  const mediaDiariaEnt=(totalEnt>0&&diasCorridosBase>0)?totalEnt/diasCorridosBase:0;
  const contasMes=contas.filter(c=>c.vencimento>=mStart&&c.vencimento<=mEnd);
  const totalSaiMes=contasMes.reduce((s,c)=>s+c.valor,0);
  const totalSaidoAteAgora=contasMes.filter(c=>c.status==='Pago').reduce((s,c)=>s+c.valor,0);
  const contasFaltaPagar=contasMes.filter(c=>c.status!=='Pago'&&c.vencimento>=todayStr);
  const totalFaltaPagar=contasFaltaPagar.reduce((s,c)=>s+c.valor,0);
  const pctPago=totalSaiMes>0?pct(totalSaidoAteAgora,totalSaiMes):0;
  const contasPend=contasMes.filter(c=>c.status!=='Pago');
  // Média diária de SAÍDA também por dias corridos do período (mesma régua)
  const mediaDiariaSai=(totalSaiMes>0&&diasCorridosBase>0)?totalSaiMes/diasCorridosBase:0;

  // Meta diária de pagamento
  //  • Automática (padrão): mediaDiariaEnt × percentual configurado (85%).
  //  • Manual por mês: se o usuário cadastrou uma meta financeira manual para
  //    este mês/ano (config.metasManuaisPorMes["YYYY-MM"]), ela tem prioridade.
  //    Permite simular meses futuros antes de existir entrada cadastrada.
  const metaPercentual=typeof config.metaPagamentoPercentual==='number'?config.metaPagamentoPercentual:85;
  const metaInfo=getMetaDiariaEfetiva(mediaDiariaEnt,metaPercentual,config,selYear,selMonth);
  const metaDiariaPagamento=metaInfo.valor;
  const metaIsManual=metaInfo.isManual;
  const chaveMesAtual=metaInfo.chaveMes;
  const mesLabel=`${MONTHS[selMonth]}/${selYear}`;
  const saldoAtual=config.saldoInicial;
  const saldoProj=saldoAtual+totalEnt-totalSaiMes;
  const semaMap={};
  contasPend.forEach(c=>{const s=weekOf(c.vencimento);semaMap[s]=(semaMap[s]||0)+c.valor;});
  const semanas=Object.entries(semaMap).sort((a,b)=>b[1]-a[1]);
  const semanaMaiorP=semanas[0]||null;
  const caixaMin=semanaMaiorP?Math.round(semanaMaiorP[1]*1.15):0;

  // Composição 4 grupos
  const porTipo={Fixa:[],Variável:[],Fornecedor:[],Financeira:[]};
  contasMes.forEach(c=>{const t=c.tipoDespesa||'Variável';if(porTipo[t])porTipo[t].push(c);else porTipo['Variável'].push(c);});
  const totFixed=porTipo['Fixa'].reduce((s,c)=>s+c.valor,0);
  const totVar=porTipo['Variável'].reduce((s,c)=>s+c.valor,0);
  const totForn=porTipo['Fornecedor'].reduce((s,c)=>s+c.valor,0);
  const totFin=porTipo['Financeira'].reduce((s,c)=>s+c.valor,0);
  const agrNome=list=>{const m={};list.forEach(c=>{const k=c.descricao||c.categoria;m[k]=(m[k]||0)+c.valor;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);};
  const fixasAg=agrNome(porTipo['Fixa']);
  const varAg=agrNome(porTipo['Variável']);
  const fornAg=agrNome(porTipo['Fornecedor']);
  const finAg=agrNome(porTipo['Financeira']);

  const concentMax=semanas[0]&&totalSaiMes>0?pct(semanas[0][1],totalSaiMes):0;
  const pctParcelas=pct(dividas.reduce((s,d)=>s+d.parcelaMensal,0),totalEnt);
  const leResumo=(()=>{
    if(totalEnt===0)return'Nenhuma entrada registrada para este mês. Cadastre as vendas para gerar a leitura.';
    if(saldoProj<0)return'O caixa projetado indica risco de falta de dinheiro dentro do mês, exigindo reorganização dos vencimentos ou reforço de capital.';
    if(concentMax>35)return'O mercado apresenta boa geração de caixa, porém os vencimentos estão concentrados em poucos dias, criando pressão artificial no caixa.';
    if(pctParcelas>20)return'As parcelas bancárias estão consumindo parte relevante das entradas do mês, indicando dependência de crédito.';
    return'O caixa do mês apresenta comportamento saudável, sem concentração crítica de vencimentos ou saldo projetado negativo.';
  })();
  const leBullets=[];
  if(concentMax>0)leBullets.push(`${concentMax}% das saídas concentradas na semana de maior pressão.`);
  if(pctParcelas>0)leBullets.push(`Parcelas bancárias consomem ${pctParcelas}% da entrada do mês.`);
  if(caixaMin>0)leBullets.push(`Caixa mínimo recomendado: ${fmtFull(caixaMin)}.`);
  if(leBullets.length===0)leBullets.push('Sem pontos críticos identificados no período.');

  // Fornecedores em Destaque (filtra contas do mês com tipoDespesa='Fornecedor')
  const contasForn=contasMes.filter(c=>c.tipoDespesa==='Fornecedor');
  const totalFornMes=contasForn.reduce((s,c)=>s+c.valor,0);
  const fornNome=c=>(c.fornecedor&&c.fornecedor.trim())?c.fornecedor.trim():(c.descricao||'Sem identificação').trim();
  const fornMap={};
  contasForn.forEach(c=>{
    const nome=fornNome(c);
    if(!fornMap[nome])fornMap[nome]={nome,valor:0,qtd:0};
    fornMap[nome].valor+=c.valor;
    fornMap[nome].qtd+=1;
  });
  const fornArr=Object.values(fornMap);
  const topFornValor=[...fornArr].sort((a,b)=>b.valor-a.valor).slice(0,3);
  const topFornQtd=[...fornArr].sort((a,b)=>b.qtd-a.qtd||b.valor-a.valor).slice(0,3);

  // Cal — acompanha o mês global (selectedYear/selectedMonth). Navegação altera o mês global.
  const calMStart=monthStart(calYear,calMonth);
  const calMEnd=monthEnd(calYear,calMonth);
  const contasMesCal=contas.filter(c=>c.vencimento>=calMStart&&c.vencimento<=calMEnd);
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const totalDays=daysInMonth(calYear,calMonth);
  const offsetDays=firstDay===0?6:firstDay-1;
  const contasPorDia={};
  contasMesCal.forEach(c=>{const d=parseInt(c.vencimento.split('-')[2]);if(!contasPorDia[d])contasPorDia[d]=[];contasPorDia[d].push(c);});
  // Semana de maior pressão recalculada para o mês do calendário (regra de cores funciona em qualquer mês)
  const semaMapCal={};
  contasMesCal.filter(c=>c.status!=='Pago').forEach(c=>{const s=weekOf(c.vencimento);semaMapCal[s]=(semaMapCal[s]||0)+c.valor;});
  const semanasCal=Object.entries(semaMapCal).sort((a,b)=>b[1]-a[1]);
  const semanaMaisP=semanasCal[0]?semanasCal[0][0]:null;

  // Classificação por dia — 3 estados baseados na meta diária de pagamento:
  //  • Verde    (cal-saudavel): total do dia <= meta
  //  • Amarelo  (cal-atencao):  meta < total <= meta + R$ 2.000
  //  • Vermelho (cal-critico):  total > meta + R$ 2.000
  // A meta vem do contexto do painel (mediaDiariaEnt × metaPercentual) — mesma régua p/ todos os meses.
  const FAIXA_ATENCAO=2000;
  const isDiaUtil=day=>{const dt=new Date(calYear,calMonth,day);const dw=dt.getDay();return dw!==0&&dw!==6;};

  const calInt=(t,day)=>{
    if(t===0)return'';
    if(metaDiariaPagamento<=0)return'cal-leve';
    if(t<=metaDiariaPagamento)return'cal-saudavel';
    if(t<=metaDiariaPagamento+FAIXA_ATENCAO)return'cal-atencao';
    return'cal-critico';
  };
  const isTodayCell=day=>`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`===todayStr;
  const isInSemP=day=>{if(!semanaMaisP)return false;return weekOf(`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`)===semanaMaisP;};
  // Botões de navegação do calendário alteram o MÊS GLOBAL (mantém o dashboard inteiro coerente)
  const calPrev=()=>{if(selMonth===0){setSelMonth(11);setSelYear(selYear-1);}else{setSelMonth(selMonth-1);}};
  const calNext=()=>{if(selMonth===11){setSelMonth(0);setSelYear(selYear+1);}else{setSelMonth(selMonth+1);}};
  const calHoje=()=>{setSelMonth(now.getMonth());setSelYear(now.getFullYear());};
  const calEhMesAtual=(calYear===now.getFullYear()&&calMonth===now.getMonth());

  return(
    <div>
      {/* CARDS PRINCIPAIS — Linha 1: Entradas / Saídas / Saldo Projetado */}
      <div className="painel-kpi-grid v5">
        <div className="pc pc-t-green">
          <div className="pc-label">Entradas do Mês</div>
          <div className="pc-value g">{fmtFull(totalEnt)}</div>
          <div className="pc-sub">{diasEnt} dias com venda</div>
        </div>
        <div className="pc pc-t-red">
          <div className="pc-label">Saídas até Agora</div>
          <div className="pc-value r">{fmtFull(totalSaidoAteAgora)}</div>
          <div className="pc-sub">Valor já pago no mês</div>
        </div>
        <div className="pc" style={{borderTopColor:saldoProj<0?'var(--red)':'var(--green)',borderTopWidth:2,borderTopStyle:'solid'}}>
          <div className="pc-label">Saldo Projetado</div>
          <div className={`pc-value${saldoProj>=0?' g':' r'}`}>{fmtFull(saldoProj)}</div>
          <div className="pc-sub">{saldoProj<0?'⚠️ Caixa negativo':'✓ Resultado positivo'}</div>
        </div>
      </div>

      {/* CARDS PRINCIPAIS — Linha 2: Caixa Mínimo / Médias Diárias / Meta Diária de Pagamento */}
      <div className="painel-kpi-row2 v5">
        <div className="pc pc-t-blue">
          <div className="pc-label">Caixa Mínimo Recomendado</div>
          <div className="pc-value a">{fmtFull(caixaMin)}</div>
          <div className="pc-sub">Maior semana + 15%</div>
        </div>
        <div className="pc pc-t-slate">
          <div className="pc-label">Médias Diárias</div>
          <div className="pc-medias">
            <div className="pc-medias-col">
              <span className="pc-medias-lbl">Entrada</span>
              <span className="pc-medias-val g">{fmt(mediaDiariaEnt)}</span>
            </div>
            <div className="pc-medias-sep"></div>
            <div className="pc-medias-col">
              <span className="pc-medias-lbl">Saída</span>
              <span className="pc-medias-val r">{fmt(mediaDiariaSai)}</span>
            </div>
          </div>
          <div className="pc-sub">por dia corrido do mês</div>
        </div>
        <div className="pc pc-papaya" style={{position:'relative'}}>
          <div className="pc-meta-row">
            <div className="pc-label">
              Meta Diária de Pagamento
              {metaIsManual&&<span className="pc-meta-badge" title={`Meta manual para ${mesLabel}`}>Manual</span>}
            </div>
            <button
              type="button"
              className="pc-meta-btn"
              onClick={()=>{
                // Ao abrir, preenche o input com a meta atual (manual ou automática) já formatada
                const valorAtual=metaDiariaPagamento>0?formatCurrencyBR(metaDiariaPagamento).replace('R$ ',''):'';
                setMetaManualInput(valorAtual);
                setShowMetaManual(s=>!s);
              }}
              title={`Definir meta diária manual para ${mesLabel}`}
            >
              Manual
            </button>
          </div>
          <div className="pc-value a">{fmtFull(metaDiariaPagamento)}</div>
          <div className="pc-sub">
            {metaIsManual?`Meta manual — ${mesLabel}`:`${metaPercentual}% da média diária`}
          </div>

          {showMetaManual&&(
            <div className="pc-meta-popover">
              <div className="pc-meta-popover-title">Meta manual — {mesLabel}</div>
              <div className="pc-meta-popover-row">
                <input
                  type="text"
                  className="pc-meta-input"
                  placeholder="R$ 0,00"
                  value={metaManualInput}
                  onChange={e=>setMetaManualInput(e.target.value)}
                  autoFocus
                />
              </div>
              <div className="pc-meta-popover-hint">
                Aceita R$ 18.000,00 · 18.000,00 · 18000.
                Use para simular meses futuros sem entradas cadastradas.
              </div>
              <div className="pc-meta-popover-actions">
                <button
                  type="button"
                  className="pc-meta-cancel"
                  onClick={()=>setShowMetaManual(false)}
                >Cancelar</button>
                {(config.metasManuaisPorMes&&typeof config.metasManuaisPorMes[chaveMesAtual]==='number')&&(
                  <button
                    type="button"
                    className="pc-meta-remove"
                    onClick={()=>{
                      const novoMapa={...(config.metasManuaisPorMes||{})};
                      delete novoMapa[chaveMesAtual];
                      setConfig({...config,metasManuaisPorMes:novoMapa});
                      setShowMetaManual(false);
                    }}
                    title="Remove apenas a meta deste mês — volta para a meta automática"
                  >Remover manual</button>
                )}
                <button
                  type="button"
                  className="pc-meta-save"
                  onClick={()=>{
                    const valor=parseCurrencyBR(metaManualInput);
                    if(!(valor>0)){alert('Informe um valor financeiro válido (ex: 18.000,00).');return;}
                    const novoMapa={...(config.metasManuaisPorMes||{}),[chaveMesAtual]:valor};
                    setConfig({...config,metasManuaisPorMes:novoMapa});
                    setShowMetaManual(false);
                  }}
                >Salvar</button>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* COMPOSIÇÃO DAS DESPESAS — largura total, 4 colunas */}
      <div className="comp-panel painel-comp-full">
        <div className="comp-header">
          <div className="comp-header-label">Composição das Despesas</div>
          <div className="comp-header-right">
            <div className="comp-header-total">{fmtFull(totalSaiMes)}</div>
            <div className="comp-header-sub">{MONTHS[selMonth]} {selYear} · total do mês</div>
          </div>
        </div>
        <div className="comp-body comp-inner-4">
          <CompGroup label="Despesas Fixas" color="#16a34a" total={totFixed} totalGeral={totalSaiMes} items={fixasAg} expand={expF} setExpand={setExpF} emptyMsg="Nenhuma despesa fixa"/>
          <CompGroup label="Despesas Variáveis" color="#d97706" total={totVar} totalGeral={totalSaiMes} items={varAg} expand={expV} setExpand={setExpV} emptyMsg="Nenhuma despesa variável"/>
          <CompGroup label="Fornecedores" color="#2563eb" total={totForn} totalGeral={totalSaiMes} items={fornAg} expand={expForn} setExpand={setExpForn} emptyMsg="Nenhum fornecedor"/>
          <CompGroup label="Despesas Financeiras" color="#7c3aed" total={totFin} totalGeral={totalSaiMes} items={finAg} expand={expFin} setExpand={setExpFin} emptyMsg="Nenhuma despesa financeira"/>
        </div>
      </div>

      {/* LAYOUT INFERIOR: Calendário (esq 75%) | Custo por Segmento (dir 25%) */}
      <div className="painel-layout-bottom">
        {/* CALENDÁRIO FINANCEIRO — coluna esquerda */}
        <div className="calendario">
          <div className="cal-head">
            <div className="cal-title-wrap">
              <div className="cal-nav">
                <button className="cal-nav-btn" onClick={calPrev} title="Mês anterior" aria-label="Mês anterior">‹</button>
                <button className="cal-nav-btn" onClick={calNext} title="Próximo mês" aria-label="Próximo mês">›</button>
                {!calEhMesAtual&&(
                  <button className="cal-nav-today" onClick={calHoje} title="Voltar ao mês atual">Hoje</button>
                )}
              </div>
              <div className="cal-title">Calendário Financeiro — {MONTHS[calMonth]} {calYear}</div>
            </div>
            <div className="cal-head-right">
              <div className="cal-legend">
                <div className="cal-leg"><div className="cal-leg-dot" style={{background:'#dcfce7'}}></div>Saudável</div>
                <div className="cal-leg"><div className="cal-leg-dot" style={{background:'#fef9c3'}}></div>Atenção</div>
                <div className="cal-leg"><div className="cal-leg-dot" style={{background:'#fee2e2'}}></div>Crítico</div>
              </div>
              <button className="cal-meta-btn" onClick={()=>{setMetaInput(String(metaPercentual));setShowMeta(s=>!s);}} title="Ajustar a meta diária de pagamento">
                ⚙ Ajustar meta
              </button>
            </div>
          </div>

          {showMeta&&(
            <div className="cal-meta-panel">
              <div className="cal-meta-panel-title">Meta diária de pagamento</div>
              <div className="cal-meta-panel-row">
                <input type="number" min="1" max="200" step="1" className="cal-meta-input"
                  value={metaInput} onChange={e=>setMetaInput(e.target.value)}/>
                <span className="cal-meta-pct">%</span>
                <div className="cal-meta-preview">
                  Valor atual: <strong>{fmtFull(mediaDiariaEnt*((parseFloat(metaInput)||metaPercentual)/100))}</strong>
                </div>
              </div>
              <div className="cal-meta-actions">
                <button className="cal-meta-save" onClick={()=>{
                  const v=parseFloat(metaInput);
                  if(isNaN(v)||v<=0||v>200){alert('Informe um percentual válido entre 1 e 200.');return;}
                  setConfig({...config,metaPagamentoPercentual:v});
                  setShowMeta(false);
                }}>Salvar</button>
                <button className="cal-meta-reset" onClick={()=>{
                  setConfig({...config,metaPagamentoPercentual:85});
                  setMetaInput('85');
                }}>Restaurar padrão 85%</button>
                <button className="cal-meta-cancel" onClick={()=>setShowMeta(false)}>Cancelar</button>
              </div>
              <div className="cal-meta-footnote">Padrão: 85% da média diária de entrada · esta meta é usada no calendário, na sugestão de redistribuição e no card de meta diária.</div>
            </div>
          )}

          {/* Barra de resumo dos dias selecionados */}
          {diasSelecionados.size>0&&(()=>{
            const dias=Array.from(diasSelecionados);
            const totalSelecionado=dias.reduce((s,d)=>{
              const itens=contasPorDia[d]||[];
              return s+itens.reduce((ss,c)=>ss+c.valor,0);
            },0);
            const metaAcumulada=metaDiariaPagamento*diasSelecionados.size;
            const diff=totalSelecionado-metaAcumulada;
            const isOver=diff>0;
            const diffPct=metaAcumulada>0?Math.round((diff/metaAcumulada)*100):0;
            return(
              <div className="cal-sel-bar">
                <div className="cal-sel-bar-block">
                  <div className="cal-sel-bar-lbl">Dias selecionados</div>
                  <div className="cal-sel-bar-val">{diasSelecionados.size}</div>
                </div>
                <div className="cal-sel-bar-div"></div>
                <div className="cal-sel-bar-block">
                  <div className="cal-sel-bar-lbl">Total a pagar</div>
                  <div className={`cal-sel-bar-val ${isOver?'over':'under'}`}>{fmtFull(totalSelecionado)}</div>
                </div>
                <div className="cal-sel-bar-div"></div>
                <div className="cal-sel-bar-block">
                  <div className="cal-sel-bar-lbl">Meta acumulada</div>
                  <div className="cal-sel-bar-val">{fmtFull(metaAcumulada)}</div>
                </div>
                {metaAcumulada>0&&(
                  <span className={`cal-sel-bar-diff ${isOver?'over':'under'}`}>
                    {isOver?'+':''}{diffPct}% {isOver?'acima':'abaixo'} da meta
                  </span>
                )}
                <button className="cal-sel-bar-clear" onClick={()=>setDiasSelecionados(new Set())}>Limpar</button>
              </div>
            );
          })()}

          <div className="cal-grid"
            onMouseDown={e=>{e.preventDefault();}}
            onMouseUp={()=>setIsArrastando(false)}
            onMouseLeave={()=>setIsArrastando(false)}
          >
            {['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=><div key={d} className="cal-dow">{d}</div>)}
            {Array(offsetDays).fill(null).map((_,i)=><div key={'e'+i} className="cal-day empty"></div>)}
            {Array(totalDays).fill(null).map((_,i)=>{
              const day=i+1;
              const itens=contasPorDia[day]||[];
              const totalDia=itens.reduce((s,c)=>s+c.valor,0);
              const int=calInt(totalDia,day);
              const inSem=isInSemP(day);
              const isToday=isTodayCell(day);
              const isSelecionado=diasSelecionados.has(day);
              return(
                <div key={day} className={`cal-day${int?' '+int:' cal-leve'}${isToday?' cal-today':''}${isSelecionado?' cal-selected':''}`}
                  onMouseDown={e=>{
                    if(e.button!==0)return;
                    e.preventDefault();
                    setIsArrastando(true);
                    setDiasSelecionados(new Set([day]));
                  }}
                  onMouseEnter={()=>{
                    if(!isArrastando)return;
                    setDiasSelecionados(prev=>{
                      if(prev.has(day))return prev;
                      const n=new Set(prev);n.add(day);return n;
                    });
                  }}
                  style={inSem&&int&&int!=='cal-saudavel'?{borderLeftColor:'var(--amber)',borderLeftWidth:'2px'}:{}}>
                  <div className="cal-day-n">{day}</div>
                  {totalDia>0&&(<>
                    <div className="cal-day-total">{fmt(totalDia)}</div>
                    <div className="cal-day-items">
                      {itens.slice(0,2).map((c,j)=>(
                        <div key={j} style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(c.descricao||'').substring(0,10)} {fmt(c.valor)}</div>
                      ))}
                      {itens.length>2&&<div className="cal-day-more">+{itens.length-2}</div>}
                    </div>
                  </>)}
                </div>
              );
            })}
          </div>
        </div>

        {/* CUSTO POR SEGMENTO — coluna direita */}
        <CustoSegmentos contas={contas} selYear={selYear} selMonth={selMonth}/>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SECTION 8 — ENTRADAS
// ─────────────────────────────────────────────────────────────

function Entradas({entradas,setEntradas,contas,dividas,selectedYear,selectedMonth}){
  const now=new Date();
  const selYear=selectedYear;
  const selMonth=selectedMonth;
  const[showForm,setShowForm]=useState(false);
  const[editId,setEditId]=useState(null);
  const[showConfig,setShowConfig]=useState(false);
  const[prazos,setPrazos_]=useState(()=>loadLocalS('zanon_prazos')||DEFAULT_PRAZOS);
  const setPrazos=p=>{setPrazos_(p);saveLocalS('zanon_prazos',p);};
  const emptyForm={data:today(),dinheiro:'',pix:'',debito:'',credito:'',voucher:'',outros:'',obs:'',voucherAntecipado:'nao',voucherDataReceb:''};
  const[form,setForm]=useState(emptyForm);
  const chartDayRef=useRef(null);
  const totalF=f=>['dinheiro','pix','debito','credito','voucher','outros'].reduce((s,k)=>s+parseNum(f[k]),0);
  const todayStr=today();

  // ── Filtro mensal: todas as entradas usadas nesta aba são as do mês/ano selecionado ──
  const mStart=monthStart(selYear,selMonth);
  const mEnd=monthEnd(selYear,selMonth);
  const entradasDoMes=entradas.filter(e=>e.data>=mStart&&e.data<=mEnd);

  const openForm=(e=null)=>{
    if(e){setForm({...e,dinheiro:e.dinheiro.toString(),pix:e.pix.toString(),debito:e.debito.toString(),credito:e.credito.toString(),voucher:e.voucher.toString(),outros:e.outros.toString(),voucherAntecipado:e.voucherAntecipado||'nao',voucherDataReceb:e.voucherDataReceb||''});setEditId(e.id);}
    else{setForm(emptyForm);setEditId(null);}
    setShowForm(true);
  };

  const save_=()=>{
    const t=totalF(form);if(!form.data||t===0)return alert('Informe a data e pelo menos um valor.');
    const entry={...form,id:editId||genId(),dinheiro:parseNum(form.dinheiro),pix:parseNum(form.pix),debito:parseNum(form.debito),credito:parseNum(form.credito),voucher:parseNum(form.voucher),outros:parseNum(form.outros),total:t,voucherAntecipado:form.voucherAntecipado||'nao',voucherDataReceb:form.voucherDataReceb||''};
    const updated=editId?entradas.map(e=>e.id===editId?entry:e):[...entradas.filter(e=>e.data!==form.data||editId),entry];
    setEntradas(updated.sort((a,b)=>a.data.localeCompare(b.data)));
    setForm(emptyForm);setEditId(null);setShowForm(false);
  };
  const remove=id=>{if(confirm('Remover?'))setEntradas(entradas.filter(e=>e.id!==id));};

  const totalMes=entradasDoMes.reduce((s,e)=>s+e.total,0);
  const dias=new Set(entradasDoMes.map(e=>e.data)).size;
  const media=dias>0?totalMes/dias:0;
  // Média diária por dias CORRIDOS — mesma régua do Painel do Dono
  const totalDiasMesEnt=daysInMonth(selYear,selMonth);
  const isMesAtualEnt=now.getFullYear()===selYear&&now.getMonth()===selMonth;
  const diasCorridosBaseEnt=isMesAtualEnt?now.getDate():totalDiasMesEnt;
  const mediaDiariaEnt=(totalMes>0&&diasCorridosBaseEnt>0)?totalMes/diasCorridosBaseEnt:0;
  const melhor=entradasDoMes.length?entradasDoMes.reduce((m,e)=>e.total>m.total?e:m):null;
  const pior=entradasDoMes.length?entradasDoMes.reduce((m,e)=>e.total<m.total?e:m):null;
  const sorted=[...entradasDoMes].sort((a,b)=>b.data.localeCompare(a.data));

  // ── Lógica de disponibilidade de caixa ──
  const calcRecebimento=(entry,forma)=>{
    if(forma==='voucher'){
      if(entry.voucherAntecipado==='sim'&&entry.voucherDataReceb) return entry.voucherDataReceb;
      return addDays(entry.data,prazos.voucher);
    }
    return addDays(entry.data,prazos[forma]||0);
  };

  const FORMAS=[
    {key:'dinheiro',label:'Dinheiro',color:'#16a34a'},
    {key:'pix',label:'PIX',color:'#2563eb'},
    {key:'debito',label:'Débito',color:'#7c3aed'},
    {key:'credito',label:'Crédito',color:'#d97706'},
    {key:'voucher',label:'Voucher',color:'#e11d48'},
    {key:'outros',label:'Outros',color:'#64748b'},
  ];

  const disponibilidade=FORMAS.map(f=>{
    const vendido=entradasDoMes.reduce((s,e)=>s+(e[f.key]||0),0);
    let disponivel=0,aReceber=0;
    entradasDoMes.forEach(e=>{
      const v=e[f.key]||0;if(!v)return;
      const dtReceb=calcRecebimento(e,f.key);
      if(dtReceb<=todayStr)disponivel+=v;else aReceber+=v;
    });
    const prazoLabel=f.key==='dinheiro'||f.key==='pix'?'D+0':f.key==='debito'||f.key==='credito'?'D+1':f.key==='voucher'?`D+${prazos.voucher}`:`D+${prazos.outros}`;
    return{...f,vendido,disponivel,aReceber,prazoLabel};
  });

  const totalDisponivelBruto=disponibilidade.reduce((s,f)=>s+f.disponivel,0);
  const totalAReceber=disponibilidade.reduce((s,f)=>s+f.aReceber,0);

  // ── Integração com Contas a Pagar (do mês selecionado) ──
  const contasDoMes=(contas||[]).filter(c=>c.vencimento>=mStart&&c.vencimento<=mEnd);
  const contasPagas=contasDoMes.filter(c=>c.status==='Pago'&&c.vencimento<=todayStr);
  const totalPago=contasPagas.reduce((s,c)=>s+c.valor,0);
  const disponivelLiquido=totalDisponivelBruto-totalPago;

  const contasHoje=(contas||[]).filter(c=>c.vencimento===todayStr);
  const totalContasHoje=contasHoje.reduce((s,c)=>s+c.valor,0);
  const contasHojePendentes=contasHoje.filter(c=>c.status!=='Pago');
  const contasVencidasAbertas=(contas||[]).filter(c=>c.vencimento<todayStr&&c.status!=='Pago');

  // ── Por forma de pagamento (barras horizontais) ──
  const porForma=FORMAS.map(f=>({...f,total:entradasDoMes.reduce((s,e)=>s+(e[f.key]||0),0)}))
    .filter(f=>f.total>0)
    .sort((a,b)=>b.total-a.total);

  // ── Gráfico evolução ──
  const sortedAsc=[...entradasDoMes].sort((a,b)=>a.data.localeCompare(b.data));
  useChart(chartDayRef,{type:'line',data:{labels:sortedAsc.map(e=>fmtDate(e.data)),datasets:[{label:'Entrada',data:sortedAsc.map(e=>e.total),borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,0.06)',fill:true,tension:0.3,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'Entrada: '+formatCurrency(ctx.parsed.y)}}},scales:{y:{ticks:{callback:v=>formatCurrency(v)}}}}});

  return(
    <div>
      {/* ── CARDS DE RESUMO ── */}
      <div className="metrics-grid entradas-grid">
        <div className="metric-card" style={{borderTop:'2px solid var(--green)'}}>
          <div className="metric-label">Total — {MONTHS_SHORT[selMonth]}/{String(selYear).slice(2)}</div>
          <div className="metric-value green">{fmtFull(totalMes)}</div>
          <div className="metric-sub">{dias} dia{dias===1?'':'s'} com venda</div>
        </div>
        <div className="metric-card" style={{borderTop:`2px solid ${disponivelLiquido<0?'var(--red)':'var(--blue)'}`}}>
          <div className="metric-label">Disponível Hoje</div>
          <div className="metric-value" style={{color:disponivelLiquido<0?'var(--red)':'var(--blue)'}}>{fmtFull(disponivelLiquido)}</div>
          <div className="metric-sub">Entradas disponíveis menos contas pagas</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--amber)'}}>
          <div className="metric-label">A Receber</div>
          <div className="metric-value amber">{fmtFull(totalAReceber)}</div>
          <div className="metric-sub">{totalMes>0?pct(totalAReceber,totalMes):0}% do total</div>
        </div>
        <div className="metric-card metric-card-medias">
          <div className="metric-label">Média Diária</div>
          <div className="pc-medias pc-medias-solo">
            <div className="pc-medias-col">
              <span className="pc-medias-lbl">Entrada</span>
              <span className="pc-medias-val g">{fmtFull(mediaDiariaEnt)}</span>
            </div>
          </div>
          <div className="metric-sub">por dia corrido do mês</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Melhor Dia</div>
          <div className="metric-value green" style={{fontSize:15}}>{melhor?fmtDate(melhor.data):'—'}</div>
          <div className="metric-sub">{melhor?fmtFull(melhor.total):''}</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Pior Dia</div>
          <div className="metric-value" style={{fontSize:15,color:'var(--text-muted)'}}>{pior?fmtDate(pior.data):'—'}</div>
          <div className="metric-sub">{pior?fmtFull(pior.total):''}</div>
        </div>
      </div>

      {/* ── TABELA ENTRADAS DIÁRIAS ── */}
      <div className="section-header">
        <div className="section-title">Entradas Diárias</div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowConfig(!showConfig)}>⚙️ Prazos</button>
          <button className="btn btn-primary" onClick={()=>openForm()}>+ Adicionar</button>
        </div>
      </div>

      {/* Config prazos inline */}
      {showConfig&&(
        <div className="card mb-3" style={{background:'var(--surface-2)',border:'1px solid var(--border)'}}>
          <div className="card-title">⚙️ Configuração de Prazos de Recebimento</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:8}}>
            {[{k:'dinheiro',l:'Dinheiro',fixed:true,val:'D+0'},{k:'pix',l:'PIX',fixed:true,val:'D+0'},{k:'debito',l:'Débito',fixed:true,val:'D+1'},{k:'credito',l:'Crédito',fixed:true,val:'D+1 (antecipado)'},{k:'voucher',l:'Voucher (dias)'},{k:'outros',l:'Outros (dias)'}].map(f=>(
              <div key={f.k} className="fg">
                <label>{f.l}</label>
                {f.fixed?<input type="text" value={f.val} disabled style={{background:'var(--ink-100)',color:'var(--text-muted)',cursor:'not-allowed'}}/>:<input type="number" min="0" value={prazos[f.k]} onChange={e=>setPrazos({...prazos,[f.k]:parseInt(e.target.value)||0})} placeholder="dias"/>}
              </div>
            ))}
          </div>
        </div>
      )}

      {sorted.length===0?<div className="empty"><div className="empty-icon">💰</div>Nenhuma entrada cadastrada.</div>:(
        <div className="mb-3" style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',boxShadow:'var(--shadow-xs)',overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <div style={{overflowY:'auto',maxHeight:340}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead style={{position:'sticky',top:0,zIndex:1}}>
                  <tr><th>Data</th><th>Dinheiro</th><th>PIX</th><th>Débito</th><th>Crédito</th><th>Voucher</th><th>Outros</th><th>Total</th><th></th></tr>
                </thead>
                <tbody>{sorted.map(e=>(
                  <tr key={e.id}>
                    <td>{fmtDate(e.data)}</td>
                    <td>{e.dinheiro>0?fmt(e.dinheiro):'—'}</td>
                    <td>{e.pix>0?fmt(e.pix):'—'}</td>
                    <td>{e.debito>0?fmt(e.debito):'—'}</td>
                    <td>{e.credito>0?fmt(e.credito):'—'}</td>
                    <td>
                      {e.voucher>0?(
                        <span style={{display:'flex',alignItems:'center',gap:4}}>
                          {fmt(e.voucher)}
                          {e.voucherAntecipado==='sim'&&<span style={{fontSize:9,background:'var(--amber-light)',color:'var(--amber-dim)',borderRadius:10,padding:'1px 5px',fontWeight:600}}>ANT</span>}
                        </span>
                      ):'—'}
                    </td>
                    <td>{e.outros>0?fmt(e.outros):'—'}</td>
                    <td><strong>{fmtFull(e.total)}</strong></td>
                    <td style={{display:'flex',gap:3}}>
                      <button className="btn btn-secondary btn-sm" onClick={()=>openForm(e)}>✏️</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>remove(e.id)}>✕</button>
                    </td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {sorted.length>0&&(<>

        {/* ── PAINEL DISPONIBILIDADE DE CAIXA ── */}
        <div className="card mb-3">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div className="card-title" style={{margin:0}}>💵 Disponibilidade de Caixa</div>
            <div style={{display:'flex',gap:12,fontSize:12}}>
              <span style={{color:'var(--blue)',fontWeight:600}}>Disponível bruto: {fmtFull(totalDisponivelBruto)}</span>
              <span style={{color:disponivelLiquido<0?'var(--red)':'var(--green)',fontWeight:600}}>Líquido: {fmtFull(disponivelLiquido)}</span>
              <span style={{color:'var(--amber)',fontWeight:600}}>A Receber: {fmtFull(totalAReceber)}</span>
            </div>
          </div>
          {/* Barra geral disponível vs a receber */}
          {totalMes>0&&(
            <div style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text-muted)',marginBottom:3}}>
                <span>Disponível hoje (bruto)</span><span>A receber</span>
              </div>
              <div style={{height:8,borderRadius:4,overflow:'hidden',background:'var(--amber-light)',display:'flex'}}>
                <div style={{width:pct(totalDisponivelBruto,totalMes)+'%',background:'var(--blue)',transition:'width .4s'}}></div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text-muted)',marginTop:3}}>
                <span>{pct(totalDisponivelBruto,totalMes)}%</span><span>{pct(totalAReceber,totalMes)}%</span>
              </div>
            </div>
          )}
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr>
                  <th style={{background:'var(--surface-2)',padding:'6px 10px',textAlign:'left',fontSize:10,fontWeight:600,color:'var(--text-muted)',letterSpacing:'.05em',textTransform:'uppercase',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>Forma</th>
                  <th style={{background:'var(--surface-2)',padding:'6px 10px',textAlign:'right',fontSize:10,fontWeight:600,color:'var(--text-muted)',letterSpacing:'.05em',textTransform:'uppercase',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>Vendido</th>
                  <th style={{background:'var(--surface-2)',padding:'6px 10px',textAlign:'center',fontSize:10,fontWeight:600,color:'var(--text-muted)',letterSpacing:'.05em',textTransform:'uppercase',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>Prazo</th>
                  <th style={{background:'var(--surface-2)',padding:'6px 10px',textAlign:'right',fontSize:10,fontWeight:600,color:'var(--blue)',letterSpacing:'.05em',textTransform:'uppercase',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>Disponível Hoje</th>
                  <th style={{background:'var(--surface-2)',padding:'6px 10px',textAlign:'right',fontSize:10,fontWeight:600,color:'var(--amber)',letterSpacing:'.05em',textTransform:'uppercase',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>A Receber</th>
                </tr>
              </thead>
              <tbody>
                {disponibilidade.filter(f=>f.vendido>0).map(f=>(
                  <tr key={f.key}>
                    <td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',color:'var(--text-secondary)',verticalAlign:'middle'}}>
                      <span style={{display:'inline-flex',alignItems:'center',gap:6}}>
                        <span style={{width:8,height:8,borderRadius:2,background:f.color,flexShrink:0,display:'inline-block'}}></span>
                        {f.label}
                      </span>
                    </td>
                    <td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',color:'var(--text-secondary)',verticalAlign:'middle',textAlign:'right'}}>{fmtFull(f.vendido)}</td>
                    <td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',color:'var(--text-muted)',verticalAlign:'middle',textAlign:'center',fontSize:11}}>{f.prazoLabel}</td>
                    <td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',verticalAlign:'middle',textAlign:'right'}}>
                      {f.disponivel>0?<strong style={{color:'var(--blue)'}}>{fmtFull(f.disponivel)}</strong>:<span style={{color:'var(--text-muted)'}}>—</span>}
                    </td>
                    <td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',verticalAlign:'middle',textAlign:'right'}}>
                      {f.aReceber>0?<strong style={{color:'var(--amber)'}}>{fmtFull(f.aReceber)}</strong>:<span style={{color:'var(--text-muted)'}}>—</span>}
                    </td>
                  </tr>
                ))}

// ── CSV import helpers ──
const parseDateBR=v=>{
  if(!v)return null;
  const s=v.toString().trim();
  // YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // DD/MM/YYYY
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[d,m,y]=s.split('/');return`${y}-${m}-${d}`;}
  // DD-MM-YYYY
  if(/^\d{2}-\d{2}-\d{4}$/.test(s)){const[d,m,y]=s.split('-');return`${y}-${m}-${d}`;}
  return null;
};

// Gera CSV modelo para download
const downloadModeloCSV=()=>{
  const headers=['Vencimento','Fornecedor','Descrição','Segmento','Valor','Categoria','Tipo de Despesa','Status','Forma de Pagamento','Conta de Saída','Observação'];
  const ex1=['15/05/2026','Rossi Frigorífico','Boleto Rossi Frigorífico','Açougue','2166,30','Fornecedores','Fornecedor','A vencer','Boleto','Banco principal','Compra semanal'];
  const ex2=['18/05/2026','Segalas','Compra semanal Segalas','Mercearia Seca','1450,00','Fornecedores','Fornecedor','A vencer','Boleto','Banco principal','Compra de reposição'];
  const csv=[headers,ex1,ex2].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='modelo_importacao_zanon.csv';a.click();URL.revokeObjectURL(url);

// Parseia texto CSV respeitando aspas
// Aceita delimitadores , (vírgula) e ; (ponto e vírgula) — detecção automática pelo cabeçalho
const parseCSV=text=>{
  // remove BOM (UTF-8) se presente no início do arquivo
  if(text&&text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  // detecta delimitador a partir do cabeçalho: usa ';' se ele for mais frequente que ',' fora de aspas
  const detectDelim=line=>{
    let semi=0,comma=0,inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"')i++;else inQ=!inQ;}
      else if(!inQ){if(ch===';')semi++;else if(ch===',')comma++;}
    }
    return semi>comma?';':',';
  };
  const DELIM=detectDelim(lines[0]);
  const parseRow=line=>{
    const cells=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===DELIM&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=ch;
    }
    cells.push(cur.trim());
    return cells.map(c=>c.replace(/^"|"$/g,'').trim());
  };
  const hdr=parseRow(lines[0]).map(h=>h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
  const col=k=>hdr.findIndex(h=>h.includes(k));
  const iVenc=col('vencimento');const iForn=col('fornecedor');const iDesc=col('descri');const iSeg=col('segmento');
  const iVal=col('valor');const iCat=col('categoria');const iTipo=col('tipo');const iSt=col('status');
  const iForma=col('forma');const iConta=col('conta');const iObs=col('obs');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const cells=parseRow(lines[i]);
    if(cells.every(c=>!c))continue;
    rows.push({
      vencimento:iVenc>=0?cells[iVenc]||'':'',
      fornecedor:iForn>=0?cells[iForn]||'':'',
      descricao:iDesc>=0?cells[iDesc]||'':'',
      segmento:iSeg>=0?cells[iSeg]||'':'',
      valor:iVal>=0?cells[iVal]||'':'',
      categoria:iCat>=0?cells[iCat]||'':'',
      tipoDespesa:iTipo>=0?cells[iTipo]||'':'',
      status:iSt>=0?cells[iSt]||'':'',
      formaPag:iForma>=0?cells[iForma]||'':'',
      contaSaida:iConta>=0?cells[iConta]||'':'',
      obs:iObs>=0?cells[iObs]||'':'',
      _linha:i+1,
    });
  }
  return rows;
};

const validarLinhas=(rows,contasExistentes)=>{
  const validas=[];const invalidas=[];const duplicadas=[];
  rows.forEach(r=>{
    const erros=[];
    const venc=parseDateBR(r.vencimento);
    if(!r.vencimento)erros.push('vencimento vazio');
    else if(!venc)erros.push('data inválida');
    if(!r.fornecedor)erros.push('fornecedor vazio');
    if(!r.descricao)erros.push('descrição vazia');
    if(!r.segmento)erros.push('segmento vazio');
    else if(r.segmento&&!SEGMENTOS.includes(r.segmento))erros.push(`segmento inválido: "${r.segmento}"`);
    const val=parseCurrencyBR(r.valor);
    if(!r.valor)erros.push('valor vazio');
    else if(isNaN(val)||val<=0)erros.push('valor inválido ou zero');
    if(erros.length>0){invalidas.push({...r,erros});return;}
    // Check duplicidade
    const dup=contasExistentes.find(c=>
      c.vencimento===venc&&
      c.fornecedor===r.fornecedor&&
      c.descricao===r.descricao&&
      Math.abs(c.valor-val)<0.01
    );
    if(dup){duplicadas.push({...r,vencimento:venc,valor:val});return;}
    validas.push({...r,vencimento:venc,valor:val,
      categoria:r.categoria||'Fornecedores',
      tipoDespesa:r.tipoDespesa||'Fornecedor',
      status:r.status||'A vencer',
      formaPag:r.formaPag||'Boleto',
      contaSaida:r.contaSaida||'Banco principal',
      obs:r.obs||'',
    });
  });
  return{validas,invalidas,duplicadas};
};

// ── MODAL DE IMPORTAÇÃO ──
function ImportModal({onClose,onConfirm,contasExistentes}){
  const[step,setStep]=useState('upload');// upload | preview | done
  const[dragging,setDragging]=useState(false);
  const[preview,setPreview]=useState(null);
  const[resultado,setResultado]=useState(null);
  const fileRef=useRef(null);

  const processFile=file=>{
    if(!file)return;
    const name=file.name.toLowerCase();
    if(!name.endsWith('.csv')&&!name.endsWith('.txt'))return alert('Por enquanto, apenas arquivos CSV são suportados.');
    const reader=new FileReader();
    reader.onload=e=>{
      const text=e.target.result;
      const rows=parseCSV(text);
      if(rows.length===0)return alert('O arquivo parece estar vazio ou no formato incorreto.');
      const{validas,invalidas,duplicadas}=validarLinhas(rows,contasExistentes);
      const totalValor=validas.reduce((s,r)=>s+r.valor,0);
      const datas=validas.map(r=>r.vencimento).sort();
      const porSeg={};
      validas.forEach(r=>{if(r.segmento){porSeg[r.segmento]=(porSeg[r.segmento]||0)+r.valor;}});
      setPreview({validas,invalidas,duplicadas,totalValor,dataMin:datas[0]||null,dataMax:datas[datas.length-1]||null,porSeg});
      setStep('preview');
    };
    reader.readAsText(file,'UTF-8');
  };

  const onDrop=e=>{e.preventDefault();setDragging(false);const f=e.dataTransfer.files[0];if(f)processFile(f);};
  const onFileChange=e=>{const f=e.target.files[0];if(f)processFile(f);};

  const confirmar=()=>{
    if(!preview||preview.validas.length===0)return;
    const novos=preview.validas.map(r=>({
      id:genId(),
      vencimento:r.vencimento,
      fornecedor:r.fornecedor,
      descricao:r.descricao,
      segmento:r.segmento,
      categoria:r.categoria,
      tipoDespesa:r.tipoDespesa,
      valor:r.valor,
      status:r.status,
      formaPag:r.formaPag,
      contaSaida:r.contaSaida,
      obs:r.obs,
    }));
    setResultado({adicionados:novos.length,duplicados:preview.duplicadas.length,invalidos:preview.invalidas.length});
    onConfirm(novos);
    setStep('done');
  };

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:600}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div>
            <div style={{fontSize:15,fontWeight:700}}>📥 Importar Boletos / Fornecedores</div>
            {step==='preview'&&<div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Confira a prévia antes de confirmar</div>}
          </div>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>✕ Fechar</button>
        </div>

        {step==='upload'&&(
          <>
            <div
              className={`imp-drop${dragging?' drag':''}`}
              onDragOver={e=>{e.preventDefault();setDragging(true);}}
              onDragLeave={()=>setDragging(false)}
              onDrop={onDrop}
              onClick={()=>fileRef.current.click()}
            >
              <div className="imp-drop-icon">📂</div>
              <div className="imp-drop-text">Clique ou arraste um arquivo CSV aqui</div>
              <div className="imp-drop-sub">Somente arquivos .csv são aceitos nesta versão</div>
              <input ref={fileRef} type="file" accept=".csv,.txt" style={{display:'none'}} onChange={onFileChange}/>
            </div>

            <div style={{marginTop:14,padding:'10px 12px',background:'var(--blue-light)',border:'1px solid var(--blue)',borderRadius:'var(--radius-xs)',fontSize:12,color:'var(--blue-dim)'}}>
              <strong>Colunas obrigatórias:</strong> Vencimento, Fornecedor, Descrição, Segmento, Valor<br/>
              <span style={{color:'var(--text-muted)',marginTop:3,display:'block'}}>Descrição = nome do lançamento no sistema. Ex: Boleto Rossi Frigorífico, Compra semanal Segalas, Boleto Atacadão.</span>
            </div>

            <div style={{marginTop:10,padding:'8px 12px',background:'var(--ink-50)',border:'1px solid var(--border)',borderRadius:'var(--radius-xs)',fontSize:11,color:'var(--text-muted)'}}>
              <strong>Segmentos aceitos:</strong> {SEGMENTOS.join(' · ')}
            </div>

            <div style={{marginTop:12,display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
              <button className="btn btn-secondary" style={{fontSize:12}} onClick={downloadModeloCSV}>⬇ Baixar modelo CSV</button>
              <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
            </div>
          </>
        )}

        {step==='preview'&&preview&&(
          <>
            <div className="imp-preview">
              <div className="imp-preview-title">Prévia da Importação</div>
              <div className="imp-stat"><span className="imp-stat-label">✅ Boletos válidos</span><span className="imp-stat-val green">{preview.validas.length}</span></div>
              <div className="imp-stat"><span className="imp-stat-label">❌ Linhas com erro</span><span className="imp-stat-val red">{preview.invalidas.length}</span></div>
              {preview.duplicadas.length>0&&<div className="imp-stat"><span className="imp-stat-label">⚠️ Duplicados (serão ignorados)</span><span className="imp-stat-val amber">{preview.duplicadas.length}</span></div>}
              <div className="imp-stat"><span className="imp-stat-label">💰 Total a importar</span><span className="imp-stat-val">{fmtFull(preview.totalValor)}</span></div>
              {preview.dataMin&&<div className="imp-stat"><span className="imp-stat-label">📅 Período</span><span className="imp-stat-val">{fmtDate(preview.dataMin)} a {fmtDate(preview.dataMax)}</span></div>}
            </div>

            {Object.keys(preview.porSeg).length>0&&(
              <div style={{marginTop:8,padding:'10px 14px',background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-xs)'}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text-muted)',marginBottom:7}}>Resumo por Segmento</div>
                {Object.entries(preview.porSeg).sort((a,b)=>b[1]-a[1]).map(([seg,val])=>(
                  <div key={seg} className="imp-seg-row"><strong>{seg}</strong><span>{fmtFull(val)}</span></div>
                ))}
              </div>
            )}

            {preview.invalidas.length>0&&(
              <div style={{marginTop:8,padding:'10px 14px',background:'var(--red-light)',border:'1px solid #fca5a5',borderRadius:'var(--radius-xs)'}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--red-dim)',marginBottom:5}}>Linhas com erro (não serão importadas):</div>
                <div className="imp-err-list">
                  {preview.invalidas.map((r,i)=>(
                    <div key={i} className="imp-err-item">Linha {r._linha}: {r.erros.join('; ')}</div>
                  ))}
                </div>
              </div>
            )}

            {preview.validas.length===0?(
              <div style={{marginTop:10,padding:'10px',background:'var(--amber-light)',border:'1px solid var(--amber)',borderRadius:'var(--radius-xs)',fontSize:13,color:'var(--amber-dim)',textAlign:'center'}}>
                Nenhum boleto válido encontrado para importar.
              </div>
            ):(
              <div style={{marginTop:12,display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button className="btn btn-secondary" onClick={()=>setStep('upload')}>← Voltar</button>
                <button className="btn btn-primary" onClick={confirmar}>✓ Confirmar importação de {preview.validas.length} boleto(s)</button>
              </div>
            )}
            {preview.validas.length===0&&(
              <div style={{marginTop:8,display:'flex',justifyContent:'flex-end'}}>
                <button className="btn btn-secondary" onClick={()=>setStep('upload')}>← Voltar</button>
              </div>
            )}
          </>
        )}

        {step==='done'&&resultado&&(
          <>
            <div className="imp-success-banner">✅ Importação concluída: <strong>{resultado.adicionados} boleto(s) adicionado(s).</strong></div>
            {resultado.duplicados>0&&<div style={{marginTop:6,fontSize:12,color:'var(--amber-dim)'}}>{resultado.duplicados} lançamento(s) duplicado(s) foram ignorados.</div>}
            {resultado.invalidos>0&&<div style={{marginTop:4,fontSize:12,color:'var(--red-dim)'}}>{resultado.invalidos} linha(s) não foram importadas por inconsistência nos dados.</div>}
            <div style={{marginTop:12,display:'flex',justifyContent:'flex-end'}}>
              <button className="btn btn-primary" onClick={onClose}>Fechar</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

}
