          <span className={`badge ${stBadge}`}>{isVenc&&c.status!=='Pago'?'Vencido':c.status}</span>
          {c._autoGerado&&<span style={{fontSize:9,background:'var(--purple-light)',color:'var(--purple)',borderRadius:10,padding:'1px 5px',fontWeight:600}}>AUTO</span>}
          {divVinc&&<span style={{fontSize:11,color:'var(--purple)'}}>🏦 {divVinc.banco}</span>}
        </div>
        {c.categoria&&<div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{c.categoria}{c.formaPag?' · '+c.formaPag:''}{c.contaSaida?' · '+c.contaSaida:''}</div>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
        <span style={{fontWeight:700,fontSize:14,color:isVenc?'var(--red)':'var(--text-primary)'}}>{fmtFull(c.valor)}</span>
        {c.status!=='Pago'&&<button className="btn btn-secondary btn-sm" style={{fontSize:11,padding:'3px 8px',color:'var(--green)',borderColor:'var(--green)'}} onClick={()=>onPago(c)}>✓ Pago</button>}
        {!c._autoGerado&&<button className="btn btn-secondary btn-sm" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>onEdit(c)}>✏️</button>}
      </div>
    </div>
  );
}

function Contas({contas,setContas,contasComParcelas,mediaDiariaEntrada,dividas,setDividas,selectedYear,selectedMonth}){
  const now=new Date();
  // Mês/ano vêm do estado GLOBAL (Painel do Dono). Sem useState local nem seletor visual.
  const selYear=selectedYear;
  const selMonth=selectedMonth;
  const[showForm,setShowForm]=useState(false);
  const[editId,setEditId]=useState(null);
  const[filtroStatus,setFiltroStatus]=useState('Todos');
  const[showImport,setShowImport]=useState(false);
  // Agenda inicia no dia atual se ele estiver no mês selecionado, senão no 1º dia do mês
  const isMesAtual=now.getFullYear()===selYear&&now.getMonth()===selMonth;
  const dataInicialAgenda=isMesAtual?today():monthStart(selYear,selMonth);
  const[dataAgenda,setDataAgenda]=useState(dataInicialAgenda);
  // Sempre que o mês GLOBAL mudar, realinha a Agenda do Dia para esse mês
  useEffect(()=>{
    const mAtual=now.getFullYear()===selYear&&now.getMonth()===selMonth;
    setDataAgenda(mAtual?today():monthStart(selYear,selMonth));
    // eslint-disable-next-line
  },[selYear,selMonth]);
  const emptyContaForm={vencimento:today(),fornecedor:'',descricao:'',segmento:'',categoria:'Fornecedores',tipoDespesa:'Variável',valor:'',status:'A vencer',formaPag:'',contaSaida:'Banco principal',obs:'',dividaVinculadaId:''};
  const[form,setForm]=useState(emptyContaForm);
  const hoje=today();
  const em7=addDays(hoje,7),em15=addDays(hoje,15);
  // Início e fim do MÊS SELECIONADO (não mais do mês corrente)
  const iniMes=monthStart(selYear,selMonth);
  const fimMes=monthEnd(selYear,selMonth);

  // Universo: SOMENTE contas do mês selecionado (filtro mensal estrito)
  const contasNoMes=contasComParcelas.filter(c=>c.vencimento>=iniMes&&c.vencimento<=fimMes);

  const pendentes=contasNoMes.filter(c=>c.status!=='Pago'&&c.status!=='Renegociado');
  const tHoje=pendentes.filter(c=>c.vencimento===hoje);
  const tHojeTotal=tHoje.reduce((s,c)=>s+c.valor,0);
  const t7tot=pendentes.filter(c=>c.vencimento>hoje&&c.vencimento<=em7).reduce((s,c)=>s+c.valor,0);
  const t15tot=pendentes.filter(c=>c.vencimento>hoje&&c.vencimento<=em15).reduce((s,c)=>s+c.valor,0);
  const tMes=pendentes.filter(c=>c.vencimento<=fimMes).reduce((s,c)=>s+c.valor,0);
  // "Total vencido": só contas vencidas DENTRO do mês selecionado
  const tvenc=contasNoMes.filter(c=>c.vencimento<hoje&&c.status!=='Pago'&&c.status!=='Renegociado').reduce((s,c)=>s+c.valor,0);
  const nVenc=contasNoMes.filter(c=>c.vencimento<hoje&&c.status!=='Pago'&&c.status!=='Renegociado').length;

  const pressaoDia=c=>{
    if(mediaDiariaEntrada===0)return null;
    const ds=contasComParcelas.filter(x=>x.vencimento===c.vencimento&&x.status!=='Pago').reduce((s,x)=>s+x.valor,0);
    return ds/mediaDiariaEntrada;
  };

  const abaterDivida=(conta,divIds)=>{
    if(conta.tipoDespesa!=='Financeira'||!conta.dividaVinculadaId)return divIds;
    return divIds.map(d=>d.id!==conta.dividaVinculadaId?d:{...d,valorUtilizado:Math.max(0,d.valorUtilizado-conta.valor)});
  };
  const reverterAbatimento=(conta,divIds)=>{
    if(conta.tipoDespesa!=='Financeira'||!conta.dividaVinculadaId)return divIds;
    return divIds.map(d=>d.id!==conta.dividaVinculadaId?d:{...d,valorUtilizado:d.valorUtilizado+conta.valor});
  };

  const openForm=(c=null)=>{
    if(c){
      // Se auto-gerada, abre para editar (salvará como manual)
      setForm({...c,valor:c.valor.toString(),tipoDespesa:c.tipoDespesa||'Variável',dividaVinculadaId:c.dividaVinculadaId||'',contaSaida:c.contaSaida||'Banco principal'});
      setEditId(c._autoGerado?null:c.id);// auto-geradas criam nova entrada manual
    } else {setForm(emptyContaForm);setEditId(null);}
    setShowForm(true);
  };

  const marcarPago=(c)=>{
    const entry={...c,status:'Pago'};
    let nd=[...(dividas||[])];
    if(!c.abateuDivida&&entry.dividaVinculadaId){nd=abaterDivida(entry,nd);entry.abateuDivida=true;}
    // Se é uma conta auto-gerada, promove para conta manual permanente
    if(c._autoGerado){
      setContas([...contas,entry]);
    } else {
      setContas(contas.map(x=>x.id===c.id?entry:x));
    }
    if(setDividas)setDividas(nd);
  };

  const save_=()=>{
    if(!form.vencimento||!form.descricao||!form.valor)return alert('Preencha vencimento, descrição e valor.');
    const entry={...form,valor:parseNum(form.valor),id:editId||genId()};
    let nd=[...(dividas||[])];
    if(editId){
      const ant=contas.find(c=>c.id===editId);
      if(ant&&ant.status==='Pago'&&ant.abateuDivida&&(entry.status!=='Pago'||entry.dividaVinculadaId!==ant.dividaVinculadaId)){
        nd=reverterAbatimento(ant,nd);entry.abateuDivida=false;
      }
      if(entry.status==='Pago'&&entry.dividaVinculadaId&&!entry.abateuDivida){nd=abaterDivida(entry,nd);entry.abateuDivida=true;}
      setContas(contas.map(c=>c.id===editId?entry:c));
    } else {
      if(entry.status==='Pago'&&entry.dividaVinculadaId){nd=abaterDivida(entry,nd);entry.abateuDivida=true;}
      setContas([...contas,entry]);
    }
    if(setDividas)setDividas(nd);
    setShowForm(false);setEditId(null);setForm(emptyContaForm);
  };

  const remove=id=>{
    if(confirm('Remover?')){
      const c=contas.find(x=>x.id===id);
      let nd=[...(dividas||[])];
      if(c&&c.abateuDivida&&c.tipoDespesa==='Financeira'&&c.dividaVinculadaId){nd=reverterAbatimento(c,nd);if(setDividas)setDividas(nd);}
      setContas(contas.filter(c=>c.id!==id));
    }
  };

  const handleImport=novos=>{
    setContas([...contas,...novos]);
  };

  const contasFiltradas=[...contasNoMes]
    .filter(c=>{
      if(filtroStatus==='Todos')return true;
      if(filtroStatus==='Vencido')return c.vencimento<hoje&&c.status!=='Pago'&&c.status!=='Renegociado';
      return c.status===filtroStatus;
    })
    .sort((a,b)=>a.vencimento.localeCompare(b.vencimento));

  const maioresMes=[...contasNoMes].sort((a,b)=>b.valor-a.valor).slice(0,5);

  // ── AGENDA DO DIA ──
  const contasDoDia=[...contasComParcelas].filter(c=>c.vencimento===dataAgenda)
    .sort((a,b)=>{
      // ordena por status (a vencer/vencido primeiro), depois por valor desc
      const rank=s=>s==='Pago'?2:s==='Renegociado'?1:0;
      const d=rank(a.status)-rank(b.status);
      return d!==0?d:b.valor-a.valor;
    });
  const totalDia=contasDoDia.reduce((s,c)=>s+c.valor,0);
  const totalPagoDia=contasDoDia.filter(c=>c.status==='Pago').reduce((s,c)=>s+c.valor,0);
  const totalAbertoDia=contasDoDia.filter(c=>c.status!=='Pago'&&c.status!=='Renegociado').reduce((s,c)=>s+c.valor,0);
  const irDiaAnterior=()=>setDataAgenda(addDays(dataAgenda,-1));
  const irProximoDia=()=>setDataAgenda(addDays(dataAgenda,1));
  const irHoje=()=>setDataAgenda(hoje);
  const labelAgenda=dataAgenda===hoje?'HOJE':(dataAgenda<hoje?'DIA ANTERIOR':'DIA FUTURO');
  const corLabelAgenda=dataAgenda===hoje?'var(--red)':(dataAgenda<hoje?'var(--text-muted)':'var(--blue)');

  return(
    <div>
      {/* ── CARDS ── */}
      <div className="metrics-grid" style={{gridTemplateColumns:'repeat(auto-fit,minmax(195px,1fr))'}}>
        <div className="metric-card" style={{borderTop:`2px solid ${tHojeTotal>0?'var(--red)':'var(--border)'}`}}>
          <div className="metric-label">A Pagar Hoje</div>
          <div className={`metric-value ${tHojeTotal>0?'red':''}`}>{fmtFull(tHojeTotal)}</div>
          <div className="metric-sub">{tHoje.length===0?'Nenhum vencimento':`${tHoje.length} conta(s)`}</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--amber)'}}>
          <div className="metric-label">Próximos 7 dias</div>
          <div className="metric-value amber">{fmtFull(t7tot)}</div>
          <div className="metric-sub">{pendentes.filter(c=>c.vencimento>hoje&&c.vencimento<=em7).length} conta(s)</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--blue)'}}>
          <div className="metric-label">Próximos 15 dias</div>
          <div className="metric-value" style={{color:'var(--blue)'}}>{fmtFull(t15tot)}</div>
          <div className="metric-sub">{pendentes.filter(c=>c.vencimento>hoje&&c.vencimento<=em15).length} conta(s)</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--ink-300)'}}>
          <div className="metric-label">Até fim do mês</div>
          <div className="metric-value">{fmtFull(tMes)}</div>
          <div className="metric-sub">{pendentes.filter(c=>c.vencimento<=fimMes).length} conta(s)</div>
        </div>
        <div className="metric-card" style={{borderTop:`2px solid ${tvenc>0?'var(--red)':'var(--border)'}`}}>
          <div className="metric-label">Total Vencido</div>
          <div className={`metric-value ${tvenc>0?'red':'green'}`}>{fmtFull(tvenc)}</div>
          <div className="metric-sub">{nVenc>0?`${nVenc} em atraso`:'Tudo em dia ✓'}</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--amber)'}}>
          <div className="metric-label">Falta Pagar no Mês</div>
          <div className="metric-value amber">{fmtFull(pendentes.reduce((s,c)=>s+c.valor,0))}</div>
          <div style={{marginTop:3}}><div style={{height:3,background:'var(--ink-100)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',borderRadius:2,background:'var(--amber)',width:(()=>{const total=contasNoMes.reduce((s,c)=>s+c.valor,0);const pago=contasNoMes.filter(c=>c.status==='Pago').reduce((s,c)=>s+c.valor,0);return total>0?pct(pago,total)+'%':'0%';})()}}></div></div><div className="metric-sub" style={{marginTop:2}}>{pendentes.length} conta(s) restante(s)</div></div>
        </div>
      </div>

      {/* ── AGENDA + MAIORES ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
        <div className="card" style={{minWidth:0}}>
          {/* Cabeçalho da Agenda do Dia */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,marginBottom:8,flexWrap:'wrap'}}>
            <div className="card-title" style={{marginBottom:0}}>📅 Agenda do Dia</div>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <button className="btn btn-secondary btn-sm" style={{fontSize:11,padding:'4px 9px'}} onClick={irDiaAnterior} title="Dia anterior">← Anterior</button>
              <button className="btn btn-secondary btn-sm" style={{fontSize:11,padding:'4px 9px',color:dataAgenda===hoje?'var(--ink-900)':'var(--text-muted)',borderColor:dataAgenda===hoje?'var(--ink-900)':'var(--border)',fontWeight:dataAgenda===hoje?700:500}} onClick={irHoje} title="Voltar para hoje">Hoje</button>
              <button className="btn btn-secondary btn-sm" style={{fontSize:11,padding:'4px 9px'}} onClick={irProximoDia} title="Próximo dia">Próximo →</button>
            </div>
          </div>
          {/* Indicação da data selecionada */}
          <div style={{fontSize:11,fontWeight:700,color:corLabelAgenda,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,paddingBottom:6,borderBottom:'1px solid var(--border)'}}>
            {labelAgenda} — {fmtDate(dataAgenda)}
          </div>
          {/* Resumo financeiro do dia */}
          {contasDoDia.length>0&&(
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:10,padding:'8px 10px',background:'var(--ink-50)',borderRadius:6}}>
              <div>
                <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:500,textTransform:'uppercase',letterSpacing:'.05em'}}>Total do dia</div>
                <div style={{fontSize:14,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{fmtFull(totalDia)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:500,textTransform:'uppercase',letterSpacing:'.05em'}}>Pago</div>
                <div style={{fontSize:14,fontWeight:700,color:'var(--green)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{fmtFull(totalPagoDia)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:500,textTransform:'uppercase',letterSpacing:'.05em'}}>Em aberto</div>
                <div style={{fontSize:14,fontWeight:700,color:totalAbertoDia>0?'var(--amber)':'var(--text-muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{fmtFull(totalAbertoDia)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:500,textTransform:'uppercase',letterSpacing:'.05em'}}>Contas</div>
                <div style={{fontSize:14,fontWeight:700,whiteSpace:'nowrap'}}>{contasDoDia.length}</div>
              </div>
            </div>
          )}
          {/* Lista de contas do dia */}
          {contasDoDia.length===0?(
            <div style={{fontSize:13,color:'var(--text-muted)',padding:'18px 0',textAlign:'center'}}>Nenhum pagamento registrado para esta data.</div>
          ):(
            <div className={contasDoDia.length>5?'agenda-dia-lista':''}>
              {contasDoDia.map(c=><ContaAgendaItem key={c.id} c={c} dividas={dividas} onPago={marcarPago} onEdit={openForm}/>)}
            </div>
          )}
        </div>

        <div className="card" style={{minWidth:0}}>
          <div className="card-title">💸 Maiores Pagamentos — {MONTHS[selMonth]} {selYear}</div>
          {maioresMes.length===0?(
            <div style={{fontSize:13,color:'var(--text-muted)',padding:'12px 0',textAlign:'center'}}>Nenhum pagamento no mês</div>
          ):(
            <div>
              {maioresMes.map((c,i)=>{
                const isVenc=c.vencimento<hoje&&c.status!=='Pago';
                const tipoBadge=c.tipoDespesa==='Fixa'?'bg':c.tipoDespesa==='Fornecedor'?'bb':c.tipoDespesa==='Financeira'?'bp':'ba';
                const stBadge=c.status==='Pago'?'bg':isVenc?'br':c.status==='Renegociado'?'ba':'bb';
                return(
                  <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<maioresMes.length-1?'1px solid var(--border)':'none'}}>
                    <div style={{width:22,height:22,borderRadius:'50%',background:i===0?'var(--red)':i===1?'var(--amber)':'var(--ink-200)',color:i<2?'white':'var(--text-muted)',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:'var(--text-primary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.descricao}</div>
                      <div style={{display:'flex',alignItems:'center',gap:5,marginTop:2,flexWrap:'wrap'}}>
                        <span style={{fontSize:11,color:'var(--text-muted)'}}>{fmtDate(c.vencimento)}</span>
                        <span className={`badge ${tipoBadge}`}>{c.tipoDespesa}</span>
                        <span className={`badge ${stBadge}`}>{isVenc&&c.status!=='Pago'?'Vencido':c.status}</span>
                      </div>
                    </div>
                    <div style={{fontWeight:700,fontSize:14,color:isVenc?'var(--red)':'var(--text-primary)',flexShrink:0}}>{fmtFull(c.valor)}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* ── TABELA PRINCIPAL COM FILTROS ── */}
      <div className="section-header" style={{flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          <div className="section-title">Todas as Contas</div>
          {['Todos','A vencer','Pago','Vencido','Renegociado'].map(f=>(
            <button key={f} onClick={()=>setFiltroStatus(f)} style={{padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:500,cursor:'pointer',border:'1px solid',transition:'all .12s',fontFamily:'DM Sans,sans-serif',background:filtroStatus===f?'var(--ink-900)':'var(--surface)',color:filtroStatus===f?'white':'var(--text-secondary)',borderColor:filtroStatus===f?'var(--ink-900)':'var(--border)'}}>
              {f}{f==='Vencido'&&nVenc>0?<span style={{marginLeft:4,background:'var(--red)',color:'white',borderRadius:10,padding:'1px 5px',fontSize:10,fontWeight:700}}>{nVenc}</span>:null}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:7}}>
          <button className="btn btn-secondary" style={{fontSize:13}} onClick={()=>{
            if(!contasNoMes||contasNoMes.length===0){alert('Nenhuma conta no mês selecionado para exportar.');return;}
            const mesLabel=(selMonth+1).toString().padStart(2,'0');
            const nomearq='Zanon_Contas_'+selYear+'_'+mesLabel+'.csv';
            const cabecalho=['Vencimento','Fornecedor','Descrição','Segmento','Valor','Categoria','Tipo de Despesa','Status','Forma de Pagamento','Conta de Saída','Observação'];
            const escapar=v=>{const s=String(v===null||v===undefined?'':v);return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
            const linhas=contasNoMes.map(c=>[c.vencimento||'',c.fornecedor||'',c.descricao||'',c.segmento||'',typeof c.valor==='number'?c.valor.toFixed(2):'',c.categoria||'Fornecedores',c.tipoDespesa||'',c.status||'',c.formaPag||'',c.contaSaida||'',c.obs||''].map(escapar).join(','));
            const csv='﻿'+cabecalho.join(',')+'\n'+linhas.join('\n');
            const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');a.href=url;a.download=nomearq;a.click();URL.revokeObjectURL(url);
          }}>📤 Exportar CSV</button>
          <button className="btn btn-secondary" style={{fontSize:13}} onClick={()=>setShowImport(true)}>📥 Importar</button>
          <button className="btn btn-primary" onClick={()=>openForm()}>+ Adicionar</button>
        </div>
      </div>

      {contasFiltradas.length===0?(
        <div className="empty"><div className="empty-icon">📋</div>{filtroStatus==='Todos'?'Nenhuma conta cadastrada.':'Nenhuma conta com status "'+filtroStatus+'".'}</div>
      ):(
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',boxShadow:'var(--shadow-xs)',overflow:'hidden',marginBottom:12}}>
          <div style={{overflowX:'auto'}}>
            <div style={{overflowY:'auto',maxHeight:400}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                <thead style={{position:'sticky',top:0,zIndex:1}}>
                  <tr>
                    {['Vencimento','Descrição','Tipo','Valor','Status','Forma / Conta','Pressão',''].map((h,i)=>(
                      <th key={i} style={{background:'var(--surface-2)',padding:'8px 12px',textAlign:i===3?'right':'left',fontSize:11,fontWeight:600,color:'var(--text-muted)',letterSpacing:'.05em',textTransform:'uppercase',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {contasFiltradas.map(c=>{
                    const p=pressaoDia(c);
                    const pl=pressaoLabel(c.status!=='Pago'?p:null);
                    const isVenc=c.vencimento<hoje&&c.status!=='Pago';
                    const isHoje=c.vencimento===hoje&&c.status!=='Pago';
                    const divVinc=c.dividaVinculadaId?(dividas||[]).find(d=>d.id===c.dividaVinculadaId):null;
                    const tipoBadge=c.tipoDespesa==='Fixa'?'bg':c.tipoDespesa==='Fornecedor'?'bb':c.tipoDespesa==='Financeira'?'bp':'ba';
                    const stBadge=c.status==='Pago'?'bg':isVenc?'br':c.status==='Renegociado'?'ba':'bb';
                    return(
                      <tr key={c.id} style={{background:isVenc?'#fff5f5':isHoje?'#fffbeb':''}}>
                        <td style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap',fontWeight:isHoje||isVenc?600:400,color:isVenc?'var(--red)':isHoje?'var(--amber-dim)':'var(--text-secondary)'}}>{fmtDate(c.vencimento)}</td>
                        <td style={{padding:'8px 12px',borderBottom:'1px solid var(--border)'}}>
                          <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                            <span style={{fontWeight:500,color:'var(--text-primary)'}}>{c.descricao}</span>
                            {c._autoGerado&&<span style={{fontSize:9,background:'var(--purple-light)',color:'var(--purple)',borderRadius:10,padding:'1px 5px',fontWeight:600}}>AUTO</span>}
                          </div>
                          {c.categoria&&<div style={{fontSize:11,color:'var(--text-muted)'}}>{c.categoria}</div>}
                          {divVinc&&<div style={{fontSize:11,color:'var(--purple)'}}>🏦 {divVinc.banco}{c.abateuDivida?' ✓':''}</div>}
                        </td>
                        <td style={{padding:'8px 12px',borderBottom:'1px solid var(--border)'}}><span className={`badge ${tipoBadge}`}>{c.tipoDespesa||'—'}</span></td>
                        <td style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',textAlign:'right'}}><strong style={{fontSize:14,color:isVenc?'var(--red)':'var(--text-primary)'}}>{fmtFull(c.valor)}</strong></td>
                        <td style={{padding:'8px 12px',borderBottom:'1px solid var(--border)'}}><span className={`badge ${stBadge}`}>{isVenc&&c.status!=='Pago'?'Vencido':c.status}</span></td>
                        <td style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',color:'var(--text-muted)',fontSize:12}}>
                          {c.formaPag&&<div>{c.formaPag}</div>}
                          {c.contaSaida&&<div style={{fontSize:11}}>{c.contaSaida}</div>}
                          {!c.formaPag&&!c.contaSaida&&'—'}
                        </td>
                        <td style={{padding:'8px 12px',borderBottom:'1px solid var(--border)'}}><span style={{fontSize:12,color:pl.color,fontWeight:500}}>{pl.txt}</span></td>
                        <td style={{padding:'8px 12px',borderBottom:'1px solid var(--border)'}}>
                          <div style={{display:'flex',gap:3}}>
                            {c.status!=='Pago'&&<button className="btn btn-secondary btn-sm" style={{color:'var(--green)',borderColor:'var(--green)',fontSize:11}} title="Marcar como pago" onClick={()=>marcarPago(c)}>✓</button>}
                            {!c._autoGerado&&<button className="btn btn-secondary btn-sm" onClick={()=>openForm(c)}>✏️</button>}
                            {!c._autoGerado&&<button className="btn btn-danger btn-sm" onClick={()=>remove(c.id)}>✕</button>}
                            {c._autoGerado&&<span style={{fontSize:10,color:'var(--text-muted)',whiteSpace:'nowrap'}}>via Dívidas</span>}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* ── MODAL ── */}
      {showForm&&(
        <Modal title={editId?'Editar Conta':'Nova Conta a Pagar'} onClose={()=>{setShowForm(false);setEditId(null);setForm(emptyContaForm);}}>
          <div className="form-grid">
            <div className="fg"><label>Vencimento</label><input type="date" value={form.vencimento} onChange={e=>setForm({...form,vencimento:e.target.value})}/></div>
            <div className="fg"><label>Valor (R$)</label><input type="number" placeholder="0" value={form.valor} onChange={e=>setForm({...form,valor:e.target.value})}/></div>
            <div className="fg full"><label>Fornecedor</label><input type="text" placeholder="Ex: Rossi Frigorífico, Segalas..." value={form.fornecedor||''} onChange={e=>setForm({...form,fornecedor:e.target.value})}/></div>
            <div className="fg full"><label>Descrição <span style={{fontSize:10,color:'var(--text-muted)',fontWeight:400}}>— nome do lançamento no sistema (ex: Boleto Rossi Frigorífico)</span></label><input type="text" placeholder="Ex: Boleto Rossi Frigorífico, Compra semanal Segalas..." value={form.descricao} onChange={e=>setForm({...form,descricao:e.target.value})}/></div>
            <div className="fg"><label>Categoria</label><select value={form.categoria} onChange={e=>setForm({...form,categoria:e.target.value})}>{CATEGORIAS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="fg"><label>Tipo de Despesa</label><select value={form.tipoDespesa||'Variável'} onChange={e=>setForm({...form,tipoDespesa:e.target.value,dividaVinculadaId:'',segmento:e.target.value!=='Fornecedor'?'':form.segmento})}>{TIPO_DESPESA.map(t=><option key={t}>{t}</option>)}</select></div>
            {(form.tipoDespesa==='Fornecedor'||form.segmento)&&(
              <div className="fg">
                <label>Segmento {form.tipoDespesa==='Fornecedor'&&<span style={{color:'var(--amber)',fontSize:10}}>recomendado</span>}</label>
                <select value={form.segmento||''} onChange={e=>setForm({...form,segmento:e.target.value})}>
                  <option value="">— Selecione —</option>
                  {SEGMENTOS.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            )}
            <div className="fg"><label>Status</label><select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{STATUS_LIST.map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="fg"><label>Forma de Pagamento</label><select value={form.formaPag} onChange={e=>setForm({...form,formaPag:e.target.value})}><option value="">—</option>{FORMAS_PAG.map(f=><option key={f}>{f}</option>)}</select></div>
            <div className="fg"><label>Conta de Saída</label><select value={form.contaSaida} onChange={e=>setForm({...form,contaSaida:e.target.value})}>{CONTAS_SAIDA.map(c=><option key={c}>{c}</option>)}</select></div>
            {form.tipoDespesa==='Financeira'&&(
              <div className="fg full">
                <label>🏦 Vincular à dívida (opcional)</label>
                <select value={form.dividaVinculadaId} onChange={e=>setForm({...form,dividaVinculadaId:e.target.value})}>
                  <option value="">— Nenhuma (apenas saída de caixa) —</option>
                  {(dividas||[]).filter(d=>d.status==='Ativa').map(d=><option key={d.id} value={d.id}>{d.banco} — {d.tipo} — {fmtFull(d.valorUtilizado)}</option>)}
                </select>
                {form.dividaVinculadaId&&form.status==='Pago'&&<div style={{fontSize:12,color:'var(--purple)',marginTop:3}}>✓ Ao salvar, o valor será abatido da dívida selecionada.</div>}
              </div>
            )}
            <div className="fg full"><label>Observação</label><textarea placeholder="Obs..." value={form.obs} onChange={e=>setForm({...form,obs:e.target.value})}/></div>
          </div>
          <div style={{marginTop:12,display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn btn-secondary" onClick={()=>{setShowForm(false);setEditId(null);setForm(emptyContaForm);}}>Cancelar</button>
            <button className="btn btn-primary" onClick={save_}>Salvar</button>
          </div>
        </Modal>
      )}

      {showImport&&(
        <ImportModal
          onClose={()=>setShowImport(false)}
          onConfirm={handleImport}
          contasExistentes={contasComParcelas}
        />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SECTION 10 — DÍVIDAS
// ─────────────────────────────────────────────────────────────

function pressaoInfo(pctVal){
  if(pctVal<=5)return{label:'Baixa',color:'#16a34a',bg:'#f0fdf4'};
  if(pctVal<=10)return{label:'Média',color:'#d97706',bg:'#fffbeb'};
  if(pctVal<=20)return{label:'Alta',color:'#ea580c',bg:'#fff7ed'};
  return{label:'Crítica',color:'#dc2626',bg:'#fef2f2'};
}

function statusDividaBadge(s){
  if(s==='Ativa')return'br';
  if(s==='Quitada')return'bg';
  if(s==='Renegociada')return'ba';
  return'bb';
}

function DividaPanel({d,entradaMensal,onEdit,onRemove}){
  const[open,setOpen]=useState(false);
  const pIndPct=entradaMensal>0?Math.round((d.parcelaMensal/entradaMensal)*100):0;
  const pInfo=pressaoInfo(pIndPct);
  const stBadge=statusDividaBadge(d.status);
  return(
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',marginBottom:8,boxShadow:'var(--shadow-xs)',overflow:'hidden'}}>
      {/* CABEÇALHO SEMPRE VISÍVEL */}
      <div style={{display:'flex',alignItems:'center',gap:0,cursor:'pointer'}} onClick={()=>setOpen(!open)}>
        {/* Barra lateral de cor por pressão */}
        <div style={{width:4,alignSelf:'stretch',background:pInfo.color,flexShrink:0}}></div>
        <div style={{flex:1,padding:'11px 14px',minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
            {/* Esquerda: banco + tipo + status */}
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',minWidth:0}}>
              <span style={{fontSize:14,fontWeight:700,color:'var(--text-primary)'}}>{d.banco}</span>
              <span className="badge ba" style={{fontSize:10}}>{d.tipo}</span>
              <span className={`badge ${stBadge}`} style={{fontSize:10}}>{d.status}</span>
            </div>
            {/* Direita: métricas principais */}
            <div style={{display:'flex',alignItems:'center',gap:18,flexShrink:0,flexWrap:'wrap'}}>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:500}}>Saldo atual</div>
                <div style={{fontSize:15,fontWeight:700,color:'var(--red)',letterSpacing:'-.02em'}}>{fmtFull(d.valorUtilizado)}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:500}}>Parcela/mês</div>
                <div style={{fontSize:14,fontWeight:700,color:'var(--amber-dim)'}}>{fmtFull(d.parcelaMensal)}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:500}}>Taxa a.m.</div>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text-primary)'}}>{d.taxaJuros?formatPercentBR(d.taxaJuros):'—'}</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:500,marginBottom:2}}>Pressão</div>
                <span style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:600,background:pInfo.bg,color:pInfo.color,border:`1px solid ${pInfo.color}33`}}>{pInfo.label} {pIndPct>0?`· ${pIndPct}%`:''}</span>
              </div>
              <div style={{color:'var(--text-muted)',fontSize:12,marginLeft:4}}>{open?'▲':'▼'}</div>
            </div>
          </div>
        </div>
      </div>

      {/* DETALHES EXPANDÍVEIS */}
      {open&&(
        <div style={{borderTop:'1px solid var(--border)',padding:'12px 18px',background:'var(--surface-2)'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:'8px 16px',marginBottom:12}}>
            {[
              {l:'Valor Original',v:d.valorOriginal?fmtFull(d.valorOriginal):'—'},
              {l:'Saldo Atual',v:fmtFull(d.valorUtilizado),color:'var(--red)'},
              {l:'Parcela Mensal',v:fmtFull(d.parcelaMensal),color:'var(--amber-dim)'},
              {l:'Taxa a.m.',v:d.taxaJuros?formatPercentBR(d.taxaJuros):'—'},
              {l:'Data de Contratação',v:d.dataContratacao?fmtDate(d.dataContratacao):'—'},
              {l:'Prazo Total',v:d.prazoTotal?d.prazoTotal+' meses':'—'},
              {l:'Parcelas Pagas',v:d.parcelasPagas?d.parcelasPagas:'—'},
              {l:'Parcelas Restantes',v:d.parcelasRestantes?d.parcelasRestantes:'—'},
              {l:'Vencimento da Parcela',v:d.vencimento?fmtDate(d.vencimento):'—'},
              {l:'Status',v:d.status},
            ].map(({l,v,color})=>(
              <div key={l}>
                <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:500,marginBottom:2}}>{l}</div>
                <div style={{fontSize:13,fontWeight:600,color:color||'var(--text-primary)'}}>{v}</div>
              </div>
            ))}
          </div>
          {d.obs&&(
            <div style={{fontSize:12,color:'var(--text-muted)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,padding:'7px 10px',marginBottom:10}}>
              <span style={{fontWeight:600,color:'var(--text-secondary)'}}>Obs: </span>{d.obs}
            </div>
          )}
          <div style={{display:'flex',gap:7,justifyContent:'flex-end'}}>
            <button className="btn btn-secondary btn-sm" onClick={e=>{e.stopPropagation();onEdit(d);}}>✏️ Editar</button>
            <button className="btn btn-danger btn-sm" onClick={e=>{e.stopPropagation();onRemove(d.id);}}>✕ Remover</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Dividas({dividas,setDividas,entradaMensal}){
  const[showForm,setShowForm]=useState(false);
  const[editId,setEditId]=useState(null);
  const emptyForm={banco:'',tipo:'Capital de Giro',valorOriginal:'',valorUtilizado:'',parcelaMensal:'',taxaJuros:'',dataContratacao:'',prazoTotal:'',parcelasPagas:'',parcelasRestantes:'',vencimento:'',status:'Ativa',obs:''};
  const[form,setForm]=useState(emptyForm);
  const[filtroStatus,setFiltroStatus]=useState('Todas');
  const[ordenacao,setOrdenacao]=useState('Maior saldo');

  const totalDivida=dividas.reduce((s,d)=>s+d.valorUtilizado,0);
  const totalParcelas=dividas.reduce((s,d)=>s+d.parcelaMensal,0);
  const custoFin=dividas.reduce((s,d)=>s+(d.parcelaMensal*(d.taxaJuros/100||0)),0);
  const pctComp=entradaMensal>0?pct(totalParcelas,entradaMensal):0;
  const maiorTaxa=dividas.length?dividas.reduce((m,d)=>d.taxaJuros>m.taxaJuros?d:m):null;
  const pGeral=pressaoInfo(pctComp);

  const openForm=(d=null)=>{
    if(d){
      setForm({...emptyForm,...d,
        valorOriginal:d.valorOriginal!=null?d.valorOriginal.toString():'',
        valorUtilizado:d.valorUtilizado.toString(),
        parcelaMensal:d.parcelaMensal.toString(),
        taxaJuros:d.taxaJuros!=null?d.taxaJuros.toString():'',
        prazoTotal:d.prazoTotal?.toString()||'',
        parcelasPagas:d.parcelasPagas?.toString()||'',
        parcelasRestantes:d.parcelasRestantes?.toString()||'',
      });
      setEditId(d.id);
    } else {
      setForm(emptyForm);setEditId(null);
    }
    setShowForm(true);
  };

  const save_=()=>{
    if(!form.banco||!form.valorUtilizado)return alert('Preencha banco e saldo atual.');
    const entry={...form,
      valorOriginal:parseCurrencyBR(form.valorOriginal)||null,
      valorUtilizado:parseCurrencyBR(form.valorUtilizado),
      parcelaMensal:parseCurrencyBR(form.parcelaMensal),
      taxaJuros:parsePercentBR(form.taxaJuros),
      prazoTotal:parseInt(form.prazoTotal)||null,
      parcelasPagas:parseInt(form.parcelasPagas)||null,
      parcelasRestantes:parseInt(form.parcelasRestantes)||null,
      id:editId||genId()
    };
    setDividas(editId?dividas.map(d=>d.id===editId?entry:d):[...dividas,entry]);
    setShowForm(false);setEditId(null);setForm(emptyForm);
  };

  const remove=id=>{if(confirm('Remover esta dívida?'))setDividas(dividas.filter(d=>d.id!==id));};

  // Filtro
  let lista=dividas.filter(d=>{
    if(filtroStatus==='Todas')return true;
    return d.status===filtroStatus;
  });
  // Ordenação
  if(ordenacao==='Maior saldo')lista=[...lista].sort((a,b)=>b.valorUtilizado-a.valorUtilizado);
  else if(ordenacao==='Maior parcela')lista=[...lista].sort((a,b)=>b.parcelaMensal-a.parcelaMensal);
  else if(ordenacao==='Maior taxa')lista=[...lista].sort((a,b)=>(b.taxaJuros||0)-(a.taxaJuros||0));
  else lista=[...lista].sort((a,b)=>a.status.localeCompare(b.status));

  return(
    <div>
      {/* CARDS EXECUTIVOS */}
      <div className="metrics-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))'}}>
        <div className="metric-card" style={{borderTop:'2px solid var(--red)'}}>
          <div className="metric-label">Total de Dívidas</div>
          <div className="metric-value red">{fmtFull(totalDivida)}</div>
          <div className="metric-sub">{dividas.length} dívida(s)</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--amber)'}}>
          <div className="metric-label">Parcelas Mensais</div>
          <div className="metric-value amber">{fmtFull(totalParcelas)}</div>
          <div className="metric-sub">{pctComp}% da entrada</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--red)'}}>
          <div className="metric-label">Custo Financeiro Est.</div>
          <div className="metric-value red">{fmtFull(custoFin)}</div>
          <div className="metric-sub">juros sobre parcelas</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--purple)'}}>
          <div className="metric-label">Dívida Mais Cara</div>
          <div className="metric-value" style={{fontSize:13}}>{maiorTaxa?maiorTaxa.banco:'—'}</div>
          <div className="metric-sub">{maiorTaxa?formatPercentBR(maiorTaxa.taxaJuros)+' a.m.':''}</div>
        </div>
      </div>

      {/* PRESSÃO BANCÁRIA */}
      <div className="card mb-3">
        <div className="card-title">Pressão Bancária Geral</div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
          <div style={{flex:1}}>
            <div className="pressao-bar-bg" style={{height:7,borderRadius:4}}>
              <div className="pressao-bar" style={{width:Math.min(pctComp,100)+'%',background:pGeral.color,height:'100%',borderRadius:4,transition:'width .4s'}}></div>
            </div>
          </div>
          <span style={{display:'inline-flex',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:pGeral.bg,color:pGeral.color,border:`1px solid ${pGeral.color}33`,whiteSpace:'nowrap'}}>{pGeral.label} · {pctComp}% da entrada</span>
        </div>
        <div style={{display:'flex',gap:12,fontSize:10,color:'var(--text-muted)'}}>
          <span>🟢 Baixa ≤5%</span><span>🟡 Média 5–10%</span><span>🟠 Alta 10–20%</span><span>🔴 Crítica &gt;20%</span>
        </div>
      </div>

      {/* CONTROLES: filtros + ordenação + botão */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:4}}>
          {['Todas','Ativa','Quitada','Renegociada','Suspensa'].map(f=>(
            <button key={f} onClick={()=>setFiltroStatus(f)} style={{padding:'4px 11px',borderRadius:20,fontSize:11,fontWeight:500,cursor:'pointer',border:`1px solid ${filtroStatus===f?'var(--zanon-red)':'var(--border)'}`,background:filtroStatus===f?'var(--zanon-red)':'var(--surface)',color:filtroStatus===f?'white':'var(--text-muted)',fontFamily:'DM Sans,sans-serif',transition:'all .1s'}}>
              {f}
            </button>
          ))}
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:'var(--text-muted)'}}>Ordenar por</span>
          <select value={ordenacao} onChange={e=>setOrdenacao(e.target.value)} style={{padding:'4px 8px',borderRadius:6,fontSize:11,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text-secondary)',fontFamily:'DM Sans,sans-serif',cursor:'pointer'}}>
            <option>Maior saldo</option>
            <option>Maior parcela</option>
            <option>Maior taxa</option>
            <option>Status</option>
          </select>
          <button className="btn btn-primary btn-sm" onClick={()=>openForm()}>+ Adicionar</button>
        </div>
      </div>

      {/* PAINÉIS INDIVIDUAIS */}
      {lista.length===0?(
        <div className="empty"><div className="empty-icon">🏦</div>
          {filtroStatus==='Todas'?'Nenhuma dívida cadastrada.':'Nenhuma dívida com status "'+filtroStatus+'".'}
        </div>
      ):(
        lista.map(d=>(
          <DividaPanel key={d.id} d={d} entradaMensal={entradaMensal} onEdit={openForm} onRemove={remove}/>
        ))
      )}

      {/* MODAL CADASTRO/EDIÇÃO */}
      {showForm&&(
        <Modal title={editId?'Editar Dívida':'Nova Dívida'} onClose={()=>{setShowForm(false);setEditId(null);setForm(emptyForm);}}>
          <div className="form-grid">
            <div className="fg full"><label>Banco / Credor</label><input type="text" placeholder="Ex: Sicredi, Bradesco, Sicoob..." value={form.banco} onChange={e=>setForm({...form,banco:e.target.value})}/></div>
            <div className="fg"><label>Tipo da dívida</label><select value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})}>{TIPOS_DIVIDA.map(t=><option key={t}>{t}</option>)}</select></div>
            <div className="fg"><label>Status</label><select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{STATUS_DIVIDA.map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="fg"><label>Valor Original (R$)</label><input type="text" placeholder="Ex: 500.000,00" value={form.valorOriginal} onChange={e=>setForm({...form,valorOriginal:e.target.value})}/></div>
            <div className="fg"><label>Saldo Atual (R$)</label><input type="text" placeholder="Ex: 399.306,00" value={form.valorUtilizado} onChange={e=>setForm({...form,valorUtilizado:e.target.value})}/></div>
            <div className="fg"><label>Parcela Mensal (R$)</label><input type="text" placeholder="Ex: 14.210,00" value={form.parcelaMensal} onChange={e=>setForm({...form,parcelaMensal:e.target.value})}/></div>
            <div className="fg"><label>Taxa a.m. (%)</label><input type="text" placeholder="Ex: 1,43" value={form.taxaJuros} onChange={e=>setForm({...form,taxaJuros:e.target.value})}/></div>
            <div className="fg"><label>Data de Contratação</label><input type="date" value={form.dataContratacao} onChange={e=>setForm({...form,dataContratacao:e.target.value})}/></div>
            <div className="fg"><label>Prazo Total (meses)</label><input type="number" placeholder="0" value={form.prazoTotal} onChange={e=>setForm({...form,prazoTotal:e.target.value})}/></div>
            <div className="fg"><label>Parcelas Pagas</label><input type="number" placeholder="0" value={form.parcelasPagas} onChange={e=>setForm({...form,parcelasPagas:e.target.value})}/></div>
            <div className="fg"><label>Parcelas Restantes</label><input type="number" placeholder="0" value={form.parcelasRestantes} onChange={e=>setForm({...form,parcelasRestantes:e.target.value})}/></div>
            <div className="fg"><label>Vencimento da Parcela</label><input type="date" value={form.vencimento} onChange={e=>setForm({...form,vencimento:e.target.value})}/></div>
            <div className="fg full"><label>Observação</label><textarea placeholder="Condições, renegociações, notas..." value={form.obs} onChange={e=>setForm({...form,obs:e.target.value})}/></div>
          </div>
          <div style={{marginTop:12,display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn btn-secondary" onClick={()=>{setShowForm(false);setEditId(null);setForm(emptyForm);}}>Cancelar</button>
            <button className="btn btn-primary" onClick={save_}>Salvar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── RETIRADAS ──
function Retiradas({retiradas,setRetiradas,entradaMensal,config,setConfig}){
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({data:today(),valor:'',obs:''});
  const total=retiradas.reduce((s,r)=>s+r.valor,0);
  const pctRet=entradaMensal>0?pct(total,entradaMensal):0;
  const save_=()=>{
    if(!form.data||!form.valor)return alert('Preencha data e valor.');
    setRetiradas([...retiradas,{id:genId(),...form,valor:parseNum(form.valor)}]);
    setForm({data:today(),valor:'',obs:''});setShowForm(false);
  };
  const remove=id=>{if(confirm('Remover?'))setRetiradas(retiradas.filter(r=>r.id!==id));};
  const sorted=[...retiradas].sort((a,b)=>b.data.localeCompare(a.data));
  return(
    <div>
      <div className="metrics-grid">
        <div className="metric-card"><div className="metric-label">Total Retirado</div><div className="metric-value red">{fmtFull(total)}</div><div className="metric-sub">{retiradas.length} retirada(s)</div></div>
        <div className="metric-card"><div className="metric-label">% da Entrada</div><div className={`metric-value ${pctRet>25?'red':pctRet>15?'amber':'green'}`}>{pctRet}%</div><div className="metric-sub">{pctRet>25?'Elevado':'Dentro do limite'}</div></div>
        <div className="metric-card">
          <div className="metric-label">Retirada Ideal/Mês (R$)</div>
          <div className="metric-value" style={{fontSize:13}}>{fmtFull(config.retiradaIdeal)}</div>
          <input style={{marginTop:4,width:'100%',padding:'3px 6px',fontSize:10,borderRadius:4,border:'1px solid var(--border)',background:'var(--surface-2)',color:'var(--text-muted)',outline:'none',fontFamily:'DM Sans,sans-serif'}} type="number" value={config.retiradaIdeal} onChange={e=>setConfig({...config,retiradaIdeal:parseNum(e.target.value)})} placeholder="Meta mensal"/>
        </div>
      </div>
      <div className="section-header"><div className="section-title">Histórico de Retiradas</div><button className="btn btn-primary" onClick={()=>setShowForm(true)}>+ Adicionar</button></div>
      {sorted.length===0?<div className="empty"><div className="empty-icon">👤</div>Nenhuma retirada cadastrada.</div>:(
        <div className="tw">
          <table><thead><tr><th>Data</th><th>Valor</th><th>Observação</th><th></th></tr></thead>
          <tbody>{sorted.map(r=>(<tr key={r.id}><td>{fmtDate(r.data)}</td><td><strong>{fmtFull(r.valor)}</strong></td><td style={{color:'var(--text-muted)'}}>{r.obs||'—'}</td><td><button className="btn btn-danger btn-sm" onClick={()=>remove(r.id)}>✕</button></td></tr>))}</tbody></table>
        </div>
      )}
      {showForm&&(
        <Modal title="Nova Retirada" onClose={()=>setShowForm(false)}>
          <div className="form-grid">
            <div className="fg"><label>Data</label><input type="date" value={form.data} onChange={e=>setForm({...form,data:e.target.value})}/></div>
            <div className="fg"><label>Valor (R$)</label><input type="number" placeholder="0" value={form.valor} onChange={e=>setForm({...form,valor:e.target.value})}/></div>
            <div className="fg full"><label>Observação</label><textarea placeholder="Motivo, destino..." value={form.obs} onChange={e=>setForm({...form,obs:e.target.value})}/></div>
          </div>
          <div style={{marginTop:12,display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn btn-secondary" onClick={()=>setShowForm(false)}>Cancelar</button>
            <button className="btn btn-primary" onClick={save_}>Salvar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── PROJEÇÃO ──
function Projecao({entradas,contas,config,setConfig}){
  const chartRef=useRef(null);
  const hoje=today();

  // ── MOTOR: média de entrada por DIA DA SEMANA (7 médias) ──
  // Janela: últimos 60 dias para ter ao menos ~8 amostras de cada dia da semana.
  const janelaIni=addDays(hoje,-60);
  const entJanela=entradas.filter(e=>e.data>=janelaIni&&e.data<=hoje);
  // agrega total por data
  const totalPorData={};
  entJanela.forEach(e=>{totalPorData[e.data]=(totalPorData[e.data]||0)+e.total;});
  // separa por dia da semana (0=Dom, 6=Sáb)
  const somaDow=[0,0,0,0,0,0,0];
  const cntDow=[0,0,0,0,0,0,0];
  Object.keys(totalPorData).forEach(d=>{
    const dow=new Date(d+'T12:00:00').getDay();
    somaDow[dow]+=totalPorData[d];
    cntDow[dow]+=1;
  });
  // média geral (fallback) — só dias com venda
  const diasComVenda=Object.keys(totalPorData).length;
  const totalGeral=Object.values(totalPorData).reduce((s,v)=>s+v,0);
  const mediaGeral=diasComVenda>0?totalGeral/diasComVenda:0;
  // média por dia da semana, com fallback para média geral se aquele dow não teve amostra
  const mediaDow=[0,1,2,3,4,5,6].map(d=>cntDow[d]>0?somaDow[d]/cntDow[d]:mediaGeral);

  // ── PROJEÇÃO DIA A DIA ──
  const rows=[];let saldoAcum=config.saldoInicial||0;
  for(let i=0;i<30;i++){
    const data=addDays(hoje,i);
    const dow=new Date(data+'T12:00:00').getDay();
    const entradaPrev=mediaDow[dow];
    const contasDia=contas.filter(c=>c.vencimento===data&&c.status!=='Pago');
    const saidas=contasDia.reduce((s,c)=>s+c.valor,0);
    const saldoInicial=saldoAcum;
    const saldoFinal=saldoInicial+entradaPrev-saidas;
    saldoAcum=saldoFinal;
    const pressao=entradaPrev>0?saidas/entradaPrev:(saidas>0?99:0);
    let obs='';
    if(saldoFinal<0)obs='🔴 Saldo negativo';
    else if(pressao>2)obs='⚠️ Alta pressão';
    rows.push({data,dow,saldoInicial,entradas:entradaPrev,saidas,saldoFinal,obs,pressao,contasDia});
  }

  // ── MÉTRICAS DERIVADAS ──
  const saldoFinais=rows.map(r=>r.saldoFinal);
  const menorSaldo=Math.min(...saldoFinais);
  const diaMenor=rows.find(r=>r.saldoFinal===menorSaldo);
  const diasNegativos=rows.filter(r=>r.saldoFinal<0).length;
  const primeiroDiaNeg=rows.find(r=>r.saldoFinal<0);
  const saldoHoje=config.saldoInicial||0;
  const saldoFim30=rows[rows.length-1]?.saldoFinal??saldoHoje;

  // ── BLOCO 1: VEREDITO ──
  // Regras:
  //  - "danger" se há qualquer dia com saldo negativo;
  //  - "warn" se menor saldo é positivo mas < reserva sugerida (= pico semanal de saídas);
  //  - "ok" caso contrário.
  // Reserva sugerida = maior soma de saídas em uma janela de 7 dias da projeção.
  let picoSemana=0;
  for(let i=0;i<=rows.length-7;i++){
    const s=rows.slice(i,i+7).reduce((a,r)=>a+r.saidas,0);
    if(s>picoSemana)picoSemana=s;
  }
  let veredito,vTag,vTitle,vSub;
  if(diasNegativos>0&&primeiroDiaNeg){
    const diasAte=Math.round((new Date(primeiroDiaNeg.data)-new Date(hoje))/(1000*60*60*24));
    veredito='danger';
    vTag='🔴 Caixa não fecha';
    vTitle=`Déficit de ${fmtFull(Math.abs(primeiroDiaNeg.saldoFinal))} em ${fmtDate(primeiroDiaNeg.data)}`;
    vSub=`Primeiro dia negativo em ${diasAte} dia${diasAte===1?'':'s'} — ${diasNegativos} dia${diasNegativos===1?'':'s'} negativo${diasNegativos===1?'':'s'} no horizonte de 30 dias.`;
  }else if(menorSaldo<picoSemana&&picoSemana>0){
    veredito='warn';
    vTag='🟡 Caixa aperta';
    vTitle=`Saldo mínimo de ${fmtFull(menorSaldo)} em ${diaMenor?fmtDate(diaMenor.data):'-'}`;
    vSub=`Saldo fica abaixo da reserva sugerida (${fmtFull(picoSemana)}, pico semanal de saídas). Risco moderado.`;
  }else{
    veredito='ok';
    vTag='🟢 Caixa fecha';
    vTitle=`Menor saldo previsto: ${fmtFull(menorSaldo)} em ${diaMenor?fmtDate(diaMenor.data):'-'}`;
    vSub='Projeção saudável para os próximos 30 dias com base nos dados atuais.';
  }

  // ── BLOCO 2: gráfico simplificado (1 linha de saldo) ──
  useChart(chartRef,{
    type:'line',
    data:{
      labels:rows.map(r=>fmtDate(r.data).slice(0,5)),
      datasets:[{
        label:'Saldo projetado',
        data:rows.map(r=>r.saldoFinal),
        borderColor:veredito==='danger'?'#dc2626':veredito==='warn'?'#f59e0b':'#16a34a',
        backgroundColor:veredito==='danger'?'rgba(220,38,38,0.08)':veredito==='warn'?'rgba(245,158,11,0.08)':'rgba(22,163,74,0.08)',
        fill:true,
        tension:0.25,
        borderWidth:2,
        pointRadius:rows.map(r=>r.saldoFinal===menorSaldo?5:(r.saidas>0&&r.pressao>2?3:0)),
        pointBackgroundColor:rows.map(r=>r.saldoFinal===menorSaldo?'#dc2626':'#f59e0b'),
        pointBorderColor:'#fff',
        pointBorderWidth:1.5,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title:items=>{const r=rows[items[0].dataIndex];return fmtDate(r.data);},
            label:ctx=>{const r=rows[ctx.dataIndex];const arr=['Saldo: '+formatCurrency(r.saldoFinal)];if(r.saidas>0)arr.push('Saídas do dia: '+formatCurrency(r.saidas));arr.push('Entrada prevista: '+formatCurrency(r.entradas));return arr;}
          }
        }
      },
      scales:{
        y:{
          ticks:{callback:v=>formatCurrency(v),font:{size:10}},
          grid:{color:'rgba(15,23,42,0.05)'}
        },
        x:{
          ticks:{font:{size:9},maxRotation:0,autoSkipPadding:12},
          grid:{display:false}
        }
      }
    }
  });

  // ── BLOCO 3: PONTOS CRÍTICOS ──
  // Top 3 dias por "criticidade": prioriza dias que zeram/negativam o saldo;
  // depois dias com pressão (saídas/entrada > 2).
  const diasCriticos=rows
    .filter(r=>r.saidas>0&&(r.saldoFinal<0||r.pressao>1.5))
    .map(r=>({
      ...r,
      score:(r.saldoFinal<0?1000000:0)+r.saidas*(r.pressao||1)
    }))
    .sort((a,b)=>b.score-a.score)
    .slice(0,3);

  // Descrição de causa para um dia crítico
  const causaDia=r=>{
    const n=r.contasDia.length;
    if(n===0)return 'Pressão sem contas registradas neste dia';
    const top=r.contasDia.slice().sort((a,b)=>b.valor-a.valor)[0];
    if(n===1)return `1 conta: ${top.fornecedor||top.descricao||'sem descrição'} (${fmtFull(top.valor)})`;
    return `${n} contas no mesmo dia — maior: ${top.fornecedor||top.descricao||'sem descrição'} (${fmtFull(top.valor)})`;
  };

  // ── BLOCO 4: AÇÕES RECOMENDADAS ──
  // Geração de ações concretas com impacto estimado em R$.
  const acoes=[];

  // (a) Renegociar a maior conta dos dias críticos negativos
  if(primeiroDiaNeg){
    const contasNeg=primeiroDiaNeg.contasDia.slice().sort((a,b)=>b.valor-a.valor);
    if(contasNeg.length>0){
      const c=contasNeg[0];
      acoes.push({
        text:`Renegociar vencimento de ${fmtFull(c.valor)} (${c.fornecedor||c.descricao||'fornecedor'}) de ${fmtDate(c.vencimento)} para a semana seguinte`,
        impacto:`Recupera ~${fmtFull(c.valor)} no caixa do dia ${fmtDate(primeiroDiaNeg.data)}`
      });
    }
  }

  // (b) Antecipar recebíveis se houver dia negativo
  if(primeiroDiaNeg&&mediaGeral>0){
    const buraco=Math.abs(primeiroDiaNeg.saldoFinal);
    const valorAnt=Math.ceil(buraco/1000)*1000;
    acoes.push({
      text:`Antecipar ${fmtFull(valorAnt)} em recebíveis de cartão (3 a 5 dias úteis)`,
      impacto:`Cobre o déficit de ${fmtFull(buraco)} em ${fmtDate(primeiroDiaNeg.data)}`
    });
  }

  // (c) Redistribuir vencimentos de dias com pressão alta sem ser negativo
  const diasPressao=rows.filter(r=>r.saidas>0&&r.pressao>2&&r.saldoFinal>=0);
  if(diasPressao.length>0){
    const d=diasPressao[0];
    const c=d.contasDia.slice().sort((a,b)=>b.valor-a.valor)[0];
    if(c)acoes.push({
      text:`Redistribuir vencimento de ${fmtFull(c.valor)} (${c.fornecedor||c.descricao||'fornecedor'}) de ${fmtDate(d.data)} para dia de menor pressão`,
      impacto:`Reduz pressão de ${d.pressao.toFixed(1)}x para ~${((d.saidas-c.valor)/Math.max(d.entradas,1)).toFixed(1)}x da média do dia`
    });
  }

  // (d) Reserva mínima recomendada se está OK mas sem folga
  if(veredito==='ok'&&menorSaldo<picoSemana*1.5&&picoSemana>0){
    acoes.push({
      text:`Constituir reserva mínima de ${fmtFull(picoSemana)} (equivalente ao pico semanal de saídas)`,
      impacto:'Protege contra variações inesperadas de entrada ou despesas extras'
    });
  }

  // (e) Caso não haja ações específicas (cenário saudável)
  if(acoes.length===0){
    acoes.push({
      text:'Manter o ritmo atual de entradas e o controle de vencimentos',
      impacto:'Cenário projetado é saudável — sem ações corretivas necessárias agora'
    });
    acoes.push({
      text:'Revisar a projeção semanalmente conforme novas entradas e contas chegarem',
      impacto:'Mantém antecipação de problemas com 7+ dias de folga'
    });
  }

  return(
    <div>
      {/* ── BLOCO 1: VEREDITO ── */}
      <div className={`prj-verdict ${veredito}`}>
        <div className="prj-verdict-main">
          <div className="prj-verdict-tag">{vTag}</div>
          <div className="prj-verdict-title">{vTitle}</div>
          <div className="prj-verdict-sub">{vSub}</div>
        </div>
        <div className="prj-saldo-input">
          <label>Saldo hoje</label>
          <input type="number" value={config.saldoInicial} onChange={e=>setConfig({...config,saldoInicial:parseNum(e.target.value)})}/>
        </div>
        <div className="prj-kpis">
          <div className="prj-kpi">
            <div className="prj-kpi-lbl">Menor saldo</div>
            <div className={`prj-kpi-val ${menorSaldo<0?'neg':'pos'}`}>{fmtFull(menorSaldo)}</div>
            <div className="prj-kpi-sub">{diaMenor?fmtDate(diaMenor.data):'-'}</div>
          </div>
          <div className="prj-kpi">
            <div className="prj-kpi-lbl">Saldo em 30 dias</div>
            <div className={`prj-kpi-val ${saldoFim30<0?'neg':'pos'}`}>{fmtFull(saldoFim30)}</div>
            <div className="prj-kpi-sub">{fmtDate(rows[rows.length-1].data)}</div>
          </div>
        </div>
      </div>

      {/* ── BLOCO 2: GRÁFICO SIMPLIFICADO ── */}
      <div className="prj-block" style={{marginBottom:12}}>
        <div className="prj-block-hdr">
          <div className="prj-block-ico">📈</div>
          <div className="prj-block-title">Linha do tempo do caixa — 30 dias</div>
          <div className="prj-block-count">Entrada estimada por dia da semana</div>
        </div>
        <div style={{position:'relative',height:200}}><canvas ref={chartRef}></canvas></div>
      </div>

      {/* ── BLOCOS 3 e 4 lado a lado: Pontos Críticos | Ações ── */}
      <div className="prj-grid-2c">
        <div className="prj-block">
          <div className="prj-block-hdr">
            <div className="prj-block-ico">⚠️</div>
            <div className="prj-block-title">Pontos críticos</div>
            <div className="prj-block-count">{diasCriticos.length>0?`top ${diasCriticos.length}`:'—'}</div>
          </div>
          {diasCriticos.length===0?(
            <div className="prj-empty">Sem dias de pressão crítica nos próximos 30 dias.</div>
          ):diasCriticos.map((r,i)=>(
            <div key={i} className={`prj-crit-item${r.saldoFinal<0?' danger':''}`}>
              <div className="prj-crit-top">
                <div className="prj-crit-date">{fmtDate(r.data)} — {r.saldoFinal<0?'déficit no caixa':`pressão ${r.pressao.toFixed(1)}x`}</div>
                <div className="prj-crit-amount">{fmtFull(r.saidas)}</div>
              </div>
              <div className="prj-crit-cause">{causaDia(r)}</div>
              <div className="prj-crit-impact">
                {r.saldoFinal<0?`Saldo do dia: ${fmtFull(r.saldoFinal)}`:`Saldo após o dia: ${fmtFull(r.saldoFinal)}`}
              </div>
            </div>
          ))}
        </div>

        <div className="prj-block">
          <div className="prj-block-hdr">
            <div className="prj-block-ico">🎯</div>
            <div className="prj-block-title">Ações recomendadas</div>
            <div className="prj-block-count">{acoes.length} {acoes.length===1?'ação':'ações'}</div>
          </div>
          {acoes.map((a,i)=>(
            <div key={i} className="prj-action-item">
              <div className="prj-action-num">{i+1}</div>
              <div className="prj-action-body">
                <div className="prj-action-text">{a.text}</div>
                <div className="prj-action-impact">→ {a.impacto}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* ── TABELA DETALHADA COLAPSADA ── */}
      <details className="prj-details">
        <summary>Ver projeção dia a dia (30 linhas)</summary>
        <div className="tw">
          <table><thead><tr><th>Data</th><th>Saldo Inicial</th><th>Entradas Prev.</th><th>Saídas Prev.</th><th>Saldo Final</th><th>Situação</th></tr></thead>
          <tbody>{rows.map((r,i)=>(
            <tr key={i} className={r.saldoFinal<0?'row-danger':r.obs.includes('pressão')?'row-warn':''}>
              <td>{fmtDate(r.data)}</td><td>{fmt(r.saldoInicial)}</td>
              <td style={{color:'var(--green)'}}>{fmt(r.entradas)}</td>
              <td style={{color:'var(--red)'}}>{r.saidas>0?fmtFull(r.saidas):'—'}</td>
              <td><strong style={{color:r.saldoFinal<0?'var(--red)':r.saldoFinal<5000?'var(--amber)':'var(--green)'}}>{fmtFull(r.saldoFinal)}</strong></td>
              <td style={{fontSize:11}}>{r.obs||'✓ Normal'}</td>
            </tr>
          ))}</tbody></table>
        </div>
      </details>
    </div>
  );
}

// ── DIAGNÓSTICO ──
function Diagnostico({entradas,contas,dividas,retiradas,config}){
  const hoje=today();const em30=addDays(hoje,30);
  const entMes=entradas.filter(e=>e.data>=addDays(hoje,-30));
  const totalEnt=entMes.reduce((s,e)=>s+e.total,0);
  const diasV=new Set(entMes.map(e=>e.data)).size;
  const media=diasV>0?totalEnt/diasV:0;
  const contasFut=contas.filter(c=>c.vencimento>=hoje&&c.vencimento<=em30&&c.status!=='Pago');
  const totalSai=contasFut.reduce((s,c)=>s+c.valor,0);
  const vencidas=contas.filter(c=>c.vencimento<hoje&&c.status!=='Pago');
  const totalVenc=vencidas.reduce((s,c)=>s+c.valor,0);
  const semaMap={};contasFut.forEach(c=>{const s=weekOf(c.vencimento);semaMap[s]=(semaMap[s]||0)+c.valor;});
  const semanas=Object.entries(semaMap).sort((a,b)=>b[1]-a[1]);
  const maxSemConc=semanas[0]?pct(semanas[0][1],totalSai):0;
  const totalParcelas=dividas.reduce((s,d)=>s+d.parcelaMensal,0);
  const pctDivEnt=pct(totalParcelas,totalEnt);
  const retiradaMes=retiradas.filter(r=>r.data>=addDays(hoje,-30)).reduce((s,r)=>s+r.valor,0);
  const pctRet=pct(retiradaMes,totalEnt);
  const saldoProj=config.saldoInicial+(media*30)-totalSai;
  const diagnosticos=[];const acoes=[];
  if(totalEnt===0){diagnosticos.push({icon:'📊',text:'Nenhuma entrada registrada. Cadastre as vendas para gerar o diagnóstico.',tipo:'blue'});}
  else{

    const csv=linhas.map(l=>l.join(';')).join('\n');

// ── GERAÇÃO AUTOMÁTICA DE PARCELAS DE DÍVIDAS ──
// Gera uma conta a pagar virtual a partir de uma dívida ativa com parcela
const dividaToContaId=d=>`auto_divida_${d.id}`;
// Helper: gera lista de vencimentos mensais a partir de uma data base, mantendo o mesmo dia,
// respeitando meses com menos dias (ex: dia 31 → último dia do mês).
const gerarVencimentosMensais=(base,qtdMeses)=>{
  const[by,bm,bd]=base.split('-').map(Number);
  const out=[];
  for(let i=0;i<qtdMeses;i++){
    const y=by,m=bm-1+i;
    const dt=new Date(y,m+1,0); // último dia do mês alvo
    const lastDay=dt.getDate();
    const day=Math.min(bd,lastDay);
    const yy=dt.getFullYear(),mm=dt.getMonth()+1;
    out.push(`${yy}-${String(mm).padStart(2,'0')}-${String(day).padStart(2,'0')}`);
  }
  return out;
};

// Gera TODAS as parcelas mensais recorrentes da dívida em janela ampla (24 meses à frente).
// As parcelas têm IDs distintos por vencimento e podem ser marcadas como pagas individualmente.
const gerarParcelasDivida=d=>{
  if(!d.parcelaMensal||d.parcelaMensal<=0)return[];
  if(!d.vencimento)return[];
  if(d.status!=='Ativa')return[];
  if((d.valorUtilizado||0)<=0)return[];
  // Janela: do mês de início até 24 meses à frente
  const vencs=gerarVencimentosMensais(d.vencimento,24);
  return vencs.map((venc,idx)=>({
    id:`${dividaToContaId(d)}__${venc}`,
    descricao:`Parcela ${d.banco}`,
    categoria:'Banco/Juros',
    tipoDespesa:'Financeira',
    valor:d.parcelaMensal,
    vencimento:venc,
    status:'A vencer',
    formaPag:'Débito em conta',
    contaSaida:'Banco principal',
    obs:`Gerado automaticamente — dívida: ${d.banco} (${d.tipo})`,
    dividaVinculadaId:d.id,
    _autoGerado:true,
    _parcelaSeq:idx+1,
  }));
};

// Mantém compatibilidade com chamadas antigas (retorna 1ª parcela)
const gerarParcelaDivida=d=>{const ps=gerarParcelasDivida(d);return ps[0]||null;};

// Expande contas com tipoDespesa='Fixa' para meses seguintes (janela 24 meses),
// criando "instâncias virtuais" para cada mês posterior ao da conta original,
// sem duplicar nem sobrescrever contas manuais já existentes em outros meses.
const expandirFixasRecorrentes=contas=>{
  const fixas=contas.filter(c=>c.tipoDespesa==='Fixa'&&c.vencimento);
  if(fixas.length===0)return[];
  const result=[];
  fixas.forEach(f=>{
    const vencs=gerarVencimentosMensais(f.vencimento,24);
    // primeira posição é o próprio mês original — já está em "contas", pula
    for(let i=1;i<vencs.length;i++){
      const venc=vencs[i];
      // Não duplica se já existir conta manual da mesma fixa neste mês
      const jaExiste=contas.find(c=>
        c.tipoDespesa==='Fixa'&&
        c.descricao===f.descricao&&
        monthOf(c.vencimento)===monthOf(venc)&&
        c.id!==f.id
      );
      if(jaExiste)continue;
      result.push({
        ...f,
        id:`${f.id}__fixa_${venc}`,
        vencimento:venc,
        status:'A vencer',
        _autoGerado:true,
        _fixaRecorrenteOrigemId:f.id,
        obs:(f.obs||'')+(f.obs?' · ':'')+`Recorrência automática (mês ${monthOf(venc)})`,
      });
    }
  });
  return result;
};

const gerarParcelaDividaLegacy=null; // legado removido
// Mescla contas manuais com parcelas automáticas de dívidas + fixas recorrentes (sem duplicar)
const mergeContasComParcelas=(contas,dividas)=>{
  const manuaisIds=new Set(contas.map(c=>c.id));
  const autoContas=dividas
    .flatMap(gerarParcelasDivida)
    .filter(c=>!manuaisIds.has(c.id));
  const resultado=[...contas];
  autoContas.forEach(auto=>{
    // Se já existe conta manual vinculada à mesma dívida no mesmo vencimento, não duplica
    const jaExiste=contas.find(c=>
      c.dividaVinculadaId===auto.dividaVinculadaId&&
      c.vencimento===auto.vencimento
    );
    if(!jaExiste)resultado.push(auto);
  });
  // Adiciona instâncias mensais recorrentes das despesas Fixas
  const fixasRecorrentes=expandirFixasRecorrentes(contas);
  fixasRecorrentes.forEach(f=>{
    if(!manuaisIds.has(f.id))resultado.push(f);
  });
  return resultado;
};
