<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado Zanon — Gestão de Caixa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --zanon-red:#c0392b;--zanon-red-dark:#a93226;
  --zanon-yellow:#f5c518;
  /* Verde Petronas — destaque visual principal do header e elementos ativos */
  --petronas:#00A19B;--petronas-dark:#008C86;--petronas-soft:rgba(0,161,155,.12);
  /* Cinza chumbo do header (mais claro que preto) */
  --header-charcoal:#2F3437;--header-charcoal-soft:#3A4045;
  --green:#16a34a;--green-light:#f0fdf4;--green-dim:#15803d;--green-mid:#4ade80;
  --amber:#d97706;--amber-light:#fffbeb;--amber-dim:#b45309;
  --red:#dc2626;--red-light:#fef2f2;--red-dim:#b91c1c;
  --blue:#2563eb;--blue-light:#eff6ff;--blue-dim:#1d4ed8;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --ink-900:#0f172a;--ink-800:#1e293b;--ink-700:#334155;
  --ink-500:#64748b;--ink-400:#94a3b8;--ink-300:#cbd5e1;
  --ink-200:#e2e8f0;--ink-100:#f1f5f9;--ink-50:#f8fafc;
  --text-primary:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;
  --border:#dcdcd6;
  /* Fundo off-white acinzentado McLaren-inspired */
  --bg:#E8E7E3;--surface:#ffffff;--surface-2:#f4f3ef;
  /* Header premium em cinza chumbo (charcoal) */
  --header-bg:#2F3437;
  --header-border:rgba(255,255,255,.10);
  --header-text:#f4f3ef;
  --header-text-muted:#a8aeb2;
  --radius:10px;--radius-sm:7px;--radius-xs:5px;
  --shadow-xs:0 1px 2px rgba(15,23,42,0.04);
  --shadow:0 1px 3px rgba(15,23,42,0.06),0 1px 2px rgba(15,23,42,0.04);
  --shadow-md:0 4px 18px rgba(15,23,42,0.08);
  --shadow-lg:0 8px 28px rgba(15,23,42,0.12);
  --shadow-header:0 1px 0 rgba(15,23,42,0.04),0 2px 12px rgba(15,23,42,0.05);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* APP SHELL */
.app-shell{display:flex;flex-direction:column;min-height:100vh;}

/* TOP HEADER — Cinza chumbo premium com acabamento Verde Petronas */
.app-header{
  background:var(--header-bg);
  height:62px;
  display:flex;
  align-items:center;
  padding:0 24px;
  gap:18px;
  position:sticky;top:0;z-index:100;
  border-bottom:2px solid var(--petronas);
  box-shadow:0 1px 0 rgba(0,0,0,.18),0 2px 12px rgba(0,0,0,.10);
}
.hdr-logo{
  display:flex;align-items:center;flex-shrink:0;
  background:#ffffff;
  padding:6px 12px;
  border-radius:8px;
  box-shadow:0 1px 2px rgba(0,0,0,.20),0 0 0 1px rgba(255,255,255,.04);
}
.hdr-div{width:1px;height:30px;background:var(--header-border);flex-shrink:0;}
.hdr-nav{display:flex;align-items:stretch;gap:2px;flex:1;overflow:hidden;height:100%;}
.hdr-grp{display:flex;align-items:stretch;gap:2px;height:100%;}
.hdr-grp-lbl{
  font-size:9.5px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--header-text-muted);
  padding:0 7px 0 12px;white-space:nowrap;
  display:flex;align-items:center;
}
.hdr-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:0 13px;height:100%;
  cursor:pointer;
  color:var(--header-text);
  font-size:11.5px;font-weight:600;
  letter-spacing:.09em;text-transform:uppercase;
  transition:color .15s;
  border:none;background:none;
  font-family:'DM Sans',sans-serif;white-space:nowrap;
  position:relative;
}
.hdr-btn::after{
  content:'';position:absolute;left:13px;right:13px;bottom:0;
  height:2.5px;background:transparent;
  transition:background .15s;
  border-radius:1px;
}
.hdr-btn:hover{color:var(--petronas);}
.hdr-btn.active{color:#ffffff;}
.hdr-btn.active::after{background:var(--petronas);}
.hdr-btn .dot{display:none;}
.hdr-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0;}
.hdr-date{
  font-size:11.5px;color:var(--header-text-muted);white-space:nowrap;
  letter-spacing:.04em;text-transform:capitalize;
}
.hdr-clear{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;
  font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;
  border:1px solid var(--header-border);
  background:transparent;
  color:var(--header-text);
  font-family:'DM Sans',sans-serif;
  transition:all .15s;
  border-radius:2px;
}
.hdr-clear:hover{
  background:rgba(255,255,255,.06);
  color:#ffffff;
  border-color:rgba(255,255,255,.20);
}

/* PAGE */
.page-wrap{padding:14px 20px;flex:1;}
.page-hdr{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(15,23,42,0.08);flex-wrap:wrap;}
.page-hdr-l{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.page-hdr-r{display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap;}
.page-hdr-ico{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-xs);}
.page-hdr-title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em;line-height:1;}
.page-hdr-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
/* Divisória sutil entre o título e o seletor de meses na linha interna */
.page-hdr-sep{width:1px;height:22px;background:rgba(15,23,42,0.10);flex-shrink:0;margin:0 2px;}
/* Atalho "Projeção" na linha interna do Painel do Dono */
.page-hdr-shortcut{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.04em;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-family:'DM Sans',sans-serif;transition:all .15s;box-shadow:var(--shadow-xs);white-space:nowrap;}
.page-hdr-shortcut:hover{background:var(--petronas-soft);color:var(--petronas-dark);border-color:var(--petronas-soft);}
.page-hdr-shortcut.active{background:var(--petronas);color:#fff;border-color:var(--petronas);}
/* Logo PRX no canto direito da linha interna */
.page-hdr-prx{display:inline-flex;align-items:center;height:30px;opacity:.88;}
.page-hdr-prx img{height:30px;width:auto;display:block;}
/* Variante compacta da month-bar para uso inline no cabeçalho de página */
.month-bar-inline{display:flex;align-items:center;gap:5px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 8px;box-shadow:var(--shadow-xs);}
@media(max-width:780px){
  .page-hdr-r{margin-left:0;width:100%;}
}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .12s;font-family:'DM Sans',sans-serif;}
.btn-primary{background:var(--green);color:white;}
.btn-primary:hover{background:var(--green-dim);}
.btn-secondary{background:var(--surface);color:var(--text-secondary);border:1px solid var(--border);box-shadow:var(--shadow-xs);}
.btn-secondary:hover{background:var(--surface-2);}
.btn-danger{background:var(--red-light);color:var(--red-dim);}
.btn-danger:hover{background:#fecaca;}
.btn-sm{padding:5px 10px;font-size:12px;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow);}
.card-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:9px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.bg{background:var(--green-light);color:var(--green-dim);}
.br{background:var(--red-light);color:var(--red-dim);}
.ba{background:var(--amber-light);color:var(--amber-dim);}
.bb{background:var(--blue-light);color:var(--blue-dim);}
.bp{background:var(--purple-light);color:var(--purple);}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--surface-2);padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--ink-50);}
.row-warn{background:#fffbeb!important;}
.row-danger{background:#fef2f2!important;}

/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
label{font-size:12px;font-weight:500;color:var(--text-secondary);}
input,select,textarea{padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-primary);background:var(--surface);transition:border-color .12s;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(22,163,74,.1);}
textarea{resize:vertical;min-height:58px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
.modal{background:var(--surface);border-radius:var(--radius);padding:18px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}

/* EMPTY */
.empty{text-align:center;padding:34px 20px;color:var(--text-muted);}
.empty-icon{font-size:24px;margin-bottom:6px;}

/* UTILS */
.flex{display:flex;}.items-center{align-items:center;}.justify-between{justify-content:space-between;}
.gap-2{gap:8px;}.gap-3{gap:12px;}.mb-2{margin-bottom:8px;}.mb-3{margin-bottom:12px;}.mb-4{margin-bottom:16px;}.mt-2{margin-top:8px;}.mt-3{margin-top:12px;}

/* ALERT */
.alert{border-radius:var(--radius-xs);padding:8px 11px;font-size:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:8px;}
.alert-r{background:var(--red-light);color:#7f1d1d;border-left:3px solid var(--red);}
.alert-a{background:var(--amber-light);color:#78350f;border-left:3px solid var(--amber);}
.alert-g{background:var(--green-light);color:#14532d;border-left:3px solid var(--green);}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:12px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow-xs);}
.metric-label{font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:3px;}
.metric-value{font-size:20px;font-weight:700;color:var(--text-primary);line-height:1.1;letter-spacing:-.03em;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.metric-value.green{color:var(--green);}.metric-value.red{color:var(--red);}.metric-value.amber{color:var(--amber);}
.metric-sub{font-size:11px;color:var(--text-muted);}
/* Variante específica da aba Entradas — cards um pouco maiores, com mais espaço para números */
.metrics-grid.entradas-grid{grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;}
.metrics-grid.entradas-grid .metric-card{padding:14px 17px;}
.metrics-grid.entradas-grid .metric-label{font-size:11.5px;margin-bottom:5px;}
.metrics-grid.entradas-grid .metric-value{font-size:22px;margin-bottom:4px;letter-spacing:-.035em;}
.metrics-grid.entradas-grid .metric-sub{font-size:10.5px;line-height:1.35;white-space:normal;}
.agenda-dia-lista{max-height:360px;overflow-y:auto;padding-right:4px;}
.agenda-dia-lista::-webkit-scrollbar{width:6px;}
.agenda-dia-lista::-webkit-scrollbar-track{background:transparent;}
.agenda-dia-lista::-webkit-scrollbar-thumb{background:var(--ink-200);border-radius:3px;}
.agenda-dia-lista::-webkit-scrollbar-thumb:hover{background:var(--ink-300);}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.section-title{font-size:14px;font-weight:600;}
.exec-reading{background:var(--ink-900);color:white;border-radius:var(--radius);padding:13px 16px;margin-bottom:12px;}
.exec-reading-label{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px;}
.exec-reading-text{font-size:13px;line-height:1.6;color:rgba(255,255,255,.85);}
.pressao-bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.pressao-bar{height:100%;border-radius:3px;}
.diag-item{display:flex;gap:9px;padding:9px 12px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface);margin-bottom:6px;font-size:12px;color:var(--text-secondary);line-height:1.5;}
.action-item{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:var(--radius-xs);background:var(--surface-2);margin-bottom:4px;font-size:12px;color:var(--text-secondary);}
.action-num{width:17px;height:17px;border-radius:50%;background:var(--green);color:white;font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* MONTH BAR */
.month-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;margin-bottom:11px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;box-shadow:var(--shadow-xs);}
.year-sel{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--surface-2);color:var(--text-secondary);cursor:pointer;font-family:'DM Sans',sans-serif;}
.month-sep{width:1px;height:15px;background:var(--border);flex-shrink:0;}
.mchip{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text-muted);transition:all .1s;font-family:'DM Sans',sans-serif;}
.mchip:hover{background:var(--petronas-soft);color:var(--petronas-dark);}
.mchip.active{background:var(--petronas);color:white;}

/* PROJEÇÃO — VEREDITO + BLOCOS EXECUTIVOS */
.prj-verdict{display:flex;align-items:center;gap:18px;padding:14px 20px;border-radius:var(--radius);margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow-xs);flex-wrap:wrap;position:relative;overflow:hidden;}
.prj-verdict::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;}
.prj-verdict.ok{background:linear-gradient(90deg,rgba(22,163,74,0.06),var(--surface) 60%);}
.prj-verdict.ok::before{background:#16a34a;}
.prj-verdict.warn{background:linear-gradient(90deg,rgba(245,158,11,0.08),var(--surface) 60%);}
.prj-verdict.warn::before{background:#f59e0b;}
.prj-verdict.danger{background:linear-gradient(90deg,rgba(220,38,38,0.08),var(--surface) 60%);}
.prj-verdict.danger::before{background:#dc2626;}
.prj-verdict-main{flex:1;min-width:280px;padding-left:8px;}
.prj-verdict-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
.prj-verdict-title{font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1.2;color:var(--text-primary);}
.prj-verdict.ok .prj-verdict-title{color:#15803d;}
.prj-verdict.warn .prj-verdict-title{color:#b45309;}
.prj-verdict.danger .prj-verdict-title{color:#b91c1c;}
.prj-verdict-sub{font-size:12px;color:var(--text-muted);margin-top:3px;}
.prj-kpis{display:flex;gap:18px;flex-wrap:wrap;}
.prj-kpi{min-width:110px;}
.prj-kpi-lbl{font-size:9.5px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--text-muted);margin-bottom:3px;}
.prj-kpi-val{font-size:15px;font-weight:700;letter-spacing:-.02em;color:var(--text-primary);line-height:1;}
.prj-kpi-val.neg{color:var(--red);}
.prj-kpi-val.pos{color:var(--green);}
.prj-kpi-sub{font-size:10px;color:var(--text-muted);margin-top:2px;}
.prj-saldo-input{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);}
.prj-saldo-input label{font-size:9.5px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;}
.prj-saldo-input input{width:130px;font-weight:600;}
.prj-grid-2c{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:900px){.prj-grid-2c{grid-template-columns:1fr;}}
.prj-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-xs);}
.prj-block-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.prj-block-ico{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--surface-2);border:1px solid var(--border);}
.prj-block-title{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);}
.prj-block-count{margin-left:auto;font-size:10px;color:var(--text-muted);font-weight:600;}
.prj-crit-item{padding:9px 11px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:7px;background:var(--surface-2);border-left:3px solid var(--amber);}
.prj-crit-item.danger{border-left-color:var(--red);background:rgba(220,38,38,0.04);}
.prj-crit-item:last-child{margin-bottom:0;}
.prj-crit-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:3px;}
.prj-crit-date{font-size:12px;font-weight:700;color:var(--text-primary);}
.prj-crit-amount{font-size:13px;font-weight:700;color:var(--red);letter-spacing:-.02em;}
.prj-crit-cause{font-size:11px;color:var(--text-muted);line-height:1.4;}
.prj-crit-impact{font-size:10.5px;color:var(--text-secondary);margin-top:3px;font-weight:600;}
.prj-action-item{display:flex;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:7px;background:var(--surface-2);}
.prj-action-item:last-child{margin-bottom:0;}
.prj-action-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--petronas);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.prj-action-body{flex:1;min-width:0;}
.prj-action-text{font-size:12px;color:var(--text-primary);line-height:1.4;font-weight:500;}
.prj-action-impact{font-size:10.5px;color:#15803d;font-weight:700;margin-top:3px;}
.prj-empty{font-size:12px;color:var(--text-muted);text-align:center;padding:14px;font-style:italic;}
.prj-details{margin-top:6px;}
.prj-details>summary{cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);list-style:none;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-xs);}
.prj-details>summary::-webkit-details-marker{display:none;}
.prj-details>summary::before{content:'▸';transition:transform .15s;font-size:10px;}
.prj-details[open]>summary::before{transform:rotate(90deg);}
.prj-details>summary:hover{background:var(--surface-2);}
.prj-details[open]>summary{margin-bottom:10px;}

/* KPI CARDS */
.painel-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:7px;}
.painel-kpi-row2{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:11px;}
.painel-kpi-row2>.pc:last-child{grid-column:auto;}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow-xs);border-top:2px solid transparent;}
.pc-label{font-size:10px;color:var(--text-muted);font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-value{font-size:19px;font-weight:700;color:var(--text-primary);letter-spacing:-.03em;line-height:1.1;margin-bottom:3px;}
.pc-value.g{color:var(--green);}.pc-value.r{color:var(--red);}.pc-value.a{color:var(--amber);}
.pc-sub{font-size:10px;color:var(--text-muted);line-height:1.3;}
.pc-t-green{border-top-color:var(--green);}
.pc-t-red{border-top-color:var(--red);}
.pc-t-amber{border-top-color:var(--amber);}
.pc-t-blue{border-top-color:var(--blue);}
.pc-t-slate{border-top-color:var(--ink-200);}
.pc-prog-wrap{margin-top:5px;}
.pc-prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-bottom:3px;}
.pc-prog-bg{height:3px;background:var(--ink-100);border-radius:2px;overflow:hidden;}
.pc-prog{height:100%;border-radius:2px;transition:width .4s;}
.saldo-edit{width:100%;padding:3px 6px;font-size:10px;margin-top:5px;border-radius:4px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted);outline:none;font-family:'DM Sans',sans-serif;}
.saldo-edit:focus{border-color:var(--green);}
/* SIDE-BY-SIDE row — novo layout: comp-esq | direita-stack */
.painel-duplex{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;align-items:start;}
.painel-layout-3{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;align-items:start;}
.painel-right-stack{display:flex;flex-direction:column;gap:11px;}

/* COMP PANEL — cabeçalho leve com acento verde tifani Mercedes AMG */
.comp-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:0;}
.comp-inner{display:grid;grid-template-columns:repeat(2,1fr);}
.comp-header{
  background:var(--surface);
  padding:9px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-bottom:1.5px solid #00D2BE;
  position:relative;
}
.comp-header::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:3px;
  background:#00D2BE;
}
.comp-header-label{
  display:inline-flex;align-items:center;
  font-size:10px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;
  color:#fff;
  background:#0f172a;
  padding:5px 10px;
  border-radius:3px;
  margin:0;
  white-space:nowrap;
}
.comp-header-right{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1;}
.comp-header-total{font-size:17px;font-weight:700;color:var(--text-primary);letter-spacing:-.03em;}
.comp-header-sub{font-size:10px;color:var(--text-muted);margin-top:2px;font-weight:500;}
.comp-body{}
.comp-group{border-bottom:1px solid var(--border);padding:10px 15px;}
.comp-group:last-child{border-bottom:none;}
.comp-inner .comp-group:nth-child(odd){border-right:1px solid var(--border);}
.comp-inner .comp-group:nth-last-child(-n+2){border-bottom:none;}
.comp-group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.comp-group-name{font-size:10px;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:5px;}
.comp-group-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0;}
.comp-group-pct{font-size:9px;color:var(--text-muted);font-weight:400;}
.comp-group-total{font-size:12px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em;}
.comp-prog-bg{height:2px;background:var(--ink-100);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.comp-prog{height:100%;border-radius:2px;}
.comp-item{display:flex;align-items:center;justify-content:space-between;padding:2px 0;}
.comp-item-name{font-size:10.5px;color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;}
.comp-item-val{font-size:10.5px;font-weight:600;color:var(--text-secondary);white-space:nowrap;}
.comp-expand{font-size:10px;color:var(--text-muted);cursor:pointer;background:none;border:none;padding:2px 0;font-family:'DM Sans',sans-serif;}
.comp-expand:hover{color:var(--zanon-red);}

/* PAG HOJE → REDISTRIBUIÇÃO */
.redistribuicao{background:#fefce8;border:1px solid #fde68a;border-radius:var(--radius);padding:10px 13px;box-shadow:0 1px 3px rgba(217,119,6,0.06);}
.rd-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.rd-title-row{display:flex;align-items:center;gap:5px;}
.rd-title{font-size:12px;font-weight:600;color:#92400e;}
.rd-date{font-size:10px;color:#b45309;margin-top:1px;}
.rd-divider{height:1px;background:rgba(217,119,6,.2);margin:6px 0;}
.rd-msg{font-size:12px;color:#78350f;line-height:1.6;}
.rd-msg strong{font-weight:700;color:#b91c1c;}
.rd-msg.ok{color:#166534;}
.rd-msg.ok strong{color:#15803d;}
.rd-msg.neutro{color:#b45309;}
.rd-cap-note{font-size:10px;color:#b45309;background:rgba(217,119,6,.1);padding:4px 8px;border-radius:4px;margin-top:7px;display:flex;align-items:center;gap:5px;}

/* CALENDARIO */
.calendario{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:8px;}
.cal-title-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.cal-title{font-size:13px;font-weight:600;color:var(--text-primary);}
.cal-nav{display:inline-flex;align-items:center;gap:4px;}
.cal-nav-btn{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;font-size:17px;line-height:1;font-weight:600;color:var(--text-secondary);background:var(--surface-2);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:inherit;padding:0;transition:background .15s,border-color .15s,color .15s;}
.cal-nav-btn:hover{background:var(--ink-50);border-color:var(--ink-200);color:var(--text-primary);}
.cal-nav-btn:active{transform:translateY(1px);}
.cal-nav-today{font-size:10.5px;font-weight:600;color:var(--text-secondary);background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:4px 9px;cursor:pointer;font-family:inherit;letter-spacing:.01em;transition:background .15s,border-color .15s;margin-left:2px;}
.cal-nav-today:hover{background:var(--ink-50);border-color:var(--ink-200);color:var(--text-primary);}
.cal-legend{display:flex;gap:9px;}
.cal-leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted);}
.cal-leg-dot{width:8px;height:8px;border-radius:2px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{font-size:9px;font-weight:600;text-align:center;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;padding:4px 2px;}
.cal-day{min-height:68px;border-radius:5px;padding:6px 7px;border:1px solid transparent;font-size:9px;}
.cal-day.empty{background:transparent;}
.cal-day-n{font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:3px;}
.cal-day-total{font-size:10px;font-weight:700;color:var(--text-secondary);}
.cal-day-items{margin-top:3px;display:flex;flex-direction:column;gap:2px;}
.cal-day-more{font-size:8.5px;color:var(--text-muted);}
.cal-leve{background:var(--ink-50);border-color:var(--border);}
.cal-mod{background:#fef9c3;border-color:#fde68a;}
.cal-pesado{background:#ffedd5;border-color:#fed7aa;}
.cal-critico{background:#fee2e2;border-color:#fca5a5;}
.cal-today{outline:2px solid var(--zanon-red);outline-offset:-1px;}
.cal-mod .cal-day-total{color:#92400e;}
.cal-pesado .cal-day-total{color:#c2410c;}
.cal-critico .cal-day-total{color:var(--red);}

/* LEITURA EXEC */
.leitura-exec{background:var(--ink-900);color:white;border-radius:var(--radius);padding:12px 15px;}
.le-eye{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:5px;}
.le-resumo{font-size:12.5px;color:rgba(255,255,255,.85);line-height:1.6;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.07);}
.le-bullets{list-style:none;display:flex;flex-direction:column;gap:4px;}
.le-bullets li{display:flex;align-items:flex-start;gap:6px;font-size:10.5px;color:rgba(255,255,255,.55);line-height:1.5;}
.le-dot{width:4px;height:4px;border-radius:50%;background:var(--green-mid);flex-shrink:0;margin-top:5px;}

/* IMPORT MODAL */
.imp-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface-2);}
.imp-drop:hover,.imp-drop.drag{border-color:var(--green);background:var(--green-light);}
.imp-drop-icon{font-size:28px;margin-bottom:8px;}
.imp-drop-text{font-size:13px;color:var(--text-secondary);margin-bottom:4px;}
.imp-drop-sub{font-size:11px;color:var(--text-muted);}
.imp-preview{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-top:10px;}
.imp-preview-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px;}
.imp-stat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.imp-stat:last-child{border-bottom:none;}
.imp-stat-label{color:var(--text-secondary);}
.imp-stat-val{font-weight:700;color:var(--text-primary);}
.imp-stat-val.green{color:var(--green);}
.imp-stat-val.red{color:var(--red);}
.imp-stat-val.amber{color:var(--amber);}
.imp-seg-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);padding:2px 0;}
.imp-seg-row strong{color:var(--text-secondary);}
.imp-err-list{max-height:120px;overflow-y:auto;margin-top:6px;}
.imp-err-item{font-size:11px;color:var(--red-dim);padding:3px 0;border-bottom:1px solid var(--border);}
.imp-err-item:last-child{border-bottom:none;}
.imp-success-banner{background:var(--green-light);border:1px solid #bbf7d0;border-radius:var(--radius-xs);padding:9px 12px;font-size:13px;color:var(--green-dim);font-weight:500;}

.painel-kpi-grid{grid-template-columns:repeat(3,1fr);}.painel-kpi-row2{grid-template-columns:repeat(3,1fr);}.comp-inner{grid-template-columns:1fr;}.comp-inner .comp-group:nth-child(odd){border-right:none;}.comp-inner .comp-group:nth-last-child(-n+2){border-bottom:1px solid var(--border);}.comp-inner .comp-group:last-child{border-bottom:none;}}
@media(max-width:900px){.painel-kpi-grid{grid-template-columns:repeat(2,1fr);}.painel-kpi-row2{grid-template-columns:repeat(2,1fr);}.painel-duplex{grid-template-columns:1fr;}.painel-layout-3{grid-template-columns:1fr;}}
@media(max-width:768px){.page-wrap{padding:10px 12px;}.painel-kpi-grid{grid-template-columns:repeat(2,1fr);}.painel-kpi-row2{grid-template-columns:repeat(2,1fr);}.cal-day{min-height:40px;}.app-header{padding:0 10px;}}

/* ── PAINEL DO DONO v9.5 (ajustes visuais) ── */
.painel-kpi-grid.v5{grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:9px;}
.painel-kpi-row2.v5{grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px;}
.painel-kpi-grid.v5 .pc, .painel-kpi-row2.v5 .pc{padding:11px 13px;}
.painel-kpi-grid.v5 .pc-label, .painel-kpi-row2.v5 .pc-label{font-size:10.5px;margin-bottom:5px;}
.painel-kpi-grid.v5 .pc-value, .painel-kpi-row2.v5 .pc-value{font-size:20px;margin-bottom:4px;}
.painel-kpi-grid.v5 .pc-sub, .painel-kpi-row2.v5 .pc-sub{font-size:10.5px;}

/* Composição em largura total + 4 colunas */
.comp-inner-4{display:grid;grid-template-columns:repeat(4,1fr);}
.comp-inner-4 .comp-group{border-bottom:none;border-right:1px solid var(--border);padding:12px 14px;}
.comp-inner-4 .comp-group:last-child{border-right:none;}
.comp-inner-4 .comp-group-name{font-size:10.5px;}
.comp-inner-4 .comp-group-total{font-size:13px;}
.painel-comp-full{margin-bottom:11px;}

/* Linha inferior: Leitura+Sugestão (esq 40%) | Fornecedores em Destaque (dir 60%) */
.painel-layout-bottom{display:grid;grid-template-columns:2fr 3fr;gap:11px;margin-bottom:11px;align-items:start;}
.painel-bottom-left{display:flex;flex-direction:column;gap:11px;}

/* Painel Fornecedores em Destaque */
.forn-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.forn-header{background:#374151;padding:11px 13px;}
.forn-header-label{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:2px;}
.forn-header-total{font-size:19px;font-weight:700;color:white;letter-spacing:-.03em;}
.forn-header-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;}
/* Corpo com duas colunas internas lado a lado */
.forn-body{padding:11px 13px;display:grid;grid-template-columns:1fr 1fr;gap:0;}
.forn-col{padding:0 12px;}
.forn-col:first-child{padding-left:0;}
.forn-col:last-child{padding-right:0;border-left:1px solid var(--border);}
.forn-section-title{font-size:9px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.forn-section-title .forn-tag{font-size:8.5px;color:var(--text-muted);font-weight:500;letter-spacing:0;text-transform:none;}
.forn-list{display:flex;flex-direction:column;gap:3px;}
.forn-row{display:flex;flex-direction:column;gap:1px;padding:5px 0;border-bottom:1px solid var(--border);}
.forn-row:last-child{border-bottom:none;}
.forn-row-rank{display:flex;align-items:baseline;gap:6px;}
.forn-row-num{font-size:10px;font-weight:700;color:var(--text-muted);min-width:12px;}
.forn-row-name{font-size:11px;color:var(--text-secondary);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.forn-row-val{font-size:11.5px;font-weight:700;color:var(--text-primary);white-space:nowrap;margin-left:18px;}
.forn-row-meta{font-size:9.5px;color:var(--text-muted);margin-left:18px;margin-top:1px;}
.forn-row-pct{font-size:9.5px;color:var(--text-muted);font-weight:500;}
.forn-empty{font-size:10.5px;color:var(--text-muted);font-style:italic;padding:6px 0;}

/* ── ABA FORNECEDORES ── */
/* Card-hero de destaque: Total Pago a Fornecedores no mês */
.forn-pago-hero{
  background:linear-gradient(135deg,var(--petronas) 0%,var(--petronas-dark) 100%);
  border:2px solid #000000;
  border-radius:var(--radius);
  padding:16px 20px;
  margin-bottom:11px;
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr 1fr;
  gap:18px;
  align-items:center;
  box-shadow:0 2px 12px rgba(0,161,155,.22),0 1px 2px rgba(0,0,0,.10);
  color:#ffffff;
  position:relative;
  overflow:hidden;
}
.forn-pago-hero::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:#000000;
}
.forn-pago-hero-main{display:flex;flex-direction:column;gap:4px;padding-left:6px;}
.forn-pago-hero-label{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:7px;}
.forn-pago-hero-label .forn-pago-ico{font-size:13px;}
.forn-pago-hero-value{font-size:28px;font-weight:800;letter-spacing:-.02em;color:#ffffff;line-height:1.05;}
.forn-pago-hero-sub{font-size:11px;color:rgba(255,255,255,.80);font-weight:500;margin-top:2px;}
.forn-pago-hero-cell{display:flex;flex-direction:column;gap:3px;border-left:1px solid rgba(255,255,255,.18);padding-left:16px;}
.forn-pago-hero-cell-lbl{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.75);}
.forn-pago-hero-cell-val{font-size:15px;font-weight:700;color:#ffffff;letter-spacing:-.02em;}
.forn-pago-hero-cell-sub{font-size:10px;color:rgba(255,255,255,.70);font-weight:500;}
.forn-pago-hero-prog-wrap{margin-top:6px;}
.forn-pago-hero-prog-bg{height:5px;background:rgba(0,0,0,.22);border-radius:3px;overflow:hidden;}
.forn-pago-hero-prog{height:100%;background:#ffffff;border-radius:3px;transition:width .35s ease;}
@media(max-width:980px){
  .forn-pago-hero{grid-template-columns:1fr 1fr;gap:14px;}
  .forn-pago-hero-cell:nth-child(2){border-left:none;padding-left:6px;}
}
@media(max-width:600px){
  .forn-pago-hero{grid-template-columns:1fr;}
  .forn-pago-hero-cell{border-left:none;padding-left:6px;border-top:1px solid rgba(255,255,255,.18);padding-top:10px;}
}

.forn-kpi-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px;margin-bottom:14px;}
.forn-row-2col{display:grid;grid-template-columns:1.55fr 1fr;gap:11px;margin-bottom:11px;align-items:start;}
/* Variante 40/60 — Ranking por Volume + Custo por Segmento */
.forn-row-2col.forn-row-4060{grid-template-columns:2fr 3fr;}
@media(max-width:900px){.forn-row-2col.forn-row-4060{grid-template-columns:1fr;}}

/* Painel Custo por Segmento */
.forn-seg-card{overflow:hidden;min-width:0;border-top:2px solid var(--petronas);}
.forn-seg-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.forn-seg-total{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1;}
.forn-seg-total-lbl{font-size:9px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--text-muted);}
.forn-seg-total-val{font-size:14px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em;margin-top:2px;}
.forn-seg-list{display:flex;flex-direction:column;gap:8px;}
.forn-seg-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.forn-seg-row:last-child{border-bottom:none;}
.forn-seg-row-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px;}
.forn-seg-name{font-size:12px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px;}
.forn-seg-rank{font-size:10px;font-weight:700;color:var(--text-muted);min-width:14px;}
.forn-seg-val{font-size:12.5px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em;white-space:nowrap;}
.forn-seg-bar-wrap{display:flex;align-items:center;gap:9px;}
.forn-seg-bar-bg{flex:1;height:6px;background:var(--ink-100);border-radius:3px;overflow:hidden;min-width:0;}
.forn-seg-bar-fill{height:100%;background:linear-gradient(90deg,var(--petronas) 0%,var(--petronas-dark) 100%);border-radius:3px;transition:width .35s ease;}
.forn-seg-pct{font-size:11px;font-weight:700;color:var(--petronas-dark);min-width:38px;text-align:right;white-space:nowrap;}
.forn-seg-cell{display:flex;flex-direction:column;gap:0;min-width:0;width:100%;}

.forn-rank-card{overflow:hidden;min-width:0;}
.forn-evol-card{margin-bottom:11px;}
.forn-table{width:100%;border-collapse:collapse;font-size:11.5px;table-layout:fixed;}
.forn-table thead th{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding:6px 6px;border-bottom:1px solid var(--border);text-align:left;background:var(--surface-2);white-space:nowrap;}
.forn-table tbody td{padding:7px 6px;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.forn-table tbody tr:last-child td{border-bottom:none;}
.forn-table tbody tr:hover{background:var(--surface-2);}

// Currency — parse
// Accepts: 14210 / "14.210,00" / "14210,00" / "R$ 14.210,00"
const parseCurrencyBR = v => {
  if (v === null || v === undefined || v === '') return 0;
  let s = v.toString().trim().replace(/\s/g, '').replace(/R\$\s*/gi, '');
  const lastComma = s.lastIndexOf(',');
  const lastDot   = s.lastIndexOf('.');
  if (lastComma > lastDot) {
    s = s.replace(/\./g, '').replace(',', '.'); // BR format: dots=thousands, comma=decimal
  } else {
    s = s.replace(/,/g, '');                    // EN format or plain integer
  }
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
};

// Currency — format
function formatCurrency(value) {
  const number = Number(value || 0);

  return number.toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}
// Percent — parse: accepts "1,43" / "1.43" / "1,43%" → stores as 1.43
const parsePercentBR = v => {
  if (v === null || v === undefined || v === '') return 0;
  const s = v.toString().trim().replace('%', '').replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
};

const formatCurrencyBR = value => {
  const number = Number(value || 0);

  return number.toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
};

// Percent — format
const formatPercentBR = n => {
  if (n === null || n === undefined || isNaN(n)) return '0,00%';
  return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
};

// Short aliases used throughout components
const fmt      = formatCurrencyBR; // primary short alias
const fmtFull  = formatCurrencyBR; // semantic alias (full currency label)
const parseNum = parseCurrencyBR;

// Math
const pct = (a, b) => b === 0 ? 0 : Math.round((a / b) * 100);

// Date helpers
const today       = () => new Date().toISOString().split('T')[0];
const fmtDate     = d => { if (!d) return ''; const [y, m, dd] = d.split('-'); return `${dd}/${m}/${y}`; };
const genId       = () => Math.random().toString(36).substr(2, 9);
const weekOf      = d => {
  const dt = new Date(d);
  const day = dt.getDay();
  const mon = new Date(dt);
  mon.setDate(dt.getDate() - (day === 0 ? 6 : day - 1));
  return mon.toISOString().split('T')[0];
};
const monthStart  = (y, m) => `${y}-${String(m + 1).padStart(2, '0')}-01`;
const monthEnd    = (y, m) => new Date(y, m + 1, 0).toISOString().split('T')[0];
const daysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
const addDays     = (d, n) => { const dt = new Date(d); dt.setDate(dt.getDate() + n); return dt.toISOString().split('T')[0]; };
const monthOf     = d => d ? d.substring(0, 7) : ''; // "2026-06" from any ISO date

// Competência key: "2026-06" for June 2026
const chaveCompetencia = (year, month) => `${year}-${String(month + 1).padStart(2, '0')}`;

// Returns the effective daily payment goal for a given month.
// A manually set goal (config.metasManuaisPorMes) takes priority over the automatic one.
const getMetaDiariaEfetiva = (mediaDiariaEnt, metaPercentual, config, year, month) => {
  const chaveMes = chaveCompetencia(year, month);
  const mapa     = (config && config.metasManuaisPorMes) || {};
  const manual   = mapa[chaveMes];
  if (typeof manual === 'number' && manual > 0) {
    return { valor: manual, isManual: true, chaveMes };
  }
  return { valor: mediaDiariaEnt * (metaPercentual / 100), isManual: false, chaveMes };
};

// Synchronous localStorage — only for keys not backed by Supabase (e.g. zanon_prazos)
const loadLocalS = k    => { try { return JSON.parse(localStorage.getItem(k) || 'null'); } catch { return null; } };
const saveLocalS = (k, d) => { try { localStorage.setItem(k, JSON.stringify(d)); } catch {} };

// Async load: Supabase for registered TABELAS keys, localStorage for everything else
const loadS = async chave => {
  const tabela = TABELAS[chave];
  if (!tabela)          return loadLocalS(chave);
  if (!EMPRESA_ID)      return null;
  if (tabela === 'config') {
    const { data } = await supabase.from('config').select('*').eq('empresa_id', EMPRESA_ID).single();
    return data || null;
  }
  const { data } = await supabase.from(tabela).select('*').eq('empresa_id', EMPRESA_ID);
  return data || [];
};

// Async save: upsert for config, DELETE + INSERT for array tables (full replacement per company)
const saveS = async (chave, dados) => {
  const tabela = TABELAS[chave];
  if (!tabela)     { saveLocalS(chave, dados); return; }
  if (!EMPRESA_ID) return;
  if (tabela === 'config') {
    // UPSERT config — erro indica RLS bloqueando escrita ou constraint violada.
    // Causa mais comum: policy empresa_propria não cobre o EMPRESA_ID ativo (ex: PRX sem policy).
    const { error: upsertErr } = await supabase.from('config').upsert({ ...dados, empresa_id: EMPRESA_ID });
    if (upsertErr) { console.error('SUPABASE ERROR [upsert config]:', upsertErr); throw upsertErr; }
    return;
  }
  // DELETE — apaga todos os rows da empresa antes de reinserir (substituição completa).
  // Erro aqui indica RLS bloqueando DELETE ou problema de permissão na tabela.
  const { error: deleteErr } = await supabase.from(tabela).delete().eq('empresa_id', EMPRESA_ID);
  if (deleteErr) { console.error('SUPABASE ERROR [delete ' + tabela + ']:', deleteErr); throw deleteErr; }
  if (Array.isArray(dados) && dados.length > 0) {
    const rows = dados.map(d => {
      const row = { empresa_id: EMPRESA_ID };
      Object.entries(d).forEach(([k, v]) => { if (!k.startsWith('_')) row[k] = v; });
      return row;
    });
    // INSERT — grava os novos rows com empresa_id do contexto ativo.
    // Erro aqui indica RLS bloqueando INSERT, constraint violada ou empresa_id inválido.
    const { error: insertErr } = await supabase.from(tabela).insert(rows);
    if (insertErr) { console.error('SUPABASE ERROR [insert ' + tabela + ']:', insertErr); throw insertErr; }
  }
};

function useChart(ref, cfg) {
  useEffect(() => {
    if (!ref.current) return;
    const existing = Chart.getChart(ref.current);
    if (existing) existing.destroy();
    const chart = new Chart(ref.current, cfg);
    return () => chart.destroy();
  }, [JSON.stringify(cfg)]);
}

function SugestaoRedistribuicao({contas,mediaDiariaEnt,metaPercentual,metaDiariaPagamento,metaIsManual,mesLabel}){
  const todayStr=today();
  const todayDate=new Date(todayStr+'T12:00:00');
  const dayOfWeek=todayDate.getDay(); // 0=Dom, 6=Sáb

  // Meta diária EFETIVA recebida do Painel (manual se cadastrada; senão automática)
  // Fallback defensivo: se não vier por props, recalcula como antes.
  if(typeof metaDiariaPagamento!=='number'){
    metaDiariaPagamento=mediaDiariaEnt*(metaPercentual/100);
    metaIsManual=false;
  }

  // Pagamentos do dia de hoje (não pagos)
  const pagHoje=contas.filter(c=>c.vencimento===todayStr&&c.status!=='Pago');
  const totalPagHoje=pagHoje.reduce((s,c)=>s+c.valor,0);

  // É fim de semana?
  const isFimDeSemana=dayOfWeek===0||dayOfWeek===6;
  const dateLabel=todayDate.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});

  let msgContent=null;

  if(isFimDeSemana){
    msgContent=<p className="rd-msg neutro">Hoje é <strong>{dayOfWeek===6?'sábado':'domingo'}</strong> — dia sem pagamentos operacionais. O caixa descansa.</p>;
  } else if(mediaDiariaEnt===0&&!metaIsManual){
    msgContent=<p className="rd-msg neutro">Registre as entradas do mês para ativar a análise de meta diária de pagamento.</p>;
  } else if(metaDiariaPagamento<=0){
    msgContent=<p className="rd-msg neutro">Defina uma meta diária (automática ou manual) para ativar a análise de redistribuição.</p>;
  } else if(totalPagHoje===0){
    msgContent=<p className="rd-msg ok">Hoje não há necessidade de redistribuição. O dia está livre de vencimentos.</p>;
  } else {
    const diferenca=totalPagHoje-metaDiariaPagamento;
    if(diferenca>0){
      msgContent=(
        <>
          <p className="rd-msg" style={{color:'#78350f'}}>Hoje estamos <strong>acima da meta diária</strong> em <strong>{fmtFull(diferenca)}</strong>.</p>
          <p className="rd-msg" style={{color:'#92400e',marginTop:5}}>Considere redistribuir parte dos vencimentos para outro dia, aliviando a pressão sobre o caixa de hoje.</p>
        </>
      );
    } else {
      const folga=Math.abs(diferenca);
      msgContent=(
        <>
          <p className="rd-msg ok">O dia está <strong>dentro da meta diária de pagamento</strong>.</p>
          <p className="rd-msg ok" style={{marginTop:5}}>Há folga saudável de <strong>{fmtFull(folga)}</strong> em relação à meta diária.</p>
        </>
      );
    }
  }

  return(
    <div className="redistribuicao">
      <div className="rd-top">
        <div>
          <div className="rd-title-row"><span style={{fontSize:12}}>📋</span><span className="rd-title">Sugestão de Redistribuição</span></div>
          <div className="rd-date">{dateLabel}</div>
        </div>
        {!isFimDeSemana&&totalPagHoje>0&&(
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:15,fontWeight:700,color:'#b91c1c',letterSpacing:'-.03em',lineHeight:1}}>{fmtFull(totalPagHoje)}</div>
            <div style={{fontSize:9,color:'#b45309',marginTop:1}}>previsto hoje</div>
          </div>
        )}
      </div>
      <div className="rd-divider"></div>
      {msgContent}
      {metaDiariaPagamento>0&&(
        <div className="rd-cap-note">
          💡 Meta diária: <strong style={{marginLeft:3}}>{fmtFull(metaDiariaPagamento)}</strong>
          <span style={{color:'rgba(180,83,9,.6)',marginLeft:4}}>· {metaIsManual?`manual${mesLabel?` para ${mesLabel}`:''}`:`${metaPercentual}% da média diária`}</span>
        </div>
      )}
    </div>
  );
}

  const mEndPrev=monthEnd(prevYear,prevMonth);

  const fornMes=contas.filter(c=>c.tipoDespesa==='Fornecedor'&&c.vencimento>=mStart&&c.vencimento<=mEnd);
  const fornPrev=contas.filter(c=>c.tipoDespesa==='Fornecedor'&&c.vencimento>=mStartPrev&&c.vencimento<=mEndPrev);

      if(!m[key])m[key]={nome:key,valor:0,qtd:0};

    data:{
      labels:top6.map(s=>s.nome.length>14?s.nome.slice(0,12)+'…':s.nome),

        data:top6.map(s=>s.valor),

      }]
    },
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          title:items=>top6[items[0].dataIndex].nome,
          label:ctx=>' '+formatCurrencyBR(ctx.parsed.x)+' ('+Math.round(ctx.parsed.x/totalMes*100)+'%)',
        }}
      },
      scales:{
        x:{ticks:{callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v,font:{size:9},color:'#94a3b8',maxTicksLimit:4},grid:{color:'rgba(15,23,42,0.04)'},border:{display:false}},
        y:{ticks:{font:{size:10,weight:'600'},color:'#475569'},grid:{display:false},border:{display:false}}
      },
      layout:{padding:{top:2,right:14,bottom:0,left:0}},
    }
  }:null);

  const mesLabel=MONTHS[selMonth]+' '+selYear;
  const prevLabel=MONTHS[prevMonth]+' '+prevYear;

  if(segArr.length===0){
    return(
      <div className="seg-panel">
        <div className="seg-hdr">
          <div className="seg-hdr-meta">
            <div className="seg-hdr-title">Custo por Segmento</div>
            <div className="seg-hdr-period">{mesLabel}</div>
          </div>
        </div>
        <div className="seg-empty">
          Nenhum boleto de fornecedor em {mesLabel}.<br/>
          Cadastre contas com tipo <strong>Fornecedor</strong>.
        </div>
      </div>
    );
  }

  const insight=geraInsight(segArr,totalMes,topSeg,topPct,selMonth,selYear);

  return(
    <div className="seg-panel">
      <div className="seg-hdr">
        <div className="seg-hdr-meta">
          <div className="seg-hdr-title">Custo por Segmento</div>
          <div className="seg-hdr-period">{mesLabel}</div>
        </div>
        <div className="seg-hdr-kpis">
          <div className="seg-hdr-kpi">
            <div className="seg-hdr-kpi-lbl">Total comprado</div>
            <div className="seg-hdr-kpi-val">{formatCurrencyBR(totalMes)}</div>
            <div className="seg-hdr-kpi-sub">
              {deltaTotalPct!==null?(
                <span style={{color:deltaTotalPct>0?'var(--red-dim)':'var(--green-dim)',fontWeight:700}}>
                  {deltaTotalPct>0?'+':''}{deltaTotalPct.toFixed(0)}% vs {prevLabel}
                </span>
              ):(nSegs+' setor'+(nSegs===1?'':'es'))}
            </div>
          </div>
          {deltaTotalPct!==null&&<div className="seg-hdr-div"/>}
          {deltaTotalPct!==null&&(
            <div className="seg-hdr-kpi">
              <div className="seg-hdr-kpi-lbl">Setores</div>
              <div className="seg-hdr-kpi-val">{nSegs}</div>
              <div className="seg-hdr-kpi-sub">{nSegs===1?'categoria':'categorias'}</div>
            </div>
          )}
        </div>
      </div>
      <div className="seg-chart-area">
        <div className="seg-chart-canvas"><canvas ref={chartRef}></canvas></div>
      </div>
      {insight&&<div className="seg-insight">{insight}</div>}
      <div className="seg-list">
        {segArr.map((s,i)=>{
          const p=totalMes>0?Math.round(s.valor/totalMes*100):0;
          const prev=prevMap[s.nome]||0;
          const delta=prev>0?((s.valor-prev)/prev*100):null;
          const dClass=delta===null?'eq':delta>5?'up':delta<-5?'down':'eq';
          const dLabel=delta===null?'—':(delta>0?'+':'')+delta.toFixed(0)+'%';
          return(
            <div className="seg-row" key={i}>
              <span className="seg-rank">{i+1}</span>
              <div className="seg-name-wrap">
                <span className="seg-dot" style={{background:SEG_CORES[i%SEG_CORES.length]}}></span>
                <span className="seg-name" title={s.nome}>{s.nome}</span>
              </div>
              <div className="seg-val-wrap">
                <span className="seg-val">{formatCurrencyBR(s.valor)} <span className="seg-val-pct">· {p}%</span></span>
                <span className={'seg-delta '+dClass}>{dLabel} vs {MONTHS_SHORT[prevMonth]}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
