// FORNECEDORES — visão estratégica
// ══════════════════════════════════════
function Fornecedores({contas,selectedYear,selectedMonth}){
  const now=new Date();
  // Mês/ano vêm do estado GLOBAL (Painel do Dono). Sem useState local nem seletor visual.
  const selYear=selectedYear;
  const selMonth=selectedMonth;
  const chartEvolRef=useRef(null);

  const fornNome=c=>(c.fornecedor&&c.fornecedor.trim())?c.fornecedor.trim():(c.descricao||'Sem identificação').trim();
  const todayStr=today();

  // Universo: só boletos do tipo Fornecedor
  const universo=contas.filter(c=>c.tipoDespesa==='Fornecedor');

  // Filtro de período (mês/ano selecionado)
  const mStart=monthStart(selYear,selMonth);
  const mEnd=monthEnd(selYear,selMonth);
  const contasMes=universo.filter(c=>c.vencimento>=mStart&&c.vencimento<=mEnd);

  // Agrupamento por fornecedor no mês
  const map={};
  contasMes.forEach(c=>{
    const nome=fornNome(c);
    if(!map[nome])map[nome]={nome,valor:0,qtd:0,datas:[],itens:[]};
    map[nome].valor+=c.valor;
    map[nome].qtd+=1;
    map[nome].datas.push(c.vencimento);
    map[nome].itens.push(c);
  });
  const fornArr=Object.values(map).sort((a,b)=>b.valor-a.valor);
  const totalMes=fornArr.reduce((s,f)=>s+f.valor,0);
  const totalBoletos=fornArr.reduce((s,f)=>s+f.qtd,0);
  const ticketMedio=totalBoletos>0?totalMes/totalBoletos:0;
  const top3Valor=fornArr.slice(0,3).reduce((s,f)=>s+f.valor,0);
  const concTop3=totalMes>0?pct(top3Valor,totalMes):0;

  // === Total já PAGO aos fornecedores do mês ===
  // Atualiza automaticamente conforme boletos são marcados como Pago.
  const contasPagasMes=contasMes.filter(c=>c.status==='Pago');
  const totalPagoMes=contasPagasMes.reduce((s,c)=>s+c.valor,0);
  const qtdPagosMes=contasPagasMes.length;
  const pctPagoMes=totalMes>0?pct(totalPagoMes,totalMes):0;
  const totalRestanteMes=Math.max(0,totalMes-totalPagoMes);
  const qtdRestanteMes=Math.max(0,totalBoletos-qtdPagosMes);

  // === Agrupamento por SEGMENTO (Custo por Segmento) ===
  // Prioridade: segmento → categoria → "Sem segmento". Só considera tipoDespesa='Fornecedor' (já filtrado em contasMes).
  const segMap={};
  contasMes.forEach(c=>{
    const key=(c.segmento&&c.segmento.trim())||(c.categoria&&c.categoria.trim())||'Sem segmento';
    if(!segMap[key])segMap[key]={nome:key,valor:0,qtd:0};
    segMap[key].valor+=c.valor;
    segMap[key].qtd+=1;
  });
  const segArr=Object.values(segMap).sort((a,b)=>b.valor-a.valor);

  // Próximos vencimentos (a partir de hoje, no período)
  const dMaisHoje=d=>{const a=new Date(d+'T12:00:00'),b=new Date(todayStr+'T12:00:00');return Math.round((a-b)/(1000*60*60*24));};
  const pendentes=universo.filter(c=>c.status!=='Pago'&&c.vencimento>=todayStr);
  const prox7=pendentes.filter(c=>{const d=dMaisHoje(c.vencimento);return d>=0&&d<=7;}).reduce((s,c)=>s+c.valor,0);
  const prox30=pendentes.filter(c=>{const d=dMaisHoje(c.vencimento);return d>=0&&d<=30;}).reduce((s,c)=>s+c.valor,0);

  // Próximos vencimentos por fornecedor (janela 30 dias)
  const proxMap={};
  pendentes.filter(c=>{const d=dMaisHoje(c.vencimento);return d>=0&&d<=30;}).forEach(c=>{
    const nome=fornNome(c);
    if(!proxMap[nome])proxMap[nome]={nome,v7:0,v15:0,v30:0,total:0,qtd:0};
    const d=dMaisHoje(c.vencimento);
    if(d<=7)proxMap[nome].v7+=c.valor;
    if(d<=15)proxMap[nome].v15+=c.valor;
    proxMap[nome].v30+=c.valor;
    proxMap[nome].total+=c.valor;
    proxMap[nome].qtd+=1;
  });
  const proxArr=Object.values(proxMap).sort((a,b)=>b.total-a.total);

  // Frequência / cadência (intervalo médio em dias entre compras no mês)
  const cadencia=fornArr.map(f=>{
    const dts=[...new Set(f.datas)].sort();
    let intMed=null;
    if(dts.length>=2){
      const difs=[];
      for(let i=1;i<dts.length;i++){
        const a=new Date(dts[i-1]+'T12:00:00'),b=new Date(dts[i]+'T12:00:00');
        difs.push(Math.round((b-a)/(1000*60*60*24)));
      }
      intMed=Math.round(difs.reduce((s,x)=>s+x,0)/difs.length);
    }
    let classif='—';
    if(intMed===null)classif='Eventual';
    else if(intMed<=3)classif='Semanal+';
    else if(intMed<=8)classif='Semanal';
    else if(intMed<=16)classif='Quinzenal';
    else classif='Mensal';
    return{nome:f.nome,qtd:f.qtd,intMed,classif,valor:f.valor};
  });

  // Evolução últimos 6 meses — top 5 fornecedores do mês selecionado
  const top5=fornArr.slice(0,5).map(f=>f.nome);
  const meses=[];
  for(let i=5;i>=0;i--){
    const d=new Date(selYear,selMonth-i,1);
    meses.push({y:d.getFullYear(),m:d.getMonth(),label:MONTHS_SHORT[d.getMonth()]+'/'+String(d.getFullYear()).slice(2)});
  }
  const evolDatasets=top5.map((nome,idx)=>{
    const cores=['#dc2626','#2563eb','#16a34a','#d97706','#7c3aed'];
    const data=meses.map(mn=>{
      const s=monthStart(mn.y,mn.m),e=monthEnd(mn.y,mn.m);
      return universo.filter(c=>c.vencimento>=s&&c.vencimento<=e&&fornNome(c)===nome).reduce((sm,c)=>sm+c.valor,0);
    });
    return{label:nome,data,borderColor:cores[idx],backgroundColor:cores[idx]+'14',tension:0.3,pointRadius:3,fill:false};
  });

  // (gráfico donut "Concentração de Compras" removido — substituído pelo painel "Custo por Segmento")

  useChart(chartEvolRef,evolDatasets.length>0?{
    type:'line',
    data:{labels:meses.map(m=>m.label),datasets:evolDatasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{
      legend:{position:'bottom',labels:{boxWidth:10,font:{size:10},color:'#475569'}},
      tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+formatCurrency(ctx.parsed.y)}}
    },scales:{y:{ticks:{callback:v=>formatCurrency(v)}}}}
  }:null);

  if(universo.length===0){
    return(
      <div className="forn-empty-state">
        <div className="forn-empty-icon">🚚</div>
        <div className="forn-empty-title">Nenhum boleto de fornecedor cadastrado</div>
        <div className="forn-empty-sub">Cadastre boletos na aba <strong>Contas a Pagar</strong> com o tipo <em>Fornecedor</em> para que esta aba ganhe vida.</div>
      </div>
    );
  }

  return(
    <div>
      {/* CARD HERO — Total Pago a Fornecedores no mês (atualiza em tempo real) */}
      <div className="forn-pago-hero">
        <div className="forn-pago-hero-main">
          <div className="forn-pago-hero-label">
            <span className="forn-pago-ico">✓</span>
            <span>Pago a Fornecedores — {MONTHS[selMonth]} {selYear}</span>
          </div>
          <div className="forn-pago-hero-value">{fmtFull(totalPagoMes)}</div>
          <div className="forn-pago-hero-sub">
            {qtdPagosMes} de {totalBoletos} boleto{totalBoletos===1?'':'s'} quitado{qtdPagosMes===1?'':'s'}
          </div>
          <div className="forn-pago-hero-prog-wrap">
            <div className="forn-pago-hero-prog-bg">
              <div className="forn-pago-hero-prog" style={{width:Math.min(100,pctPagoMes)+'%'}}></div>
            </div>
          </div>
        </div>
        <div className="forn-pago-hero-cell">
          <div className="forn-pago-hero-cell-lbl">% do total comprado</div>
          <div className="forn-pago-hero-cell-val">{pctPagoMes}%</div>
          <div className="forn-pago-hero-cell-sub">de {fmtFull(totalMes)}</div>
        </div>
        <div className="forn-pago-hero-cell">
          <div className="forn-pago-hero-cell-lbl">Restante a pagar</div>
          <div className="forn-pago-hero-cell-val">{fmtFull(totalRestanteMes)}</div>
          <div className="forn-pago-hero-cell-sub">{qtdRestanteMes} boleto{qtdRestanteMes===1?'':'s'} em aberto</div>
        </div>
        <div className="forn-pago-hero-cell">
          <div className="forn-pago-hero-cell-lbl">Ticket médio pago</div>
          <div className="forn-pago-hero-cell-val">{fmtFull(qtdPagosMes>0?totalPagoMes/qtdPagosMes:0)}</div>
          <div className="forn-pago-hero-cell-sub">por boleto quitado</div>
        </div>
      </div>

      {/* KPIs no topo */}
      <div className="metrics-grid forn-kpi-grid">
        <div className="metric-card" style={{borderTop:'2px solid var(--blue)'}}>
          <div className="metric-label">Total comprado</div>
          <div className="metric-value" style={{color:'var(--blue)'}}>{fmtFull(totalMes)}</div>
          <div className="metric-sub">{totalBoletos} boleto{totalBoletos===1?'':'s'} em {MONTHS[selMonth]}</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--ink-300, #94a3b8)'}}>
          <div className="metric-label">Fornecedores ativos</div>
          <div className="metric-value">{fornArr.length}</div>
          <div className="metric-sub">com compras no mês</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--amber)'}}>
          <div className="metric-label">Ticket médio</div>
          <div className="metric-value amber">{fmtFull(ticketMedio)}</div>
          <div className="metric-sub">por boleto</div>
        </div>
        <div className="metric-card" style={{borderTop:`2px solid ${concTop3>=60?'var(--red)':concTop3>=40?'var(--amber)':'var(--green)'}`}}>
          <div className="metric-label">Concentração TOP-3</div>
          <div className="metric-value" style={{color:concTop3>=60?'var(--red)':concTop3>=40?'var(--amber)':'var(--green)'}}>{concTop3}%</div>
          <div className="metric-sub">{concTop3>=60?'⚠️ Alta dependência':concTop3>=40?'Atenção':'Diversificado'}</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--red)'}}>
          <div className="metric-label">Vence em 7 dias</div>
          <div className="metric-value red">{fmtFull(prox7)}</div>
          <div className="metric-sub">a pagar (geral)</div>
        </div>
        <div className="metric-card" style={{borderTop:'2px solid var(--amber)'}}>
          <div className="metric-label">Vence em 30 dias</div>
          <div className="metric-value amber">{fmtFull(prox30)}</div>
          <div className="metric-sub">a pagar (geral)</div>
        </div>
      </div>

      {/* Linha 1: Ranking por volume (40%) + Custo por Segmento (60%) */}
      <div className="forn-row-2col forn-row-4060">
        <div className="card forn-rank-card">
          <div className="card-title">Ranking por Volume — {MONTHS[selMonth]} {selYear}</div>
          {fornArr.length===0?(
            <div className="forn-empty">Nenhuma compra de fornecedor neste mês.</div>
          ):(
            <table className="forn-table">
              <thead>
                <tr><th style={{width:28}}>#</th><th>Fornecedor</th><th style={{textAlign:'right',width:104}}>Valor</th><th style={{textAlign:'right',width:90}}>% Total</th><th style={{textAlign:'right',width:60}}>Boletos</th><th style={{textAlign:'right',width:96}}>Ticket médio</th></tr>
              </thead>
              <tbody>
                {fornArr.slice(0,10).map((f,i)=>{
                  const p=totalMes>0?pct(f.valor,totalMes):0;
                  const tk=f.qtd>0?f.valor/f.qtd:0;
                  return(
                    <tr key={i}>
                      <td className="forn-rank-num">{i+1}</td>
                      <td className="forn-rank-name" title={f.nome}>{f.nome}</td>
                      <td style={{textAlign:'right',fontWeight:600,color:'var(--text-primary)'}}>{fmtFull(f.valor)}</td>
                      <td style={{textAlign:'right'}}>
                        <div className="forn-pct-cell">
                          <div className="forn-pct-bar"><div className="forn-pct-fill" style={{width:p+'%'}}></div></div>
                          <span>{p}%</span>
                        </div>
                      </td>
                      <td style={{textAlign:'right'}}>{f.qtd}</td>
                      <td style={{textAlign:'right'}}>{fmtFull(tk)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
          {fornArr.length>10&&<div className="forn-foot-note">Exibindo top 10 de {fornArr.length} fornecedores</div>}
        </div>

        <div className="card forn-seg-card">
          <div className="forn-seg-head">
            <div className="card-title" style={{marginBottom:0}}>Custo por Segmento — {MONTHS[selMonth]} {selYear}</div>
            <div className="forn-seg-total">
              <div className="forn-seg-total-lbl">Total comprado</div>
              <div className="forn-seg-total-val">{fmtFull(totalMes)}</div>
            </div>
          </div>
          {segArr.length===0?(
            <div className="forn-empty">Nenhuma compra de fornecedor registrada neste mês.</div>
          ):(
            <div className="forn-seg-list">
              {segArr.map((s,i)=>{
                const p=totalMes>0?pct(s.valor,totalMes):0;
                return(
                  <div className="forn-seg-cell" key={i}>
                    <div className="forn-seg-row-top">
                      <div className="forn-seg-name" title={s.nome}>
                        <span className="forn-seg-rank">{i+1}</span>
                        <span>{s.nome}</span>
                      </div>
                      <div className="forn-seg-val">{fmtFull(s.valor)}</div>
                    </div>
                    <div className="forn-seg-bar-wrap">
                      <div className="forn-seg-bar-bg"><div className="forn-seg-bar-fill" style={{width:Math.min(100,p)+'%'}}></div></div>
                      <div className="forn-seg-pct">{p}%</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Linha 2: Frequência + Próximos vencimentos */}
      <div className="forn-row-2col">
        <div className="card">
          <div className="card-title">Frequência de Compra (Cadência)</div>
          {cadencia.length===0?(
            <div className="forn-empty">Sem dados de cadência.</div>
          ):(
            <table className="forn-table">
              <thead>
                <tr><th>Fornecedor</th><th style={{textAlign:'center',width:56}}>Boletos</th><th style={{textAlign:'center',width:96}}>Intervalo médio</th><th style={{textAlign:'right',width:96}}>Classificação</th></tr>
              </thead>
              <tbody>
                {cadencia.slice(0,8).map((c,i)=>{
                  const badgeClass=c.classif==='Semanal+'||c.classif==='Semanal'?'cad-semanal':c.classif==='Quinzenal'?'cad-quinzenal':c.classif==='Mensal'?'cad-mensal':'cad-eventual';
                  return(
                    <tr key={i}>
                      <td className="forn-rank-name" title={c.nome}>{c.nome}</td>
                      <td style={{textAlign:'center'}}>{c.qtd}</td>
                      <td style={{textAlign:'center',color:'var(--text-secondary)'}}>{c.intMed===null?'—':c.intMed+' dia'+(c.intMed===1?'':'s')}</td>
                      <td style={{textAlign:'right'}}><span className={`cad-badge ${badgeClass}`}>{c.classif}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>

        <div className="card">
          <div className="card-title">Próximos Vencimentos por Fornecedor</div>
          {proxArr.length===0?(
            <div className="forn-empty">Nenhum vencimento a pagar nos próximos 30 dias.</div>
          ):(
            <table className="forn-table">
              <thead>
                <tr><th>Fornecedor</th><th style={{textAlign:'right',width:84}}>7 dias</th><th style={{textAlign:'right',width:84}}>15 dias</th><th style={{textAlign:'right',width:84}}>30 dias</th></tr>
              </thead>
              <tbody>
                {proxArr.slice(0,8).map((f,i)=>(
                  <tr key={i}>
                    <td className="forn-rank-name" title={f.nome}>{f.nome}</td>
                    <td style={{textAlign:'right',color:f.v7>0?'var(--red-dim)':'var(--text-muted)',fontWeight:f.v7>0?600:400}}>{f.v7>0?fmtFull(f.v7):'—'}</td>
                    <td style={{textAlign:'right',color:f.v15>0?'var(--amber-dim)':'var(--text-muted)'}}>{f.v15>0?fmtFull(f.v15):'—'}</td>
                    <td style={{textAlign:'right',color:'var(--text-secondary)'}}>{f.v30>0?fmtFull(f.v30):'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>

      {/* Linha 3: Evolução mensal */}
      <div className="card forn-evol-card">
        <div className="card-title">Evolução Mensal — Top 5 fornecedores · últimos 6 meses</div>
        {top5.length===0?(
          <div className="forn-empty">Selecione um mês com compras para visualizar a evolução.</div>
        ):(
          <div style={{position:'relative',height:240}}>
            <canvas ref={chartEvolRef}></canvas>
          </div>
        )}
      </div>
    </div>
  );
}

// PORTFÓLIO — MULTI-UNIDADE (estrutura visual fiel ao modelo V35)
// Fonte de dados: Supabase via props — conectado no BLOCO 4.6.
// calcUnitKPIs é placeholder; retorna zeros até o login ser adaptado.
// ══════════════════════════════════════════════════════════════

const MAX_UNITS=6;

// BLOCO 4.6 — KPIs reais do Portfólio. Lê do mapa kpisPortfolio pré-calculado via Supabase.
// Se a unidade ainda não tiver dados carregados, retorna objeto empty como fallback seguro.
const KPIS_EMPTY={totalEntradas:0,totalContasAbertas:0,totalDividasAtivas:0,totalRetiradas:0,totalFornecedores:0,saldoProjetado:0,status:'empty'};
const calcUnitKPIs=(unit,kpisPortfolio)=>kpisPortfolio?.[unit.id]||KPIS_EMPTY;

function UnitCard({unit,selYear,selMonth,onSelect,isActive,kpisPortfolio}){
  const k=calcUnitKPIs(unit,kpisPortfolio);
  const mesLabel=MONTHS[selMonth]+' '+selYear;
  const statusLabel={ok:'Saudável',warn:'Atenção',danger:'Crítico',empty:'Sem dados'}[k.status];
  return(
    <div className={`unit-card${isActive?' active-unit':''}`} onClick={()=>onSelect(unit.id)}>
      <div className={`unit-card-hdr status-${k.status}`}>
        <div className="unit-card-name" title={unit.nome}>{unit.nome}</div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
          <span style={{fontSize:9.5,color:'var(--text-muted)',fontWeight:500,letterSpacing:'.02em'}}>{mesLabel}</span>
          <div className={`unit-card-status ${k.status}`}>{statusLabel}</div>
        </div>
      </div>
      <div className="unit-kpis">
        <div className="unit-kpi">
          <div className="unit-kpi-lbl">💰 Entradas do mês</div>
          <div className={`unit-kpi-val${k.totalEntradas>0?' g':''}`}>{fmt(k.totalEntradas)}</div>
          <div className="unit-kpi-sub">{mesLabel}</div>
        </div>
        <div className="unit-kpi">
          <div className="unit-kpi-lbl">📋 Contas em aberto</div>
          <div className={`unit-kpi-val${k.totalContasAbertas>0?' r':''}`}>{fmt(k.totalContasAbertas)}</div>
          <div className="unit-kpi-sub">a pagar no mês</div>
        </div>
        <div className="unit-kpi">
          <div className="unit-kpi-lbl">🏦 Dívidas ativas</div>
          <div className={`unit-kpi-val${k.totalDividasAtivas>0?' r':''}`}>{k.totalDividasAtivas>0?fmt(k.totalDividasAtivas):'—'}</div>
          <div className="unit-kpi-sub">parcela mensal</div>
        </div>
        <div className="unit-kpi">
          <div className="unit-kpi-lbl">👤 Retiradas do mês</div>
          <div className={`unit-kpi-val${k.totalRetiradas>0?' a':''}`}>{k.totalRetiradas>0?fmt(k.totalRetiradas):'—'}</div>
          <div className="unit-kpi-sub">{mesLabel}</div>
        </div>
        <div className="unit-kpi">
          <div className="unit-kpi-lbl">🚚 Fornecedores</div>
          <div className="unit-kpi-val">{k.totalFornecedores>0?fmt(k.totalFornecedores):'—'}</div>
          <div className="unit-kpi-sub">total do mês</div>
        </div>
        <div className="unit-kpi">
          <div className="unit-kpi-lbl">💵 Saldo projetado</div>
          <div className={`unit-kpi-val${k.saldoProjetado>0?' g':k.saldoProjetado<0?' r':''}`}>{k.status==='empty'?'—':fmt(k.saldoProjetado)}</div>
          <div className="unit-kpi-sub">entradas − contas − retiradas</div>
        </div>
      </div>
      <div className="unit-card-footer">
        <button className="unit-card-footer-btn" onClick={e=>{e.stopPropagation();onSelect(unit.id);}}>
          Abrir painel →
        </button>
        <span className="unit-card-mes">{unit.clienteNome||''}</span>
      </div>
    </div>
  );
}

function Portfolio({empresas,selYear,selMonth,setSelYear,setSelMonth,empresaAtiva,onSelectEmpresa,kpisPortfolio}){
  const[showModal,setShowModal]=useState(false);
  const[newName,setNewName]=useState('');
  const[newSeg,setNewSeg]=useState('');
  const canAdd=empresas.length<MAX_UNITS;
  return(
    <div className="portfolio-wrap">
      <div className="portfolio-toolbar">
        <div className="portfolio-toolbar-left">
          <div className="portfolio-count">
            <strong>{empresas.length}</strong> de {MAX_UNITS} unidades
          </div>
          <div className="month-bar-inline" style={{marginBottom:0}}>
            <select className="year-sel" value={selYear} onChange={e=>setSelYear(parseInt(e.target.value))}>
              {[new Date().getFullYear()-1,new Date().getFullYear(),new Date().getFullYear()+1].map(y=><option key={y} value={y}>{y}</option>)}
            </select>
            <div className="month-sep"></div>
            {MONTHS_SHORT.map((m,i)=>(
              <button key={i} className={`mchip${selMonth===i?' active':''}`} onClick={()=>setSelMonth(i)}>{m}</button>
            ))}
          </div>
        </div>
        {canAdd&&(
          <button className="btn btn-primary btn-sm" onClick={()=>setShowModal(true)} style={{background:'var(--petronas)',display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:14,lineHeight:1}}>＋</span> Nova Unidade
          </button>
        )}
      </div>
      <div className="portfolio-grid">
        {empresas.map(u=>(
          <UnitCard
            key={u.id}
            unit={u}
            selYear={selYear}
            selMonth={selMonth}
            onSelect={onSelectEmpresa}
            isActive={empresaAtiva?.id===u.id}
            kpisPortfolio={kpisPortfolio}
          />
        ))}
        {canAdd&&(
          <div className="unit-card-add" onClick={()=>setShowModal(true)}>
            <div className="unit-card-add-ico">＋</div>
            <div className="unit-card-add-label">Adicionar Unidade</div>
            <div className="unit-card-add-sub">máx. {MAX_UNITS} unidades</div>
          </div>
        )}
      </div>
      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal" style={{maxWidth:420}}>
            <div className="flex items-center justify-between" style={{marginBottom:16}}>
              <div style={{fontSize:15,fontWeight:700}}>🏢 Nova Unidade</div>
              <button className="btn btn-secondary btn-sm" onClick={()=>setShowModal(false)}>✕</button>
            </div>
            <div className="unit-modal-form">
              <div className="fg">
                <label>Nome da unidade *</label>
                <input
                  autoFocus
                  placeholder="Ex: Mercado Zanon — Filial Norte"
                  value={newName}
                  onChange={e=>setNewName(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')alert('Funcionalidade será conectada ao Supabase em etapa futura.');}}
                  maxLength={60}
                />
              </div>
              <div className="fg">
                <label>Segmento / Tipo</label>
                <input
                  placeholder="Ex: Supermercado, Açougue, Padaria..."
                  value={newSeg}
                  onChange={e=>setNewSeg(e.target.value)}
                  maxLength={50}
                />
              </div>
              <div className="alert alert-a" style={{marginBottom:0}}>
                <span>ℹ️</span>
                <span>O cadastro de novas unidades será conectado ao Supabase em etapa futura.</span>
              </div>
              <div className="flex gap-2" style={{justifyContent:'flex-end',marginTop:4}}>
                <button className="btn btn-secondary btn-sm" onClick={()=>{setShowModal(false);setNewName('');setNewSeg('');}}>Cancelar</button>
                <button
                  className="btn btn-sm"
                  style={{background:'var(--petronas)',color:'#fff'}}
                  onClick={()=>alert('Funcionalidade será conectada ao Supabase em etapa futura.')}
                  disabled={!newName.trim()}
                >
                  Criar Unidade
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function LoginScreen({onLogin}){
  const[email,setEmail]=useState('');
  const[senha,setSenha]=useState('');
  const[loading,setLoading]=useState(false);
  const[erro,setErro]=useState('');
  const handleLogin=async e=>{
    e.preventDefault();
    setLoading(true);setErro('');
    try{
      const{data,error}=await supabase.auth.signInWithPassword({email,password:senha});
      if(error){setErro(error.message==='Invalid login credentials'?'E-mail ou senha inválidos.':error.message);return;}
      const{data:usuario}=await supabase.from('usuarios').select('empresa_id,role_global').eq('id',data.user.id).single();
      if(!usuario){setErro('Usuário não vinculado a uma empresa. Contate o administrador.');return;}
      const rg=usuario.role_global||null;
      if(rg==='prx_admin'||rg==='prx_editor'){
        const{data:emps}=await supabase.from('empresas').select('id,nome,cliente_id,clientes(nome)').order('nome');
        onLogin(rg,emps||[]);
      }else{
        EMPRESA_ID=usuario.empresa_id;
        onLogin(rg,[]);
      }
    }catch(err){setErro(err.message||'Erro ao fazer login.');}
    finally{setLoading(false);}
  };
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)'}}>
      <div style={{width:'100%',maxWidth:'380px',padding:'0 16px'}}>
        <div style={{display:'flex',justifyContent:'center',marginBottom:'28px'}}>
          <div style={{background:'var(--surface)',padding:'12px 20px',borderRadius:'10px',boxShadow:'var(--shadow-md)'}}>
            <ZanonLogo/>
          </div>
        </div>
        <div style={{background:'var(--surface)',borderRadius:'var(--radius)',boxShadow:'var(--shadow-md)',padding:'32px'}}>
          <h2 style={{fontSize:'18px',fontWeight:'700',color:'var(--text-primary)',marginBottom:'6px',letterSpacing:'-.02em'}}>Entrar no sistema</h2>
          <p style={{fontSize:'13px',color:'var(--text-muted)',marginBottom:'24px'}}>Mercado Zanon — Gestão de Caixa</p>
          <form onSubmit={handleLogin}>
            <div style={{marginBottom:'14px'}}>
              <label style={{display:'block',fontSize:'12px',fontWeight:'600',color:'var(--text-secondary)',marginBottom:'5px',letterSpacing:'.04em',textTransform:'uppercase'}}>E-mail</label>
              <input
                type="email" required autoFocus
                value={email} onChange={e=>setEmail(e.target.value)}
                placeholder="seu@email.com"
                style={{width:'100%',padding:'9px 12px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',fontSize:'14px',background:'var(--ink-50)',color:'var(--text-primary)',outline:'none',fontFamily:'inherit',transition:'border-color .15s'}}
                onFocus={e=>e.target.style.borderColor='var(--petronas)'}
                onBlur={e=>e.target.style.borderColor='var(--border)'}
              />
            </div>
            <div style={{marginBottom:'20px'}}>
              <label style={{display:'block',fontSize:'12px',fontWeight:'600',color:'var(--text-secondary)',marginBottom:'5px',letterSpacing:'.04em',textTransform:'uppercase'}}>Senha</label>
              <input
                type="password" required
                value={senha} onChange={e=>setSenha(e.target.value)}
                placeholder="••••••••"
                style={{width:'100%',padding:'9px 12px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',fontSize:'14px',background:'var(--ink-50)',color:'var(--text-primary)',outline:'none',fontFamily:'inherit',transition:'border-color .15s'}}
                onFocus={e=>e.target.style.borderColor='var(--petronas)'}
                onBlur={e=>e.target.style.borderColor='var(--border)'}
              />
            </div>
            {erro&&<div style={{background:'var(--red-light)',border:'1px solid #fecaca',borderRadius:'var(--radius-xs)',padding:'9px 12px',fontSize:'13px',color:'var(--red-dim)',marginBottom:'14px'}}>{erro}</div>}
            <button
              type="submit" disabled={loading}
              style={{width:'100%',padding:'10px',background:loading?'var(--petronas-dark)':'var(--petronas)',color:'#fff',border:'none',borderRadius:'var(--radius-sm)',fontSize:'14px',fontWeight:'700',letterSpacing:'.04em',cursor:loading?'not-allowed':'pointer',fontFamily:'inherit',transition:'background .15s',opacity:loading?0.8:1}}
            >{loading?'Entrando…':'Entrar'}</button>
          </form>
        </div>
        <p style={{textAlign:'center',fontSize:'11.5px',color:'var(--text-muted)',marginTop:'16px'}}>Acesso restrito. Sem opção de cadastro.</p>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SECTION 12-B — EMPRESA SELECTOR (PRX Admin)
// Componente visual puro. Não chama Supabase. Não altera estado global.
// Recebe a lista de empresas pronta do App e devolve o id selecionado via onSelect.
// ─────────────────────────────────────────────────────────────
function EmpresaSelector({empresas,roleGlobal,onSelect}){
  const roleLbl=roleGlobal==='prx_editor'?'PRX Editor':'PRX Admin';
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)'}}>
      <div style={{width:'100%',maxWidth:'520px',padding:'0 16px'}}>
        <div style={{display:'flex',justifyContent:'center',marginBottom:'24px'}}>
          <div style={{background:'var(--surface)',padding:'12px 20px',borderRadius:'10px',boxShadow:'var(--shadow-md)'}}>
            <ZanonLogo/>
          </div>
        </div>
        <div style={{background:'var(--surface)',borderRadius:'var(--radius)',boxShadow:'var(--shadow-md)',padding:'28px 32px'}}>
          <div style={{marginBottom:'20px'}}>
            <div style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',background:'var(--petronas-soft)',borderRadius:'20px',marginBottom:'10px'}}>
              <span style={{fontSize:'11px',fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',color:'var(--petronas-dark)'}}>{roleLbl}</span>
            </div>
            <h2 style={{fontSize:'18px',fontWeight:'700',color:'var(--text-primary)',marginBottom:'4px',letterSpacing:'-.02em'}}>Selecionar empresa</h2>
            <p style={{fontSize:'13px',color:'var(--text-muted)'}}>Escolha a empresa que deseja acessar.</p>
          </div>
          {empresas.length===0?(
            <div style={{textAlign:'center',padding:'28px 0',color:'var(--text-muted)',fontSize:'13px'}}>Nenhuma empresa encontrada.</div>
          ):(
            <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
              {empresas.map(e=>(
                <button
                  key={e.id}
                  onClick={()=>onSelect(e.id)}
                  style={{
                    display:'flex',alignItems:'center',justifyContent:'space-between',
                    width:'100%',padding:'12px 16px',
                    background:'var(--ink-50)',border:'1px solid var(--border)',
                    borderRadius:'var(--radius-sm)',cursor:'pointer',
                    fontFamily:'DM Sans,sans-serif',
                    transition:'all .15s',textAlign:'left',
                  }}
                  onMouseEnter={e=>{ e.currentTarget.style.background='var(--petronas-soft)'; e.currentTarget.style.borderColor='var(--petronas)'; }}
                  onMouseLeave={e=>{ e.currentTarget.style.background='var(--ink-50)'; e.currentTarget.style.borderColor='var(--border)'; }}
                >
                  <div>
                    <div style={{fontSize:'14px',fontWeight:'600',color:'var(--text-primary)',marginBottom:'2px'}}>{e.nome}</div>
                    {e.clientes?.nome&&<div style={{fontSize:'11px',color:'var(--text-muted)'}}>{e.clientes.nome}</div>}
                  </div>
                  <span style={{fontSize:'16px',color:'var(--text-muted)',marginLeft:'12px'}}>→</span>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App(){
  const[activeTab,setActiveTab]=useState('painel');
  // ── Estado global de mês/ano: ÚNICA fonte de verdade para o mês selecionado em todo o dashboard ──
  const[selectedYear,setSelectedYear]=useState(new Date().getFullYear());
  const[selectedMonth,setSelectedMonth]=useState(new Date().getMonth());
  // ── Estados de autenticação e carregamento ──
  const[autenticado,setAutenticado]=useState(false);
  const[aguardandoSelecaoEmpresa,setAguardandoSelecaoEmpresa]=useState(false);
  const[carregandoAuth,setCarregandoAuth]=useState(true);
  const[carregandoDados,setCarregandoDados]=useState(false);
  const[isSaving,setIsSaving]=useState(false);
  // Estados do Portfólio — carregados via Supabase após autenticação (BLOCO 4.4)
  const[roleGlobal,setRoleGlobal]=useState(null);
  const[empresasSeletorPRX,setEmpresasSeletorPRX]=useState([]); // lista global — só para EmpresaSelector PRX
  const[empresasDisponiveis,setEmpresasDisponiveis]=useState([]); // unidades do cliente ativo — para o Portfólio
  const[empresaAtiva,setEmpresaAtiva]=useState(null);
  const[kpisPortfolio,setKpisPortfolio]=useState({}); // BLOCO 4.6 — KPIs calculados por empresa para o Portfólio

  const[entradas,setE_]=useState([]);
  const[contas,setC_]=useState([]);
  const[dividas,setD_]=useState([]);
  const[retiradas,setR_]=useState([]);
  const[config,setCfg_]=useState({...defaultConfig});

  // useEffect 1: verificar sessão existente ao abrir o sistema
  useEffect(()=>{
    supabase.auth.getSession().then(async({data:{session}})=>{
      if(session){
        const{data:usuario}=await supabase.from('usuarios').select('empresa_id,role_global').eq('id',session.user.id).single();
        if(usuario){
          const rg=usuario.role_global||null;
          setRoleGlobal(rg);
          if(rg==='prx_admin'||rg==='prx_editor'){
            const{data:emps}=await supabase.from('empresas').select('id,nome,cliente_id,clientes(nome)').order('nome');
            setEmpresasSeletorPRX(emps||[]);
            setAguardandoSelecaoEmpresa(true);
          }else{
            EMPRESA_ID=usuario.empresa_id;
            setAutenticado(true);
          }
        }
      }
      setCarregandoAuth(false);
    });
  },[]);

  // useEffect 2: escutar eventos de auth (SIGNED_OUT, renovação de token)
  useEffect(()=>{
    const{data:{subscription}}=supabase.auth.onAuthStateChange((event,session)=>{
      if(event==='SIGNED_OUT'){setAutenticado(false);EMPRESA_ID=null;setRoleGlobal(null);setEmpresasSeletorPRX([]);setEmpresasDisponiveis([]);setAguardandoSelecaoEmpresa(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // useEffect 3: carregar dados do Supabase após autenticação bem-sucedida
  useEffect(()=>{
    if(!autenticado)return;
    setCarregandoDados(true);
    Promise.all([
      loadS(KEYS.entradas),
      loadS(KEYS.contas),
      loadS(KEYS.dividas),
      loadS(KEYS.retiradas),
      loadS(KEYS.config),
    ]).then(([ent,cnt,div,ret,cfg])=>{
      setE_(Array.isArray(ent)?ent:[]);
      setC_(Array.isArray(cnt)?cnt:[]);
      setD_(Array.isArray(div)?div:[]);
      setR_(Array.isArray(ret)?ret:[]);
      setCfg_({...defaultConfig,...((cfg&&typeof cfg==='object')?cfg:{})});
    }).catch(err=>{
      console.error('Erro ao carregar dados:',err);
    }).finally(()=>{
      setCarregandoDados(false);
    });
  },[autenticado]);

  // useEffect 4: carregar empresas disponíveis para o Portfólio após autenticação
  // Dispara quando autenticado ou roleGlobal mudam.
  // Não altera EMPRESA_ID nem loadS/saveS — apenas popula empresasDisponiveis.
  useEffect(()=>{
    if(!autenticado)return;
    (async()=>{
      try{
        if(roleGlobal==='prx_admin'||roleGlobal==='prx_editor'){
          // PRX: empresasDisponiveis já foi filtrada por cliente no onSelect do EmpresaSelector.
          // useEffect 4 não sobrescreve para PRX.
          return;
        }else{
          // Cliente: RLS em usuarios_empresas filtra automaticamente pelo auth.uid()
          const{data,error}=await supabase
            .from('usuarios_empresas')
            .select('empresas!inner(id,nome,clientes(nome))');
          if(error)throw error;
          if(data)setEmpresasDisponiveis(data.map(r=>({
            id:r.empresas.id,
            nome:r.empresas.nome,
            clienteNome:r.empresas.clientes?.nome||'',
          })));
        }
      }catch(err){
        console.error('Erro ao carregar empresas do Portfólio:',err);
      }
    })();
  },[autenticado,roleGlobal]);

  // useEffect 5 (BLOCO 4.6): calcular KPIs reais do Portfólio via queries batch no Supabase.
  // Dispara ao abrir a aba Portfólio ou ao mudar mês/ano enquanto ela está ativa.
  // Não altera EMPRESA_ID, loadS, saveS nem useEffect 3.
  useEffect(()=>{
    if(activeTab!=='portfolio'||!autenticado||empresasDisponiveis.length===0)return;
    (async()=>{
      try{
        const ids=empresasDisponiveis.map(e=>e.id);
        const mStart=monthStart(selectedYear,selectedMonth);
        const mEnd=monthEnd(selectedYear,selectedMonth);
        const[{data:rawEnt},{data:rawCon},{data:rawDiv},{data:rawRet},{data:rawCfg}]=await Promise.all([
          supabase.from('entradas').select('empresa_id,total,data').in('empresa_id',ids).gte('data',mStart).lte('data',mEnd),
          supabase.from('contas').select('empresa_id,valor,status,vencimento,tipoDespesa').in('empresa_id',ids).gte('vencimento',mStart).lte('vencimento',mEnd),
          supabase.from('dividas').select('empresa_id,parcelaMensal,status').in('empresa_id',ids).eq('status','Ativa'),
          supabase.from('retiradas').select('empresa_id,valor,data').in('empresa_id',ids).gte('data',mStart).lte('data',mEnd),
          supabase.from('config').select('empresa_id,saldoInicial').in('empresa_id',ids),
        ]);
        const kpis={};
        ids.forEach(id=>{
          const ent=(rawEnt||[]).filter(r=>r.empresa_id===id);
          const con=(rawCon||[]).filter(r=>r.empresa_id===id);
          const div=(rawDiv||[]).filter(r=>r.empresa_id===id);
          const ret=(rawRet||[]).filter(r=>r.empresa_id===id);
          const cfg=(rawCfg||[]).find(r=>r.empresa_id===id);
          const totalEntradas=ent.reduce((s,r)=>s+(r.total||0),0);
          const totalContasAbertas=con.filter(r=>r.status!=='Pago').reduce((s,r)=>s+(r.valor||0),0);
          const totalFornecedores=con.filter(r=>r.tipoDespesa==='Fornecedor').reduce((s,r)=>s+(r.valor||0),0);
          const totalDividasAtivas=div.reduce((s,r)=>s+parseCurrencyBR(r.parcelaMensal),0);
          const totalRetiradas=ret.reduce((s,r)=>s+(r.valor||0),0);
          const saldoInicial=Number(cfg?.saldoInicial)||defaultConfig.saldoInicial;
          const saldoProjetado=saldoInicial+totalEntradas-totalContasAbertas-totalRetiradas;
          let status='empty';
          if(totalEntradas>0||totalContasAbertas>0){
            if(saldoProjetado<=0)status='danger';
            else if(totalContasAbertas>=totalEntradas*0.75)status='warn';
            else status='ok';
          }
          kpis[id]={totalEntradas,totalContasAbertas,totalDividasAtivas,totalRetiradas,totalFornecedores,saldoProjetado,status};
        });
        setKpisPortfolio(kpis);
      }catch(err){
        console.error('Erro ao calcular KPIs do Portfólio:',err);
      }
    })();
  },[activeTab,autenticado,empresasDisponiveis,selectedYear,selectedMonth]);

  // ── Setters assíncronos com optimistic update e indicador isSaving ──
  const setEntradas=async d=>{setE_(d);setIsSaving(true);try{await saveS(KEYS.entradas,d);}catch(err){console.error('Erro ao salvar entradas:',err);}finally{setIsSaving(false);}};
  const setContas=async d=>{setC_(d);setIsSaving(true);try{await saveS(KEYS.contas,d);}catch(err){console.error('Erro ao salvar contas:',err);}finally{setIsSaving(false);}};
  const setDividas=async d=>{setD_(d);setIsSaving(true);try{await saveS(KEYS.dividas,d);}catch(err){console.error('Erro ao salvar dívidas:',err);}finally{setIsSaving(false);}};
  const setRetiradas=async d=>{setR_(d);setIsSaving(true);try{await saveS(KEYS.retiradas,d);}catch(err){console.error('Erro ao salvar retiradas:',err);}finally{setIsSaving(false);}};
  const setConfig=async d=>{setCfg_(d);setIsSaving(true);try{await saveS(KEYS.config,d);}catch(err){console.error('Erro ao salvar config:',err);}finally{setIsSaving(false);}};

  // BLOCO 4.5 — Troca de unidade pelo Portfólio (cliente comum)
  const trocarEmpresa=(eid)=>{
    // Correção 1: bloquear troca durante gravação em andamento
    if(isSaving){alert('Aguarde o salvamento terminar antes de trocar de unidade.');return;}
    // Correção 2: empresa já ativa — apenas navega para o painel
    if(eid===EMPRESA_ID){setActiveTab('painel');return;}
    // Troca de contexto: define EMPRESA_ID antes de qualquer setState
    EMPRESA_ID=eid;
    setEmpresaAtiva(empresasDisponiveis.find(e=>e.id===eid)||null);
    setActiveTab('painel');
    // Recarrega todos os dados para a nova empresa (mesmo padrão do useEffect 3, sem tocá-lo)
    setCarregandoDados(true);
    Promise.all([
      loadS(KEYS.entradas),
      loadS(KEYS.contas),
      loadS(KEYS.dividas),
      loadS(KEYS.retiradas),
      loadS(KEYS.config),
    ]).then(([ent,cnt,div,ret,cfg])=>{
      setE_(Array.isArray(ent)?ent:[]);
      setC_(Array.isArray(cnt)?cnt:[]);
      setD_(Array.isArray(div)?div:[]);
      setR_(Array.isArray(ret)?ret:[]);
      setCfg_({...defaultConfig,...((cfg&&typeof cfg==='object')?cfg:{})});
    }).catch(err=>{
      console.error('Erro ao recarregar dados após troca de unidade:',err);
    }).finally(()=>{
      setCarregandoDados(false);
    });
  };

  const handleLogout=async()=>{await supabase.auth.signOut();setAutenticado(false);EMPRESA_ID=null;};
  // Mescla contas manuais + parcelas automáticas de dívidas
  const contasComParcelas=mergeContasComParcelas(contas,dividas);
  const hoje=today();
  const entMes=entradas.filter(e=>e.data>=addDays(hoje,-30));
  const totalEntMes=entMes.reduce((s,e)=>s+e.total,0);
  const diasV=new Set(entMes.map(e=>e.data)).size;
  const mediaDiaria=diasV>0?totalEntMes/diasV:0;

  // ── Telas de carregamento / login ──
  const Spinner=({msg})=>(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)',gap:'14px'}}>
      <div style={{width:'36px',height:'36px',border:'3px solid var(--ink-200)',borderTop:'3px solid var(--petronas)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}></div>
      <p style={{fontSize:'13px',color:'var(--text-muted)'}}>{msg}</p>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
  if(carregandoAuth)return <Spinner msg="Verificando sessão…"/>;
  if(!autenticado&&!aguardandoSelecaoEmpresa)return <LoginScreen onLogin={(rg,emps)=>{setRoleGlobal(rg);if(rg==='prx_admin'||rg==='prx_editor'){setEmpresasSeletorPRX(emps);setAguardandoSelecaoEmpresa(true);}else{setAutenticado(true);}}}/>;
  if(aguardandoSelecaoEmpresa)return <EmpresaSelector empresas={empresasSeletorPRX} roleGlobal={roleGlobal} onSelect={(eid)=>{EMPRESA_ID=eid;const emp=empresasSeletorPRX.find(e=>e.id===eid);const cid=emp?.cliente_id;const unidades=cid?empresasSeletorPRX.filter(e=>e.cliente_id===cid):[emp].filter(Boolean);setEmpresasDisponiveis(unidades.map(e=>({id:e.id,nome:e.nome,clienteNome:e.clientes?.nome||''})));setAguardandoSelecaoEmpresa(false);setAutenticado(true);}}/>;
  if(carregandoDados)return <Spinner msg="Carregando dados…"/>;

  const nowStr=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
  const activeTabObj=TABS.find(t=>t.id===activeTab);
  return(
    <div className="app-shell">
      <header className="app-header">
        <button
          onClick={()=>setActiveTab('portfolio')}
          title="Portfólio de unidades"
          style={{
            display:'inline-flex',alignItems:'center',justifyContent:'center',
            width:30,height:30,borderRadius:6,flexShrink:0,
            background:activeTab==='portfolio'?'var(--petronas)':'rgba(255,255,255,.07)',
            border:activeTab==='portfolio'?'1px solid var(--petronas)':'1px solid rgba(255,255,255,.12)',
            cursor:'pointer',color:activeTab==='portfolio'?'#fff':'rgba(255,255,255,.55)',
            fontSize:14,transition:'all .15s',
          }}
        >🏢</button>
        <div className="hdr-logo"><ZanonLogo/></div>
        <div className="hdr-div"></div>
        <nav className="hdr-nav">
          <div className="hdr-grp">
            {TABS.filter(t=>t.id!=='projecao'&&t.id!=='portfolio').map(t=>(
              <button key={t.id} className={`hdr-btn${activeTab===t.id?' active':''}`} onClick={()=>setActiveTab(t.id)}>
                <span className="dot"></span><span>{t.icon}</span><span>{t.label}</span>
              </button>
            ))}
          </div>
        </nav>
        <div className="hdr-right">
          {isSaving&&<span style={{fontSize:'11px',color:'var(--petronas)',fontWeight:'600',letterSpacing:'.04em',animation:'pulse 1s ease-in-out infinite'}}>💾 Salvando…<style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}`}</style></span>}
          <span className="hdr-date">{nowStr}</span>
          <button className="hdr-clear" onClick={handleLogout} title="Sair do sistema" style={{borderColor:'rgba(220,38,38,.35)',color:'#fca5a5'}}>⏏ Sair</button>
        </div>
      </header>
      <div className="page-wrap">
        <PageHeader
          icon={activeTabObj?.icon}
          title={activeTabObj?.label}
          sub={TAB_META[activeTab]?.sub}
          leftExtras={activeTab==='painel'?(
            <React.Fragment>
              <div className="page-hdr-sep"></div>
              <div className="month-bar-inline">
                <select className="year-sel" value={selectedYear} onChange={e=>setSelectedYear(parseInt(e.target.value))}>
                  {[new Date().getFullYear()-1,new Date().getFullYear(),new Date().getFullYear()+1].map(y=><option key={y} value={y}>{y}</option>)}
                </select>
                <div className="month-sep"></div>
                {MONTHS_SHORT.map((m,i)=>(
                  <button key={i} className={`mchip${selectedMonth===i?' active':''}`} onClick={()=>setSelectedMonth(i)}>{m}</button>
                ))}
              </div>
              <button
                className={`page-hdr-shortcut${activeTab==='projecao'?' active':''}`}
                onClick={()=>setActiveTab('projecao')}
                title="Abrir Projeção de Saldo"
              >
                <span>📈</span><span>Projeção</span>
              </button>
            </React.Fragment>
          ):null}
          actions={(
            <div className="page-hdr-prx" title="PRX — Gestão de recebíveis" aria-label="PRX">
              <img src={PRX_LOGO_SRC} alt="PRX"/>
            </div>
          )}
        />
        {activeTab==='painel'&&<Painel entradas={entradas} contas={contasComParcelas} dividas={dividas} retiradas={retiradas} config={config} setConfig={setConfig} selectedYear={selectedYear} setSelectedYear={setSelectedYear} selectedMonth={selectedMonth} setSelectedMonth={setSelectedMonth}/>}
        {activeTab==='entradas'&&<Entradas entradas={entradas} setEntradas={setEntradas} contas={contasComParcelas} dividas={dividas} selectedYear={selectedYear} selectedMonth={selectedMonth}/>}
        {activeTab==='contas'&&<Contas contas={contas} setContas={setContas} contasComParcelas={contasComParcelas} mediaDiariaEntrada={mediaDiaria} dividas={dividas} setDividas={setDividas} selectedYear={selectedYear} selectedMonth={selectedMonth}/>}
        {activeTab==='fornecedores'&&<Fornecedores contas={contasComParcelas} selectedYear={selectedYear} selectedMonth={selectedMonth}/>}
        {activeTab==='dividas'&&<Dividas dividas={dividas} setDividas={setDividas} entradaMensal={totalEntMes}/>}
        {activeTab==='retiradas'&&<Retiradas retiradas={retiradas} setRetiradas={setRetiradas} entradaMensal={totalEntMes} config={config} setConfig={setConfig}/>}
        {activeTab==='projecao'&&<Projecao entradas={entradas} contas={contasComParcelas} config={config} setConfig={setConfig}/>}
        {activeTab==='portfolio'&&<Portfolio
          empresas={empresasDisponiveis}
          selYear={selectedYear}
          selMonth={selectedMonth}
          setSelYear={setSelectedYear}
          setSelMonth={setSelectedMonth}
          empresaAtiva={empresaAtiva}
          onSelectEmpresa={trocarEmpresa}
          kpisPortfolio={kpisPortfolio}
        />}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
